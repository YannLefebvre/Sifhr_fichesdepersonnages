numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68f00e18019d803d0f95e712"}],"conditions":[],"_id":"68f00e18019d803d0f95e711"},{"showCondition":{"query":{"params":[{"target":"d00a083e-448f-4e8f-9553-862de61ae7a8","condition":"=","value":false,"valueType":"bool","animation":false,"_id":"690b1054019d803d0f42c024"}]},"kind":"flag"},"content":"<p>Vous écoutez le capitaine des kataphraktoi, Andronikos, exposer son plan.</p>","next":"seq-60","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e714"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-60","content":"<p>-\"Nous devons conserver la même organisation. Le train de vivres et de machines de guerre doit rester au milieu, pour en assurer la sécurité. De ce train dépend notre capacité à poursuivre vers les cités des Turcs afin de les assiéger\".</p><p><br/></p><p>Si Andronikos est aussi tacticien que charitable, vous êtes tous très mal partis.</p><p><br/></p><p><em>La haine que vous portez à ce triste sire augmente votre </em><strong><em>témérité </em></strong><em>de 1. Il est désormais de ‌<span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"e5cec615-ea4f-49f8-9617-d42accab8bab\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;e5cec615-ea4f-49f8-9617-d42accab8bab&quot;,&quot;name&quot;:&quot;Témérité&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]Témérité</span>‌.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"operator":"and","params":[{"kind":"flag","target":"21a9747c-9608-40ed-b8e1-fa17698b5a25","condition":"=","value":true,"animation":false,"_id":"68f00e18019d803d0f95e717"},{"kind":"object","target":"58204513-e862-4345-ad99-2ec287d42f64","condition":"with","animation":false,"_id":"68f00e18019d803d0f95e718"}]},"kind":"multiple"},"content":"<p>Vous possédez un exemplaire du Strategicon de Maurice et vous avez été bien inspiré de l&#39;avoir lu.</p>","next":"seq-62","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e716"},{"showCondition":{"query":{"params":[{"target":"3f035a4d-aa70-412c-b380-036578ba6526","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"68f00e18019d803d0f95e71a"}]},"kind":"flag"},"content":"<p>Vous reconnaissez Jean Doukas, avec lequel vous vous étiez entretenu chaleureusement.</p>","next":"seq-63","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e719"},{"showCondition":{"query":{"params":[{"target":"e91d0194-b6f1-4837-aa04-9f814ad0b39e","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"68f00e18019d803d0f95e71c"}]},"kind":"flag"},"content":"<p>Vous apercevez Jean Doukas, avec lequel vous aviez eu une très courte entrevue.</p>","next":"seq-64","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e71b"},{"showCondition":{"query":{"params":[{"target":"0948c1fc-1f77-4044-81e2-728d797e0155","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"68f00e18019d803d0f95e71f"}]},"kind":"flag"},"content":"<p>Vous aviez éconduit l&#39;impératrice quand elle avait voulu se recueillir auprès de la relique dont vous êtes en responsabilité.</p>","next":"seq-69","actions":[{"params":{"target":"0ee0735d-2026-4f35-99b5-8793d0d2df4e","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68f00e18019d803d0f95e71e"}],"conditions":[],"_id":"68f00e18019d803d0f95e71d"}],"usedVariables":["e5cec615-ea4f-49f8-9617-d42accab8bab"],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-62","content":"<p>C&#39;est un condensé de ce qui est recommandé dans ce traité militaire... vieux d&#39;au moins quatre siècles. </p><p>&quot;Au moment du déplacement, il est nécessaire de placer le train de siège au milieu de l&#39;ordre de bataille. L&#39;armée ne doit pas se déplacer avec le train de bagages, mais le faire séparément, de sorte que les différentes parties de l&#39;armée soient suivies par ses chariots. Le train de chariots commun doit suivre les guerriers légèrement armés. &quot;</p><p>Oui, mais cela faisait peut-être référence à un cas commun, en morne plaine, et pas dans ces montagnes dont la silhouette vous hante.</p><p></p><p></p><p></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"operator":"and","params":[{"kind":"object","target":"1e7115cb-b5b2-48bd-a51e-cf74ff7346e1","condition":"with","animation":false,"_id":"68f00e18019d803d0f95e723"},{"kind":"flag","target":"a12b47f4-99a3-48c4-980a-2f2c3ca98fe7","condition":"=","value":true,"animation":false,"_id":"68f00e18019d803d0f95e724"}]},"kind":"multiple"},"content":"<p>Vous possédez le <em>De velitatione bellica</em> que vous avez également compulsé.</p>","next":"seq-70","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e722"},{"showCondition":{"query":{"operator":"and","params":[{"kind":"object","target":"1e7115cb-b5b2-48bd-a51e-cf74ff7346e1","condition":"with","animation":false,"_id":"68f00e18019d803d0f95e726"},{"kind":"flag","target":"a12b47f4-99a3-48c4-980a-2f2c3ca98fe7","condition":"=","value":false,"animation":false,"_id":"68f00e18019d803d0f95e727"}]},"kind":"multiple"},"content":"<p>Vous possédez le <em>De velitatione bellica </em>que vous n&#39;avez malencontreusement pas lu...</p>","next":"seq-66","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e725"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-63","content":"<p>L&#39;Hétériarque Jean Doukas vous aperçoit et vous sourit. Son regard est intense. Il opine du chef, comme s&#39;il souhaitait que vous vous approchiez de cette réunion au sommet.</p><p></p><p>La présence d&#39;Andronikos, d&#39;autres généraux et du couple impérial vous invite à la prudence la plus élémentaire.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"operator":"and","params":[{"kind":"counter","target":"e5cec615-ea4f-49f8-9617-d42accab8bab","condition":">","value":1,"animation":false,"_id":"68f00e18019d803d0f95e72a"},{"kind":"counter","target":"0ee0735d-2026-4f35-99b5-8793d0d2df4e","condition":"<=","value":1,"animation":false,"_id":"68f00e18019d803d0f95e72b"}]},"kind":"multiple"},"content":"<p>Vous vous sentez pousser des ailes. Il vous faut intervenir.</p>","next":"seq-67","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e729"},{"showCondition":{"query":{"params":[]}},"content":"<p>L&#39;enjeu est trop important. Vous préférez rester dans la foule, anonyme.</p>","next":"seq-66","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e72c"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-64","content":"<p>L&#39;hétériarque vous reconnaît et détourne rapidement le regard. Il semble circonspect à l&#39;écoute de la stratégie d&#39;Andronikos. C&#39;est un hétériarque ; il est compétent en matière militaire mais il semble hésitant à contredire le capitaine des <em>cataphraktoi</em>.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous osez prendre la parole pour donner un avis bien divergent.</p>","next":"seq-67","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e72e"},{"showCondition":{"query":{"params":[]}},"content":"<p>Mieux vaut se taire sur un sujet pour lequel on passe pour incompétent.</p>","next":"seq-78","actions":[{"params":{"target":"0ee0735d-2026-4f35-99b5-8793d0d2df4e","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"690534dd019d803d0f19c9ca"},{"params":{"target":"02085f3e-158c-4be1-851a-c1812666e4ff","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"690534dd019d803d0f19c9cb"}],"conditions":[],"_id":"68f00e18019d803d0f95e72f"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-66","content":"<p>La messe est dite&nbsp;: après de brefs pourparlers, la stratégie d&#39;Andronikos prévaut. L&#39;armée byzantine va s&#39;engouffrer dans le corridor rocheux, en dépit des troupes ennemies juchées sur les éminences qui le surplombent.</p>","noContent":false,"final":false,"next":"seq-68","actions":[{"params":{"target":"13c7d626-c182-4da9-85ca-c69caca1a965","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"6917b42b019d803d0fa85560"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-67","content":"<p>-&quot;Non !&quot;</p><p>Ce mot est sorti de votre bouche de façon tonitruante, et vous regretteriez presque de l&#39;avoir proféré au moment où il franchit vos lèvres. Les participants à la réunion sont interloqués. Un moment suspendu où chacun se tourne vers le moine ventripotent qui a osé les interrompre : vous.</p><p>-&quot;C&#39;est insensé ! Les Turcs occupent les contreforts et vont fondre sur nous ! Le train est trop exposé au milieu, faiblement défendu, on va y laisser notre peau !&quot;</p><p></p><p>Ce qui va suivre dépendra de la manière dont vous avez agi avec chacun des protagonistes.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[{"target":"5e8bee62-8f3f-40c0-af64-f19265524f7d","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"68f00e18019d803d0f95e734"}]},"kind":"flag"},"content":"<p>Vous vous êtes attiré les grâces de Marie Marguerite Constance d’Antioche, l&#39;impératrice.</p>","next":"seq-72","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e733"},{"showCondition":{"query":{"params":[{"target":"0948c1fc-1f77-4044-81e2-728d797e0155","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"68f00e18019d803d0f95e736"}]},"kind":"flag"},"content":"<p>Marie Marguerite Constance d’Antioche vous méprise et vous conspuez votre Misogynie...</p>","next":"seq-73","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e735"},{"showCondition":{"query":{"operator":"and","params":[{"kind":"flag","target":"3f035a4d-aa70-412c-b380-036578ba6526","condition":"=","value":true,"animation":false,"_id":"68f00e18019d803d0f95e738"},{"kind":"flag","target":"d00a083e-448f-4e8f-9553-862de61ae7a8","condition":"=","value":true,"animation":false,"_id":"68f00e18019d803d0f95e739"}]},"kind":"multiple"},"content":"<p>Andronikos et vous-même entretenez une haine réciproque, mais Jean Doukas vous apprécie.</p>","next":"seq-74","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e737"},{"showCondition":{"query":{"operator":"and","params":[{"kind":"flag","target":"d00a083e-448f-4e8f-9553-862de61ae7a8","condition":"=","value":true,"animation":false,"_id":"68f00e18019d803d0f95e73b"},{"kind":"flag","target":"5e8bee62-8f3f-40c0-af64-f19265524f7d","condition":"=","value":true,"animation":false,"_id":"68f00e18019d803d0f95e73c"}]},"kind":"multiple"},"content":"<p>Andronikos et vous-même entretenez une haine réciproque,  mais l&#39;impératrice vous soutient.</p>","next":"seq-75","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e73a"},{"showCondition":{"query":{"operator":"and","params":[{"kind":"flag","target":"d00a083e-448f-4e8f-9553-862de61ae7a8","condition":"=","value":true,"animation":false,"_id":"68f00e18019d803d0f95e73e"},{"kind":"flag","target":"e91d0194-b6f1-4837-aa04-9f814ad0b39e","condition":"=","value":true,"animation":false,"_id":"68f00e18019d803d0f95e73f"},{"kind":"flag","target":"5e8bee62-8f3f-40c0-af64-f19265524f7d","condition":"=","value":false,"animation":false,"_id":"68f00e18019d803d0f95e740"}]},"kind":"multiple"},"content":"<p>Andronikos et vous-même entretenez une haine réciproque, et personne ne vous aide.</p>","next":"seq-76","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e73d"},{"showCondition":{"query":{"params":[]}},"content":"<p>Toute l&#39;assemblée se moque éperdument des paroles erratiques d&#39;un moine possiblement aviné.</p>","next":"seq-77","actions":[],"conditions":[],"_id":"68f00e18019d803d0f95e741"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-68","content":"<p>Les colonnes s&#39;ébranlent de nouveau et les hérauts de chaque régiment tentent tant bien que mal d&#39;ordonner l&#39;ost impériale. Des cavaliers arrivent dans votre dos ; vous reconnaissez fugacement l&#39;avant-garde menée par Jean Doukas, le visage fermé, certainement soucieux de la stratégie déplorable qui a été mise en place.</p><p></p><p>Cet air ombrageux contamine votre humeur. Une vague de désespoir vous étreint, et ce n&#39;est pas le spectacle grandiose du défilé qui vous rassure.</p><p></p><p><em>Vous gagnez un jeton dévoyé dans la </em><strong><em>bile noire</em></strong><em> (4), eu égard pour votre perte d&#39;espoir.</em></p>","noContent":false,"final":false,"next":"seq-84","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-69","content":"<p>L&#39;impératrice s&#39;entretient avec son époux qui reste vautré sur son trône. Vous vous souvenez de votre rencontre, brève et intense, qui s&#39;était soldée par un désaveu complet à votre égard. </p><p></p><p><em>Cet incident cultive chez Christophe la vertu de la Prudence, qui augmente de 1.</em></p>","noContent":false,"final":false,"next":"seq-63","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-70","content":"<p>Ce traité bien plus récent et circonstancié est on ne peut plus clair :</p><p>S&#39;il y a de hautes montagnes, ... à la frontière de l&#39;ennemi, c&#39;est là qu&#39;il faut installer les postes de soldats... Il est important d&#39;occuper les sommets des montagnes... et l&#39;infanterie doit être placée des deux côtés de la route.&quot;</p><p></p><p>C&#39;est précisément ce qui n&#39;est pas prévu, et les cavaliers légers du sultan vont s&#39;y donner à coeur joie si personne n&#39;y trouve rien à redire.</p>","noContent":false,"final":false,"next":"seq-67","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-72","content":"<p>Marie d&#39;Antioche sort de sa réserve et plaide en votre faveur. Sans s&#39;avancer dans une hasardeuse expertise militaire, elle se porte garante de la valeur de votre parole.</p><p>Les passions s&#39;apaisent et l&#39;heure est à la réflexion. </p><p></p>","noContent":false,"final":false,"next":"seq-78","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-73","content":"<p>L&#39;impératrice s&#39;avance. Sa robe pourpre n&#39;a pas à rougir de la somptuosité de la toge de son époux. Un simple regard vers ce dernier, conjugué par une moue qu&#39;elle vous adresse, vous condamne à être inaudible auprès de l&#39;empereur Manuel Comnène.</p>","noContent":false,"final":false,"next":"seq-78","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-74","content":"<p>Si Andronikos possédait la malédiction de Méduse, vous seriez déjà pétrifié. Mais en miroir, vous apercevez le mouvement de Jean Doukas qui s&#39;avance vers vous, lève le bras en invitant l&#39;assemblée à vous écouter.</p>","noContent":false,"final":false,"next":"seq-78","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-75","content":"<p>Si Andronikos avait la malédiction de Méduse, vous seriez depuis longtemps pétrifié. Mais l&#39;empereur reste sourd à ses simagrées. En effet, l&#39;impératrice lui souffle quelques mots d&#39;apaisement, vous accordant une intercession inespérée. Vous continuez à plaider votre cause.</p>","noContent":false,"final":false,"next":"seq-78","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-76","content":"<p>Dans ces conditions, il est difficile de s&#39;en sortir. D&#39;un hochement de tête, Andronikos jure votre perte. Ses gardes d&#39;élite s&#39;emparent de vous et vous trainent plus loin. Personne ne lève le petit doigt pour assurer votre défense.</p><p>Vous appelez à l&#39;aide, mais les kataphraktoi vous maintiennent captif, non loin d&#39;un charroi. L&#39;armée se remet en branle, et vous n&#39;êtes pas de la partie. Quand l&#39;interminable procession prend fin, vous êtes seul avec vos geôliers.</p><p>C&#39;est là que vous comprenez votre destinée. Du charroi, deux gardes sortent une croix imposante dont ils assemblent les parties. Vous êtes crucifié, sans autre forme de procès.</p><p>Vos bourreaux s&#39;éloignent, votre mort est certaine. A moins que quelqu&#39;un n&#39;entende vos suppliques...</p>","noContent":false,"final":true,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-77","content":"<p>Cette scène vous rappelle votre premier sermon dans l&#39;église St Jean à Psamathia : la foule de byzantins baguenaudait et ne prêtait aucunement attention à vos paroles. Et ici, dans le désert d&#39;Anatolie, personne ne vous entendra crier.  </p>","noContent":false,"final":false,"next":"seq-78","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-78","content":"<p><em>Votre </em><strong><em>prudence </em></strong><em>et votre </em><strong><em>lâcheté </em></strong><em>ont augmenté d&#39;1 point, et sont respectivement de ‌<span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"0ee0735d-2026-4f35-99b5-8793d0d2df4e\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;0ee0735d-2026-4f35-99b5-8793d0d2df4e&quot;,&quot;name&quot;:&quot;Prudence&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]Prudence</span>‌ et de ‌<span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"02085f3e-158c-4be1-851a-c1812666e4ff\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;02085f3e-158c-4be1-851a-c1812666e4ff&quot;,&quot;name&quot;:&quot;Lâcheté&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]Lâcheté</span>‌.</em></p><p></p><p>L&#39;empereur se lève de son trône improvisé. C&#39;est la première fois que vous pouvez le contempler dans sa splendeur, et non par le biais d&#39;icônes ou de mosaïques blafardes et usées. Manuel Comnène toise l&#39;assemblée. Sa toge aux riches motifs et aux couleurs chatoyantes montre sa dignité consulaire ; ce <em>loros</em> est pourtant réservé à des moments privilégiés comme Pâques. Manuel a sans doute souhaité montrer à quel point cette expédition revêtait une symbolique des plus mystiques.</p><p></p><p><em>Réalisez une épreuve avec votre aptitude </em><strong><em>Dévoiler</em></strong><em>, amassez soit des 7, soit des 8. Vous pouvez </em><strong><em>donner la valeur de votre choix à l&#39;un de vos dés</em></strong><em> avant votre jet. Si vous obtenez un </em><strong><em>10</em></strong><em>, donnez-lui la valeur que vous souhaitez.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous obtenez une réussite ou moins.</p>","next":"seq-82","actions":[],"conditions":[],"_id":"68f15bf7019d803d0fa5558a"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous obtenez deux réussites ou plus.</p>","next":"seq-83","actions":[{"params":{"target":"453cec9a-af18-47c4-a45b-d6cfc03eb76a","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"68f15bf7019d803d0fa5558c"}],"conditions":[],"_id":"68f15bf7019d803d0fa5558b"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous avez plus de valeurs contraires  que de réussites (des 3 au lieu des 7, des 4 au lieu des 8).</p>","next":"seq-79","actions":[{"params":{"target":"66d53693-fbde-476a-9b89-71dc97b52e91","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68f15bf7019d803d0fa5558e"}],"conditions":[],"_id":"68f15bf7019d803d0fa5558d"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous êtes insatisfait de vos résultats. Gardez les en mémoire et consultez ce paragraphe.</p>","next":"seq-81","actions":[],"conditions":[],"_id":"68f15bf7019d803d0fa5558f"}],"usedVariables":["0ee0735d-2026-4f35-99b5-8793d0d2df4e","02085f3e-158c-4be1-851a-c1812666e4ff"],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-79","content":"<p>Vous avez pourtant l&#39;habitude de ressentir ce qui se trame. Mais là, c&#39;est comme si une force mystérieuse bloquait votre légendaire prescience.</p><p></p><p><em>Vous gagnez un</em><strong><em> dé dévoyé</em></strong><em>.</em></p>","noContent":false,"final":null,"isHappyEnd":null,"httplabel":null,"httplink":null,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Tant pis. Vous n&#39;allez pas chercher à en savoir davantage.</p>","next":"seq-66","actions":[],"conditions":[],"_id":"68f15bf7019d803d0fa55591"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous êtes insatisfait de vos résultats. Gardez les en mémoire et consultez ce paragraphe.</p>","next":"seq-81","actions":[],"conditions":[],"_id":"68f15bf7019d803d0fa55592"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-81","content":"<p>Vous vous concentrez. Les paupières closes, vous tentez de ressentir le vent, les odeurs, les bribes de conversation, dans une stase mystique qui puise dans vos réserves. Vous décidez de vous <strong>dépasser</strong>.</p><p></p><p><em>Vous pouvez modifier d&#39;un point chaque résultat de dé allant de 1 à 8. Un 1 peut devenir un 8 ou un 2, un 8 devient un 1 ou un 7, etc. Pour chaque résultat modifié, </em><strong><em>vous gagnez un dé dévoyé</em></strong><em>. Réexaminez les choix du paragraphe précédent.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous ne gagnez aucun dé dévoyé.</p>","next":"seq-78","actions":[{"params":{"target":"66d53693-fbde-476a-9b89-71dc97b52e91","subTargets":[],"modifier":"add","value":0,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68f15bf7019d803d0fa55596"}],"conditions":[],"_id":"68f15bf7019d803d0fa55595"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous gagnez un dé dévoyé.</p>","next":"seq-78","actions":[{"params":{"target":"66d53693-fbde-476a-9b89-71dc97b52e91","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68f15bf7019d803d0fa55598"}],"conditions":[],"_id":"68f15bf7019d803d0fa55597"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous gagnez deux dés dévoyés.</p>","next":"seq-78","actions":[{"params":{"target":"66d53693-fbde-476a-9b89-71dc97b52e91","subTargets":[],"modifier":"add","value":2,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68f15bf7019d803d0fa5559a"}],"conditions":[],"_id":"68f15bf7019d803d0fa55599"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous gagnez trois dés dévoyés.</p>","next":"seq-78","actions":[{"params":{"target":"66d53693-fbde-476a-9b89-71dc97b52e91","subTargets":[],"modifier":"add","value":3,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68f15bf7019d803d0fa5559c"}],"conditions":[],"_id":"68f15bf7019d803d0fa5559b"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-82","content":"<p>Il se passe quelque chose d&#39;indéfinissable et vous pressentez que cela assaille l&#39;empereur lui-même. Mais vous êtes plus dans le registre de la sensation fugace, que de la révélation éclairante.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous êtes insatisfait de vos résultats. Gardez les en mémoire et consultez ce paragraphe.</p>","next":"seq-81","actions":[],"conditions":[],"_id":"68f15bf7019d803d0fa5559e"},{"showCondition":{"query":{"params":[]}},"content":"<p>Tant pis, vous ne souhaitez pas vous fatiguer pour si peu.</p>","next":"seq-66","actions":[],"conditions":[],"_id":"68f15bf7019d803d0fa5559f"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-83","content":"<p>C&#39;est étrange. Vous focalisez votre attention sur les vents tourbillonnants qui se forment à même le sol et convergent vers l&#39;empereur. D&#39;une teinte cireuse, ces volutes enveloppent l&#39;empereur et paralysent sa réflexion. C&#39;est la première fois que vous assistez à ce phénomène. Et vous semblez être le seul à le percevoir. Vous, et son possible instigateur ?</p>","noContent":false,"final":false,"next":"seq-66","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-84","content":"<p>Myriokephalon. La forteresse juchée sur ces hauteurs, un joyau si tentant pour les jeunes nobles qui accompagnent l&#39;empereur mais qui le desservent par leur fougue. Inexpérience de la jeunesse !</p><p>Quoique... L&#39;avant-garde avance à vive allure en contrebas de ces promontoires rocheux, comme si les Turcs s&#39;étaient assoupis en si bon matin.</p><p></p><p>Elle disparait dans le nuage de poussières qu&#39;elle soulève, mais deux autres nuages fondent des côtés pour la harceler. Les archers impériaux se mettent à l&#39;oeuvre pour disperser ces cavaliers légers. Chiens galeux d&#39;infidèles ! Qu&#39;à cela ne tienne ! Le vent de la victoire se lève, mais pas pour le camp que vous espérez...</p>","noContent":false,"final":false,"next":"seq-85","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"26871d90-9119-41f6-b3bd-8f3c65ab8ad5","size":"small","isBefore":false,"allowZoom":true},"id":"seq-85","content":"<p>Le train de bagages auquel vous appartenez entre à son tour dans le défilé, à la suite des chevaliers menés par Baudouin, le téméraire frère de l&#39;impératrice.</p><p>Ce bouillant jeune homme va trouver un adversaire à sa mesure. En face, des cavaliers Gulyam, l&#39;élite ennemie, prête à charger. Et comme prélude à l&#39;enfer qui vous attend, une volée de flèches constelle le ciel et s&#39;abat sur vos compagnons d&#39;infortune. Vous fermez les yeux, en bredouillant une muette prière pour échapper à leurs mortelles caresses.</p><p></p><p><em>Réalisez une épreuve </em><strong><em>d&#39;Occulter</em></strong><em>. Jetez autant de dés que vous avez dans cette aptitude. Essayez d&#39;obtenir autant de 7 </em><strong><em>ou </em></strong><em>de 8 que possible. Si vous obtenez un 10, transformez-le dans la valeur que vous voulez. Vous pouvez aussi dévoyer vos dés, si vous avez appris à le faire.</em></p><p><em>Si vous obtenez autant ou plus de résultats opposés (de 3 par rapport au 7, ou de 4 par rapport au 8), c&#39;est un échec.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous accumulez deux réussites ou plus.</p>","next":"seq-86","actions":[{"params":{"target":"f4dfd68a-536e-427a-8116-a520fc95525a","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68fbef3a019d803d0fde8403"}],"conditions":[],"_id":"68fbef3a019d803d0fde8402"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous ne parvenez pas à atteindre ce seuil.</p>","next":"seq-87","actions":[{"params":{"target":"786b5c6f-5539-4c11-be25-aa76752b6768","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68fbef3a019d803d0fde8405"}],"conditions":[],"_id":"68fbef3a019d803d0fde8404"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous subissez un échec cuisant.</p>","next":"seq-135","actions":[],"conditions":[],"_id":"6917b42b019d803d0fa85597"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-86","content":"<p>Vous vous en tirez par miracle. Nul doute que le Créateur avait encore besoin de vous, pour que vous vous retrouviez là, tremblant, entouré d&#39;innombrables traits fichés dans le sol.</p><p></p><p><em>Votre espérance s&#39;améliore et son score actuel est de ‌</em><span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"f4dfd68a-536e-427a-8116-a520fc95525a\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;f4dfd68a-536e-427a-8116-a520fc95525a&quot;,&quot;name&quot;:&quot;Espérance&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]Espérance</span>‌.</p>","noContent":false,"final":false,"next":"seq-88","actions":[],"conditions":[],"choices":[],"usedVariables":["f4dfd68a-536e-427a-8116-a520fc95525a"],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-87","content":"<p>Vous vous en tirez par miracle. Nul doute que le Créateur repousse l&#39;heure de votre mort, mort certaine pour une heure incertaine, mais qui approche à grand pas. Vous étouffez un juron blasphématoire et vous remettez sur pied.</p><p></p><p><em>Votre acédie, le doute en Dieu, s&#39;empire et son score actuel est de ‌<span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"786b5c6f-5539-4c11-be25-aa76752b6768\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;786b5c6f-5539-4c11-be25-aa76752b6768&quot;,&quot;name&quot;:&quot;Acédie&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]Acédie</span>‌</em>.</p>","noContent":false,"final":false,"next":"seq-88","actions":[],"conditions":[],"choices":[],"usedVariables":["786b5c6f-5539-4c11-be25-aa76752b6768"],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-88","content":"<p>L&#39;armée byzantine est prise au piège. Vous n&#39;apercevez plus guère l&#39;avant-garde, votre train est bloqué et des hordes de Turcomans dévalent les collines pour frapper les gardes de l&#39;empereur juste derrière vous, incapables de franchir l&#39;enchevêtrement de chariots et de charrois de ravitaillement.</p><p>L&#39;espace d&#39;un instant, il vous semble apercevoir les yeux écarquillés de l&#39;empereur, perdant de sa superbe, réalisant pour la première fois à quel point il a été aveugle - ou aveuglé ?</p><p></p><p>D&#39;ailleurs, vous feriez bien de ne pas suivre son exemple : un cavalier du régiment d&#39;élite des gulyam fond à votre endroit, la lance au clair.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous tentez de vous cacher derrière votre attirail.</p>","next":"seq-89","actions":[{"params":{"target":"02085f3e-158c-4be1-851a-c1812666e4ff","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68fe9e67019d803d0fea205a"}],"conditions":[],"_id":"68fe9e67019d803d0fea2059"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-89","content":"<p>Il vous semble entendre le malfrat, goguenard, qui se gausse de votre singulière lâcheté. Il met pied à terre pour ouvrir votre coffre et s&#39;emparer du reliquaire.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[{"target":"02085f3e-158c-4be1-851a-c1812666e4ff","condition":"<","value":2,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false,"_id":"68fe9e67019d803d0fea205d"}]},"kind":"counter"},"content":"<p>Saint Christophe ne peut tomber aux mains des suppôts d&#39;Allah&nbsp;! Vous intervenez.</p>","next":"seq-90","actions":[{"params":{"target":"4032bcf3-20eb-48b5-aa68-35dd0aa80467","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"690b22cf019d803d0f458d3d"}],"conditions":[],"_id":"68fe9e67019d803d0fea205c"},{"showCondition":{"query":{"params":[]}},"content":"<p>La prudence est mère de survie. Vous restez terré comme un pleutre.</p>","next":"seq-91","actions":[{"params":{"target":"0c83b8a9-5464-4d9e-b5b2-de155e423707","subTargets":[],"modifier":"sub","animation":false},"kind":"object","condition":null,"_id":"68fff452019d803d0ff3f234"},{"params":{"target":"4032bcf3-20eb-48b5-aa68-35dd0aa80467","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"690b22cf019d803d0f458d41"}],"conditions":[],"_id":"68fe9e67019d803d0fea205e"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-90","content":"<p>Encore faut-il savoir de quelle manière vous souhaitez vous confronter à ce formidable opposant...</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"puzzle":{"kind":"object","size":4,"defaultNext":"seq-94","noObjectNext":"seq-94","inventoryStrategy":"in","tagStrategy":"one","toggleStrategy":"no","displayKind":"simple","onlyTags":[],"codes":[{"value":"48303ae6-106a-41bc-bd4b-4efff1f5d102","next":"seq-95","actions":[],"_id":"68fff452019d803d0ff3f237"},{"value":"da584dc2-81c7-4537-9091-36830837e4ae","next":"seq-99","actions":[],"_id":"68fff452019d803d0ff3f238"}],"allowBack":false,"_id":"68fff452019d803d0ff3f236"},"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-91","content":"<p>Le soldat selkjud baragouine dans sa langue sarrasine un juron de contentement. Afin d&#39;apporter davantage de chaos, il frappe l&#39;encolure de la mule qui tire votre charroi. La bête a du caractère et, d&#39;une ruade, blesse son cheval qui détale sous le coup de la douleur.</p><p>Visiblement, le Turc apprécie peu d&#39;être rabaissé au rang de piéton. Il pousse de terribles imprécations et semble avoir scellé le destin du canasson.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous refusez toujours d&#39;intervenir.</p>","next":"seq-92","actions":[{"params":{"target":"02085f3e-158c-4be1-851a-c1812666e4ff","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68fe9e67019d803d0fea2062"}],"conditions":[],"_id":"68fe9e67019d803d0fea2061"},{"showCondition":{"query":{"params":[{"target":"4fab29aa-4d04-46d2-be6a-8d2e56889231","condition":">","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false,"_id":"68fe9e67019d803d0fea2064"}]},"kind":"counter"},"content":"<p>C&#39;en est trop. Il est temps de montrer de quel bois vous êtes fait&nbsp;!</p>","next":"seq-90","actions":[],"conditions":[],"_id":"68fe9e67019d803d0fea2063"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-92","content":"<p>Le gulyam parvient à faire fuir votre mule et votre attelage. Il remontait en selle quand soudain, il aperçut votre silhouette tremblotante, désormais découverte, si vulnérable...</p><p>L&#39;épée jaillit du fourreau. Le sang va couler. Et ce sera sans doute le vôtre...</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"puzzle":{"kind":"object","size":4,"defaultNext":"seq-94","noObjectNext":"seq-94","inventoryStrategy":"in","tagStrategy":"one","toggleStrategy":"no","displayKind":"simple","onlyTags":[],"codes":[{"value":"48303ae6-106a-41bc-bd4b-4efff1f5d102","next":"seq-95","actions":[],"_id":"68fff452019d803d0ff3f240"}],"allowBack":false,"_id":"68fe9e67019d803d0fea2066"},"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-94","content":"<p>Le Turc n&#39;est pas là pour témoigner de sa miséricorde. D&#39;un geste presque mécanique, il dégaine sa lame et vous pourfend au niveau du ventre. Vous n&#39;avez jamais éprouvé une telle douleur, de celles qui vrillent vos entrailles et vous dépossède de toute chaleur corporelle. S&#39;effondrer dans la terre meuble en frissonnant malgré le soleil qui vous darde de ses rayons bienfaisants...</p><p>Et vous entendez à peine, dans votre longue agonie, les cris de curieux musulmans qui tentent de vous réanimer en implorant la mansuétude d&#39;Allah...</p>","noContent":false,"final":true,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-95","content":"<p>Vous cherchez fiévreusement le bâton lesté qui vous a été donné par la soldatesque de Byzance. Les sourcils du Gulyam épousent un joli circonflexe, tant sa surprise est grande de voir un moine &quot;guerrier&quot;. Vous avez peut-être un coup à jouer.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous préférez maintenir votre garde, prêt à parer.</p>","next":"seq-96","actions":[],"conditions":[],"_id":"68fff452019d803d0ff3f244"},{"showCondition":{"query":{"params":[]}},"content":"<p>Solide sur vos appuis, vous saurez esquiver le premier coup.</p>","next":"seq-97","actions":[],"conditions":[],"_id":"68fff452019d803d0ff3f245"},{"showCondition":{"query":{"params":[{"target":"ba89ff01-21f3-4c5e-9168-93eb681dde37","condition":"=","value":false,"valueType":"bool","animation":false,"_id":"69028c24019d803d0f09847c"}]},"kind":"flag"},"content":"<p>Autant bénéficier de l&#39;avantage&nbsp;! Vous lui assénez un premier coup de haut en bas, sur le chef.</p>","next":"seq-98","actions":[],"conditions":[],"_id":"68fff452019d803d0ff3f246"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-96","content":"<p>Concentré, vous tournez autour de votre adversaire, comme une étrange ronde au ralenti. Ce ne sera pas des pas de jouvenceaux qui vous attendent&nbsp;: les coups seront mortels.</p><p>L&#39;ennemi est rompu à ce genre d&#39;exercice et se fend pour vous atteindre d&#39;estoc&nbsp;: vous tentez de dévier le coup en percutant sa lame de votre bâton.</p><p><br/></p><p><em>Réalisez une épreuve de </em><strong><em>Se Mesurer </em></strong><em>avec comme valeurs de réussite des 5 ou des 6. Transformez vos 10 dans les valeurs de votre choix. </em><strong><em>Dévoyez </em></strong><em>les dés ou réalisez une </em><strong><em>prouesse </em></strong><em>si vous savez comment faire.</em></p><p><em>Votre adversaire a cumulé 3 réussites.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Examinez les conséquences de cet affrontement dans le paragraphe qui suit.</p>","next":"seq-106","actions":[],"conditions":[],"_id":"6900ffb3019d803d0ffb88ba"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-97","content":"<p>Concentré, vous tournez autour de votre adversaire, comme une étrange ronde au ralenti. Ce ne sera pas des pas de jouvenceaux qui vous attendent : les coups seront mortels.</p><p>L&#39;ennemi est rompu à ce genre d&#39;exercice et se fend pour vous atteindre d&#39;estoc : vous pivotez rapidement sur-vous même pour que la lame ne fasse que vous effleurer .</p><p></p><p><em>Réalisez une épreuve de </em><strong><em>Se Déplacer </em></strong><em>avec comme valeurs de réussite des 5 ou des 6. Transformez vos 10 dans les valeurs de votre choix. </em><strong><em>Dévoyez </em></strong><em>les dés ou réalisez une </em><strong><em>prouesse </em></strong><em>si vous savez comment faire.</em></p><p><em>Votre adversaire a cumulé 3 réussites.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Examinez les conséquences de cet affrontement dans le paragraphe qui suit.</p>","next":"seq-106","actions":[],"conditions":[],"_id":"6900ffb3019d803d0ffb88bc"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-98","content":"<p>Vous préférez conserver l&#39;initiative du combat, au grand dam de votre adversaire. Cela fait bien longtemps que vous n&#39;avez plus manié d&#39;arme, mais vous vous surprenez à asséner un coup puissant, doublé d&#39;un cri de guerre qui éteint momentanément le vacarme de la bataille alentour.</p><p></p><p><em>Réalisez une épreuve de </em><strong><em>Se Mesurer </em></strong><em>avec comme valeurs de réussite des 1 ou des 2. Transformez vos 10 dans les valeurs de votre choix. </em><strong><em>Dévoyez </em></strong><em>les dés ou réalisez une </em><strong><em>prouesse </em></strong><em>si vous savez comment faire.</em></p><p><em>Votre adversaire a cumulé 2 réussites pour parer.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous gagnez, par une réussite de plus que votre adversaire.</p>","next":"seq-108","actions":[],"conditions":[],"_id":"69028c24019d803d0f098482"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous échouez&nbsp;: votre bâton ne parvient pas à atteindre votre adversaire qui riposte.</p>","next":"seq-94","actions":[],"conditions":[],"_id":"69028c24019d803d0f098483"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous gagnez par au moins deux réussites d&#39;écart entre vous et lui.</p>","next":"seq-110","actions":[],"conditions":[],"_id":"69028c24019d803d0f098484"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous parvenez à réaliser une prouesse martiale. Une première pour vous, une dernière pour votre adversaire.</p>","next":"seq-112","actions":[{"params":{"target":"c9830552-07f5-4262-b2c6-f62ed527e3b6","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"69028c24019d803d0f098486"}],"conditions":[],"_id":"69028c24019d803d0f098485"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-99","content":"<p>Vous vous jetez sur le reliquaire, cherchant compulsivement à l&#39;ouvrir. La statuette qui représente Christophe le Réprouvé en jaillit, et vous la saisissez de vos doigts boudinés. Dans le même temps, le Turc s&#39;applique : les deux mains sur la garde, il abat son épée d&#39;un coup circulaire vers votre épaule.</p><p></p><p><em>Réalisez une épreuve de </em><strong><em>Dévoiler </em></strong><em>avec ‌</em><span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"68f698e4-b540-4936-95f6-30162bbe6d83\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;68f698e4-b540-4936-95f6-30162bbe6d83&quot;,&quot;name&quot;:&quot;Apt_Devoiler&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]Apt_Devoiler</span>‌ <em>dés. Comptez les réussites sur des </em><strong><em>7</em></strong><em> ou sur des </em><strong><em>8</em></strong><em>. Transformez les </em><strong><em>10 </em></strong><em>dans les valeurs que vous souhaitez. Si vous avez appris à </em><strong><em>dévoyer des dés</em></strong><em>, vous pouvez le faire.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous obtenez au moins deux réussites.</p>","next":"seq-100","actions":[],"conditions":[],"_id":"68fff452019d803d0ff3f24b"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous avez une réussite, ou moins...</p>","next":"seq-101","actions":[],"conditions":[],"_id":"68fff452019d803d0ff3f24c"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous souhaitez donner toute votre ferveur, toute votre âme dans cette (dernière) prière.</p>","next":"seq-103","actions":[],"conditions":[],"_id":"68fff452019d803d0ff3f24d"}],"usedVariables":["68f698e4-b540-4936-95f6-30162bbe6d83"],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-100","content":"<p>La statuette devient tellement lourde que votre corps bascule en avant ; vous esquivez de fait le coup qui vous était administré, au grand dam de votre adversaire. Vous avez un temps très court pour décider de la suite des événements...</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"puzzle":{"kind":"object","size":4,"defaultNext":"seq-94","noObjectNext":"seq-94","inventoryStrategy":"in","tagStrategy":"one","toggleStrategy":"no","displayKind":"simple","onlyTags":[],"codes":[{"value":"48303ae6-106a-41bc-bd4b-4efff1f5d102","next":"seq-95","actions":[],"_id":"68fff452019d803d0ff3f250"}],"allowBack":false,"_id":"68fff452019d803d0ff3f24f"},"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-101","content":"<p>Rien ne se passe. La lame s&#39;abat sur votre clavicule, qui ne tient guère le choc. C&#39;est une douleur fulgurante qui vous étreint. Il ne vous reste qu&#39;une seule solution.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"puzzle":{"kind":"object","size":4,"defaultNext":"seq-94","noObjectNext":"seq-94","inventoryStrategy":"in","tagStrategy":"one","toggleStrategy":"no","displayKind":"simple","onlyTags":[],"codes":[{"value":"4032bcf3-20eb-48b5-aa68-35dd0aa80467","next":"seq-102","actions":[],"_id":"68fff452019d803d0ff3f253"}],"allowBack":false,"_id":"68fff452019d803d0ff3f252"},"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-102","content":"<p>La prière. Vous avez maintes fois prié, sept pour chaque jour depuis votre ordination, mais avec l&#39;esprit embué de sommeil ou perclus d&#39;acédie. Mais là, si votre supplique pouvait émouvoir le Très-Haut, juste une fois...</p><p></p><p><em>Réalisez une épreuve de </em><strong><em>Dévoiler</em></strong><em>. Comptez les succès sur des </em><strong><em>7</em></strong><em> ou sur des </em><strong><em>8</em></strong><em>. Transformez les </em><strong><em>10 </em></strong><em>dans les valeurs que vous souhaitez. Si vous avez appris à </em><strong><em>dévoyer des dés</em></strong><em>, faites-le.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous obtenez moins de deux réussites.</p>","next":"seq-132","actions":[],"conditions":[],"_id":"68fff452019d803d0ff3f255"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous avez au moins deux réussites.</p>","next":"seq-133","actions":[],"conditions":[],"_id":"68fff452019d803d0ff3f256"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous souhaitez aller bien au-delà, libérer votre âme et réaliser un pur prodige.</p>","next":"seq-134","actions":[],"conditions":[],"_id":"68fff452019d803d0ff3f257"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-103","content":"<p>Vous allez tenter une prouesse, condition nécessaire pour déclencher un <strong>prodige</strong>.</p><p></p><p><em>Pour cela, vous devrez obtenir au moins une de vos valeurs de réussite (le 7 ou le 8) dans vos dés de Souffle et n&#39;avoir aucune valeur opposée (le 3 pour le 7, le 4 pour le 8) dans vos résultats finaux.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous parvenez à obtenir un miracle de la part de Saint Christophe.</p>","next":"seq-105","actions":[{"params":{"target":"62dbcb13-de0f-4792-8c99-3698479b08b7","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"6900fcca019d803d0ffb4479"},{"params":{"target":"7ae47b43-685e-459d-9c4a-4f3d45627f61","subTargets":[],"modifier":"add","value":2,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"6900fcca019d803d0ffb447a"}],"conditions":[],"_id":"6900fcca019d803d0ffb4478"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous échouez, quelle qu&#39;en soit la raison. Rien de miraculeux se passe, en revanche...</p>","next":"seq-94","actions":[],"conditions":[],"_id":"6900fcca019d803d0ffb447b"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-105","content":"<p>C&#39;est une sensation des plus étranges. Vous avez l&#39;impression de grandir, passant de quatre à sept coudées. Le Turc vous semble ridiculement petit. Un  bâton de marche est apparu dans votre main, à moins que ce ne soit le bâton lesté si vous l&#39;aviez récupéré.</p><p>Tel un géant, vous vous remettez sur pied et êtes décidé à profiter de cette vigueur nouvelle pour écraser ce vermisseau.</p><p></p><p><em>Votre aptitude </em><strong><em>Se Mesurer</em></strong><em> gagne 2 niveaux pour se fixer à ‌<span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"7ae47b43-685e-459d-9c4a-4f3d45627f61\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;7ae47b43-685e-459d-9c4a-4f3d45627f61&quot;,&quot;name&quot;:&quot;Apt_SeMesurer&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]Apt_SeMesurer</span>‌.</em></p>","noContent":false,"final":false,"next":"seq-95","actions":[],"conditions":[],"choices":[],"usedVariables":["7ae47b43-685e-459d-9c4a-4f3d45627f61"],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-106","content":"<p>Vous défendez votre peau face à un guerrier chevronné. Vous n&#39;avez guère le droit à l&#39;erreur.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous échouez&nbsp;: vous n&#39;avez pas assez de réussites face aux trois réussites rassemblées par votre adversaire.</p>","next":"seq-94","actions":[],"conditions":[],"_id":"69028c24019d803d0f09849d"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous faites le même nombre de réussites que lui.</p>","next":"seq-115","actions":[],"conditions":[],"_id":"69028c24019d803d0f09849e"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous amassez plus de réussites que lui.</p>","next":"seq-116","actions":[],"conditions":[],"_id":"69028c24019d803d0f09849f"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-108","content":"<p>L&#39;arc de cercle que décrit votre bâton est parfait. Sa trajectoire ne peut que fendre le crâne du gulyam... sauf que vous aviez sous-estimé la dureté de son casque. Le bruit est sonore, le Turc est légèrement incommodé mais en secouant la tête par d&#39;amples mouvements de la nuque, il reprend ses esprits et se met à attaquer.</p><p></p><p><em>Revenez à la situation précédente pour vous défendre, coûte que coûte.</em></p>","noContent":false,"final":false,"next":"seq-95","actions":[{"params":{"target":"ba89ff01-21f3-4c5e-9168-93eb681dde37","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"69028c24019d803d0f0984a2"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-110","content":"<p>-Pour Athos !</p><p>Votre cri de guerre improvisé traduit votre soulagement de voir votre bâton briser le bras gauche du soldat, du moins, c&#39;est ce que vous concluez du bruit mat et de l&#39;angle étrange que ce dernier prend désormais. Le visage grimaçant, votre adversaire vous toise, mais sans le dédain qu&#39;il affichait jusqu&#39;alors.</p><p>Le combat cesse cependant par un événement inopiné.</p>","noContent":false,"final":false,"next":"seq-111","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-111","content":"<p>Manuel Comnène sonne la retraite. Ce qui reste de l&#39;avant-garde revient en arrière ; les cavaliers manquent de vous culbuter et la piétaille qui vous servait de compagne d&#39;infortune tente de leur emboiter le pas. Les gardes de l&#39;empereur reculent dans une formation serrée, vers une colline qui servira probablement de refuge pour stabiliser la situation. </p><p>C&#39;est comme si la défaite de Manzibert s&#39;était rejouée non pas à l&#39;identique, mais pas loin, à un siècle d&#39;écart.</p><p></p><p>Vous avez survécu à la bataille, mais pas encore à la guerre.</p>","noContent":false,"final":false,"next":"seq-117","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-112","content":"<p>Votre arme s&#39;écrase sur l&#39;épaule droite du Turc qui gémit quand sa clavicule cède sous l&#39;impact. Un second cri étouffé s&#39;échappe quand d&#39;estoc, le bâton rencontre le foie mal protégé de l&#39;infortuné qui trépasse sur le coup.</p><p>Il semblerait que vous ayez gagné.</p><p></p><p>Mais comment allez-vous réagir à l&#39;ivresse du combat ?</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Votre score dévoyé en feu ‌<span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"a00ec6bd-1b4e-4106-ba6a-98f01245c0df\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;a00ec6bd-1b4e-4106-ba6a-98f01245c0df&quot;,&quot;name&quot;:&quot;1FeuDev&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]1FeuDev</span>‌ ou en bile jaune ‌<span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"54a46af8-004d-4c42-a899-7fbb3ee1d7e6\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;54a46af8-004d-4c42-a899-7fbb3ee1d7e6&quot;,&quot;name&quot;:&quot;2BJDev&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]2BJDev</span>‌ excède 1. Votre fureur prend le dessus.</p>","next":"seq-113","actions":[],"conditions":[],"_id":"69028c24019d803d0f0984a7"},{"showCondition":{"query":{"params":[]}},"content":"<p>Votre score dévoyé en feu ‌<span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"a00ec6bd-1b4e-4106-ba6a-98f01245c0df\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;a00ec6bd-1b4e-4106-ba6a-98f01245c0df&quot;,&quot;name&quot;:&quot;1FeuDev&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]1FeuDev</span>‌ ou en bile jaune ‌<span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"54a46af8-004d-4c42-a899-7fbb3ee1d7e6\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;54a46af8-004d-4c42-a899-7fbb3ee1d7e6&quot;,&quot;name&quot;:&quot;2BJDev&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]2BJDev</span>‌ n&#39;excède pas 1. Vous pouvez vous contenir.</p>","next":"seq-114","actions":[],"conditions":[],"_id":"69028c24019d803d0f0984a8"}],"usedVariables":["a00ec6bd-1b4e-4106-ba6a-98f01245c0df","54a46af8-004d-4c42-a899-7fbb3ee1d7e6","a00ec6bd-1b4e-4106-ba6a-98f01245c0df","54a46af8-004d-4c42-a899-7fbb3ee1d7e6"],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-113","content":"<p>Votre jugement est aboli, et votre corps n&#39;est plus qu&#39;une machine à broyer le cadavre de celui qui a osé intenté à votre vie. C&#39;est un amas sanguinolent qui gît à vos pieds quand vous reprenez difficilement vos esprits. C&#39;est alors que sonne le tocsin.</p><p></p><p><em>Vous décompensez du trop-plein de colère. Mais vous vous surprenez à apprécier ce massacre. Votre malignité augmente à ‌</em><span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"660ee971-d612-418f-baa9-f16590129f1a\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;660ee971-d612-418f-baa9-f16590129f1a&quot;,&quot;name&quot;:&quot;Malignité&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]Malignité</span>‌.</p>","noContent":false,"final":false,"next":"seq-111","actions":[{"params":{"target":"a00ec6bd-1b4e-4106-ba6a-98f01245c0df","subTargets":[],"modifier":"sub","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"69028c24019d803d0f0984aa"},{"params":{"target":"54a46af8-004d-4c42-a899-7fbb3ee1d7e6","subTargets":[],"modifier":"sub","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"69028c24019d803d0f0984ab"},{"params":{"target":"660ee971-d612-418f-baa9-f16590129f1a","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"69028c24019d803d0f0984ac"}],"conditions":[],"choices":[],"usedVariables":["660ee971-d612-418f-baa9-f16590129f1a"],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-114","content":"<p>De mémoire de Christophe de Mitylène, c&#39;est la première fois que vous ôtez la vie à quelqu&#39;un. Mais vous n&#39;avez guère le temps de vous appesantir sur votre sort. Un puissant cor sonne : un événement majeur de la bataille vient de survenir.</p><p></p><p><em>Votre acédie vient d&#39;augmenter à ‌</em><span class=\"ql-moikivar\" contenteditable=\"false\" data-var-id=\"786b5c6f-5539-4c11-be25-aa76752b6768\" data-var-op=\"value\" data-value=\"{&quot;id&quot;:&quot;786b5c6f-5539-4c11-be25-aa76752b6768&quot;,&quot;name&quot;:&quot;Acédie&quot;,&quot;op&quot;:&quot;value&quot;}\">[value:]Acédie</span>‌.<em> Vous doutez de la mansuétude de Dieu envers un assassin tel que vous.</em></p>","noContent":false,"final":false,"next":"seq-111","actions":[{"params":{"target":"786b5c6f-5539-4c11-be25-aa76752b6768","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"69028c24019d803d0f0984ae"}],"conditions":[],"choices":[],"usedVariables":["786b5c6f-5539-4c11-be25-aa76752b6768"],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-115","content":"<p>In extremis, la lame du gulyam ricoche sur votre bâton, entamant le bois sans que ce dernier ne rompe. Vous reprenez vos distances avec votre ennemi, mais votre combat est troublé par un bruit inattendu.</p>","noContent":false,"final":false,"next":"seq-111","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-116","content":"<p>C&#39;est proprement incroyable : malgré plusieurs passes d&#39;armes, vous déviez ou esquivez tous les coups du Turc visiblement chamboulé par tant de réussite... ou de chance. Essoufflé, il vous donne l&#39;occasion de passer à l&#39;attaque !</p>","noContent":false,"final":false,"next":"seq-98","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-117","content":"<p>C&#39;est comme si les deux armées léchaient leurs plaies, sans s&#39;éloigner l&#39;une de l&#39;autre pour autant.</p><p>Rapidement, des plénipotentiaires arborant leurs fanions diplomatiques sont lâchés de part et d&#39;autre, avant de converger vers le défilé, repaire de Kilic Arslan.</p><p>L&#39;attente est interminable. La soif étreint un grand nombre de vos coreligionnaires, les Turcs ayant méthodiquement asséché ou gâté les puits. Enfin, les gonfanons de Byzance reviennent dans un nuage de poussières.</p><p></p><p>Il est peut-être temps de se rapprocher de la tente où l&#39;empereur s&#39;est tapi.</p>","noContent":false,"final":false,"next":"seq-118","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-118","content":"<p>Manuel Comnène est toujours assis, mutique, songeur. L&#39;estrade qui vous sépare de lui aurait du glorifier celui qui dispose de la <em>felicitas</em>, ce don divin providentiel, de sa <em>virtus et andreia</em>, courage et bravoure. Il n&#39;en est rien. </p><p><br/></p><p>Qu&#39;est devenu l&#39;Homme à la Pourpre, dépositaire du dernier empire hérité de la glorieuse Rome&nbsp;?</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[{"target":"5e8bee62-8f3f-40c0-af64-f19265524f7d","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"69028c24019d803d0f0984b4"}]},"kind":"flag"},"content":"<p>Vous êtes entré dans les bonnes grâces de l&#39;impératrice.</p>","next":"seq-119","actions":[],"conditions":[],"_id":"69028c24019d803d0f0984b3"},{"showCondition":{"query":{"params":[{"target":"d00a083e-448f-4e8f-9553-862de61ae7a8","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"69028c24019d803d0f0984b6"}]},"kind":"flag"},"content":"<p>Le général Andronikos vous est défavorable.</p>","next":"seq-121","actions":[],"conditions":[],"_id":"69028c24019d803d0f0984b5"},{"showCondition":{"query":{"params":[{"target":"3f035a4d-aa70-412c-b380-036578ba6526","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"69028c24019d803d0f0984b8"}]},"kind":"flag"},"content":"<p>Jean Doukas vous apprécie.</p>","next":"seq-122","actions":[],"conditions":[],"_id":"69028c24019d803d0f0984b7"},{"showCondition":{"query":{"params":[]}},"content":"<p>Aucun personnage présent et puissant ne nourrit quelconque sentiment envers vous.</p>","next":"seq-124","actions":[],"conditions":[],"_id":"6903da94019d803d0f14aa65"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-119","content":"<p>Marie Marguerite Constance d’Antioche vous adresse un sourire où la tendresse se mêle à la tristesse. Un témoignage de son affliction quant à la tournure des événements, vous vous dîtes, mais la réalité est toute autre...</p>","noContent":false,"final":false,"next":"seq-120","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-120","content":"<p>-&quot;Arrêtez cet homme. Il sera la première monnaie d&#39;échanges pour apaiser Arslan.&quot;</p><p>Deux kataphraktoi s&#39;emparent de vous et vous ligotent sans ménagement. Vous avez beau protester, rien n&#39;y fait. </p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Nul n&#39;échappe à son destin. Vous vous laissez faire ; à quoi bon résister&nbsp;?</p>","next":"seq-123","actions":[],"conditions":[],"_id":"69028c24019d803d0f0984bb"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-121","content":"<p>Et c&#39;est bien peu de le dire...</p><p>Vous vous avancez vers l&#39;estrade sous les yeux de ce général cruel. Ce dernier ne détache pas son regard du vôtre. Il esquisse un sourire narquois, et vous allez en comprendre la raison...</p>","noContent":false,"final":false,"next":"seq-120","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-122","content":"<p>L&#39;hétériarque de l&#39;empereur reste interdit à votre approche. Il se contente d&#39;une muette prière, et d&#39;une phrase sibylline :</p><p>-&quot;N&#39;aie crainte de là où tu vas. Chacun doit faire face à sa condition de perpétuel pèlerin.&quot;</p><p>Vous froncez les sourcils, ne comprenant rien à ce qu&#39;il dit. Mais la suite des événements va rapidement vous mettre au parfum.</p>","noContent":false,"final":false,"next":"seq-120","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-123","content":"<p>---------------------------------</p>","noContent":false,"final":true,"isHappyEnd":true,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-124","content":"<p>---------------------------------------------</p>","noContent":false,"final":false,"next":"seq-118","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-125","content":"<p><em>-&quot;Car nous n&#39;invoquons pas le nom du maître pour qu&#39;il nous couronne ou nous accorde toute autre grâce, mais pour qu&#39;il aie pitié. C&#39;est la pitié, le pardon et la remise des dettes que nous demandons au Dieu ami des hommes.</em> <em>Nous invoquons le nom de Dieu ; par notre langue, notre volonté et nos pensées, afin que par tout ce par quoi nous avons péché, nous désirions le seul remède sauveur. Car &quot;il n&#39;est pas d&#39;autre nom par lequel nous devions être sauvés&quot;.</em></p><p></p><p>Le choix de cette prière récitée à haute voix n&#39;est pas anodin de votre part ; comment sera-t-elle reçue par Marie d&#39;Antioche ?</p>","noContent":false,"final":false,"next":"seq-127","actions":[{"params":{"target":"5e8bee62-8f3f-40c0-af64-f19265524f7d","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690527cc019d803d0f193d20"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-126","content":"<p>Vous prenez une profonde inspiration avant de déclamer d&#39;un ton neutre :</p><p></p><p>-&quot;Dame. Je ne peux accéder à votre demande. Avant votre mariage, Marie est née dans la chambre palatiale dédiée aux héritiers de la couronne impériale, ceinte de la pourpre du murex de Tyr et du porphyre extrait du Mont Igneus d&#39;Egypte. Ma prière ne saurait être qu&#39;une imprécation pour vous et votre fils&quot;.</p><p></p><p>C&#39;est bien le visage de l&#39;impératrice qui s&#39;empourpre, comme si un volcan s&#39;éveillait en elle mais ne perçait le dôme de ses lèvres délicates. Toute en implosion, elle vous foudroie du regard et quitte prestement les lieux.</p><p></p><p><em>Ce qui vous ajoute un jeton </em><strong><em>dévoyé </em></strong><em>en </em><strong><em>Eau </em></strong><em>et un autre en </em><strong><em>Flegme </em></strong><em>: vous redoutez sa réaction qui pourrait mener à votre perte...</em></p>","noContent":false,"final":false,"next":"seq-50","actions":[{"params":{"target":"0948c1fc-1f77-4044-81e2-728d797e0155","subTargets":[],"modifier":"set","value":false,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690527cc019d803d0f193d22"},{"params":{"target":"d63faf5e-12f1-4221-8419-813098ab2e21","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"690527cc019d803d0f193d23"},{"params":{"target":"3ba27df4-db33-4e06-a1eb-0563df6cdc65","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"690527cc019d803d0f193d24"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-127","content":"<p>Vous ne savez pas trop si l&#39;impératrice a compris le double-sens de vos propos, sous-entendant les dettes et péchés dont elle se serait rendue coupable. </p><p></p><p>Se relevant, ses dames de Cour se hâtant de soulever l&#39;ample traînée de sa robe, elle vous adresse un sourire énigmatique avant de quitter votre tente.</p><p></p><p>Vous êtes-vous fait une amie fidèle ou une ennemie implacable ?</p>","noContent":false,"final":false,"next":"seq-50","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"use-comprendre-les-regles","content":"","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":"ce5380aa-442a-48d9-b3ec-dc8a7287a4f7","routineExit":[{"from":"start-12","next":"seq-12","actions":[],"conditions":[],"_id":"690a3acf019d803d0f3e33f7"}]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"use-comprendre-les-regles-1","content":"","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":"ce5380aa-442a-48d9-b3ec-dc8a7287a4f7","routineExit":[{"from":"start-12","next":"seq-21","actions":[],"conditions":[],"_id":"690a3acf019d803d0f3e33f9"}]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"use-resultats-pretires","content":"","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":"7119656e-f7c5-44c2-b98f-0881303f7908","routineExit":[{"from":"start-1","next":"seq-43","actions":[],"conditions":[],"_id":"690b1054019d803d0f42c0e2"}]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"use-resultats-pretires-1","content":"","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":"7119656e-f7c5-44c2-b98f-0881303f7908","routineExit":[{"from":"start-1","next":"seq-48","actions":[],"conditions":[],"_id":"690b1054019d803d0f42c0e4"}]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"use-resultats-pretires-2","content":"","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":"7119656e-f7c5-44c2-b98f-0881303f7908","routineExit":[{"from":"start-1","next":"seq-52","actions":[],"conditions":[],"_id":"690b1054019d803d0f42c0e6"}]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-129","content":"<p>Bien que vous soyez un lecteur émérite, il sera difficile de compulser ces deux ouvrages en si peu de temps, à moins de vous fatiguer grandement.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"puzzle":{"kind":"object","size":4,"defaultNext":null,"noObjectNext":null,"inventoryStrategy":"added","tagStrategy":"one","toggleStrategy":"no","displayKind":"simple","onlyTags":[],"codes":[{"value":"58204513-e862-4345-ad99-2ec287d42f64","next":"seq-130","actions":[],"_id":"690b1054019d803d0f42c0e9"},{"value":"1e7115cb-b5b2-48bd-a51e-cf74ff7346e1","next":"seq-131","actions":[],"_id":"690b1054019d803d0f42c0ea"}],"allowBack":true,"_id":"690b1054019d803d0f42c0e8"},"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-130","content":"<p>C'est un condensé de ce qui est recommandé dans ce traité militaire... vieux d'au moins quatre siècles.</p><p>\"Au moment du déplacement, il est nécessaire de placer le train de siège au milieu de l'ordre de bataille. L'armée ne doit pas se déplacer avec le train de bagages, mais le faire séparément, de sorte que les différentes parties de l'armée soient suivies par ses chariots. Le train de chariots commun doit suivre les guerriers légèrement armés. \"</p><p>Oui, mais cela faisait peut-être référence à un cas commun, en morne plaine, et pas dans ces montagnes dont la silhouette vous hante.</p>","noContent":false,"final":false,"next":"seq-32","actions":[{"params":{"target":"21a9747c-9608-40ed-b8e1-fa17698b5a25","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690b1054019d803d0f42c0ec"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-131","conten
