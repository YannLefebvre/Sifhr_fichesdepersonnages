<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aventure — Sifhr</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
:root{--bg:#1a1208;--ink:#f5e8c8;--ink2:#d4b896;--ink3:#9a7a5a;--accent:#c8860a;--border:#4a3218;--border2:#3a2810;--section-bg:#1e1508;--input-bg:#2a1e0e;--panel-bg:#241a0c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Text',serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* Auth */
#modal-overlay{position:fixed;inset:0;background:rgba(10,7,3,0.95);display:flex;align-items:center;justify-content:center;z-index:200;}
#modal-box{background:var(--panel-bg);border:1px solid var(--border);border-radius:8px;padding:1.8rem;max-width:340px;width:92vw;text-align:center;}
#modal-box h2{font-family:'Cinzel',serif;color:var(--accent);margin-bottom:.3rem;font-size:1.1rem;letter-spacing:.1em;}
#modal-box p{font-size:.85rem;color:var(--ink3);margin-bottom:.8rem;font-style:italic;}
.modal-inp{width:100%;padding:.5rem;border:1px solid var(--border);border-radius:3px;font-family:'Cinzel',serif;font-size:.9rem;text-align:center;margin-bottom:.5rem;outline:none;background:var(--input-bg);color:var(--ink);}
.modal-inp:focus{border-color:var(--accent);}
.modal-btn{font-family:'Cinzel',serif;font-size:.82rem;padding:.5rem 1.4rem;border-radius:3px;border:none;cursor:pointer;background:var(--accent);color:#1a1208;letter-spacing:.05em;}
.modal-btn:hover{background:#e09a0c;}
#modal-err{color:#e06050;font-size:.78rem;margin-top:.4rem;min-height:1em;font-style:italic;}

/* Layout */
#app{display:none;max-width:720px;margin:0 auto;padding:1rem 1rem 6rem;}

/* Header */
#story-header{text-align:center;padding:1.2rem 0 .6rem;border-bottom:1px solid var(--border2);margin-bottom:1rem;}
#story-title{font-family:'Cinzel',serif;color:var(--accent);font-size:1.1rem;letter-spacing:.12em;text-transform:uppercase;}
#story-subtitle{font-size:.8rem;color:var(--ink3);font-style:italic;margin-top:.2rem;}

/* Status bar */
#status-bar{background:var(--section-bg);border:1px solid var(--border2);border-radius:7px;padding:.5rem .8rem;margin-bottom:.8rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:flex-start;}
.stat-group{display:flex;flex-direction:column;gap:.15rem;}
.stat-group-title{font-family:'Cinzel',serif;font-size:.6rem;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.stat-pills{display:flex;flex-wrap:wrap;gap:.2rem;}
.stat-pill{font-family:'Cinzel',serif;font-size:.65rem;padding:2px 7px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--ink2);}
.stat-pill.active{border-color:var(--accent);color:var(--accent);background:#2a1a04;}
.stat-pill.white{border-color:#c8a060;background:#2a1e0e;color:#e8d5a0;}
.stat-pill.black{border-color:#6a4a2a;background:#1a1208;color:#9a7a5a;}
.stat-sep{width:1px;background:var(--border2);align-self:stretch;margin:0 .1rem;}
.oct-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin:0 1px;vertical-align:middle;}
.oct-dot.w{background:#e8d5a0;border:1px solid #c8a060;}
.oct-dot.b{background:#3a2810;border:1px solid #6a4a2a;}

/* Inventaire */
#inventory-bar{background:var(--section-bg);border:1px solid var(--border2);border-radius:7px;padding:.4rem .7rem;margin-bottom:.8rem;display:none;}
.inv-title{font-family:'Cinzel',serif;font-size:.62rem;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.3rem;}
.inv-items{display:flex;flex-wrap:wrap;gap:.3rem;}
.inv-item{font-family:'Cinzel',serif;font-size:.68rem;padding:3px 9px;border-radius:10px;border:1px solid var(--accent);background:#2a1a04;color:var(--accent);cursor:help;}

/* Séquence */
#sequence-wrap{transition:opacity .28s;}
#sequence-wrap.fading{opacity:0;}
#seq-image{width:100%;object-fit:cover;border-radius:7px;margin-bottom:.8rem;display:none;}
#seq-content{font-size:1.02rem;line-height:1.75;color:var(--ink);margin-bottom:1rem;}
#seq-content p{margin-bottom:.65em;}
#seq-content p:last-child{margin-bottom:0;}

/* Épreuve */
.epreuve-hint{background:#1a2a3a;border:1px solid var(--accent2);border-radius:7px;padding:.5rem .8rem;font-family:'Cinzel',serif;font-size:.75rem;color:#a0c8e8;letter-spacing:.04em;margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem;}
.epreuve-icon{font-size:1rem;}
.open-fiche-btn{font-family:'Cinzel',serif;font-size:.78rem;padding:.45rem 1rem;border:1px solid var(--accent);border-radius:5px;background:none;color:var(--accent);cursor:pointer;margin-bottom:.6rem;letter-spacing:.05em;width:100%;}
.open-fiche-btn:hover{background:var(--accent);color:var(--bg);}
.choices-sep{font-family:'Cinzel',serif;font-size:.65rem;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin:.4rem 0;padding:.2rem 0;border-top:1px solid var(--border2);}

/* Choix */
#choices-wrap{display:flex;flex-direction:column;gap:.45rem;margin-top:.4rem;}
.choice-btn{background:var(--section-bg);border:1px solid var(--border);border-radius:7px;padding:.6rem .9rem;font-family:'Crimson Text',serif;font-size:.98rem;color:var(--ink2);cursor:pointer;text-align:left;line-height:1.5;transition:all .15s;}
.choice-btn:hover{border-color:var(--accent);background:#2a1a04;color:var(--ink);}
.choice-btn.disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}
.choice-btn p{margin:0;}

/* Suivant */
#btn-next{display:none;font-family:'Cinzel',serif;font-size:.82rem;padding:.55rem 1.4rem;border:1px solid var(--accent);border-radius:5px;background:none;color:var(--accent);cursor:pointer;margin-top:.6rem;letter-spacing:.05em;}
#btn-next:hover{background:var(--accent);color:var(--bg);}

/* Fin */
.ending-wrap{text-align:center;padding:1.5rem;background:var(--section-bg);border:1px solid var(--border);border-radius:10px;margin-top:.8rem;}
.ending-icon{font-size:2rem;margin-bottom:.5rem;}
.ending-title{font-family:'Cinzel',serif;color:var(--accent);font-size:1rem;letter-spacing:.1em;margin-bottom:.5rem;}
.ending-restart{font-family:'Cinzel',serif;font-size:.78rem;padding:.5rem 1.2rem;border:1px solid var(--border);border-radius:4px;background:var(--input-bg);color:var(--ink2);cursor:pointer;margin-top:.8rem;letter-spacing:.05em;}
.ending-restart:hover{border-color:var(--accent);}

/* Panneau fiche latéral */
#fiche-panel{position:fixed;right:-102vw;top:0;width:min(780px,100vw);height:100%;background:var(--bg);border-left:2px solid var(--accent);z-index:300;display:flex;flex-direction:column;transition:right .28s ease;box-shadow:-4px 0 24px rgba(0,0,0,0.5);}
#fiche-panel.open{right:0;}
#fiche-panel-header{padding:.5rem .8rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:.6rem;flex-shrink:0;background:var(--panel-bg);}
#fiche-panel-title{font-family:'Cinzel',serif;font-size:.78rem;color:var(--accent);letter-spacing:.08em;flex:1;}
#fiche-panel-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--ink3);}
#fiche-panel-close:hover{color:var(--ink);}
#fiche-iframe{flex:1;border:none;width:100%;}

/* FAB fiche */
#fiche-fab{position:fixed;bottom:1.2rem;right:1.2rem;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#1a1208;border:none;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.3);display:none;align-items:center;justify-content:center;z-index:290;transition:background .15s;}
#fiche-fab:hover{background:#e09a0c;}
#fiche-fab.open{background:#6e3a0a;}

/* Notification */
#oct-notif{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:var(--section-bg);border:1px solid var(--accent);border-radius:8px;padding:.5rem 1rem;font-family:'Crimson Text',serif;font-style:italic;font-size:.85rem;color:var(--ink2);max-width:min(380px,90vw);text-align:center;opacity:0;transition:opacity .5s;pointer-events:none;z-index:400;}
#oct-notif.show{opacity:1;}

/* Save */
#save-indicator{position:fixed;top:.5rem;right:.7rem;font-family:'Cinzel',serif;font-size:.65rem;color:var(--ink3);letter-spacing:.04em;opacity:0;transition:opacity .3s;z-index:500;}
#save-indicator.show{opacity:1;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>

<script>
const STORY_DATA = {"_id":"68cc51a048d8552571f9a8dd","meta":{"customCredits":null,"options":{"allowBack":true,"showStats":true,"isCustomInventory":false},"editorOptions":{"readOnly":{"active":false},"experimentalFeatures":{"graphAlternateViews":false}},"creationDate":"2025-09-18T18:38:24.045Z","modificationDate":"2025-11-17T21:57:09.032Z","dbPatched":false,"name":"Sifhr - introduction","description":"Aventure en solo pour découvrir l'univers de Sifhr","image":"06efa100-a0fd-4149-85ab-d8852a2bcfe8","tags":[],"author":{"_id":"65aec90c76faac0039a7c6e1","pseudo":null,"firstname":"Yann","lastname":"Lefebvre"},"lang":"fr","numWords":12903,"numSequences":184,"duration":1852.2820000000002,"version":6,"simplified":false,"expert":true,"numErrors":0},"themes":[{"styles":{"textStyle":{"params":{"shadows":[]},"type":"sans"},"animations":{"objectModal":"zoom","objectModalDecorator":"star","sequence":"unzoom","sequenceDuration":500},"background":"rgba(58, 132, 224, 1)","fontFamily":"Catamaran","sequenceBackground":"rgba(74, 144, 226, 1)","sequenceText":"#ffffff","sequenceTextSize":1,"sequenceBoldText":"#ffffff","sequenceBoldLock":true,"buttonBackground":"#4eb5f1","buttonText":"#ffffff","buttonTextSize":1,"assetsBackground":"rgba(21, 79, 107, 0.27)","assetsFill":"#ffffff","sequenceRadius":1,"sequenceBorderColor":"#ffffff","sequenceBorderSize":0,"buttonRadius":1,"buttonBorderColor":"#ffffff","buttonBorderSize":0,"inventoryBackgroundCustom":false,"inventoryBackground":"rgba(21, 79, 107, 0.27)"},"name":"standard","identifier":"default","idName":"default","customized":true,"_id":"68cc51a048d8552571f9a8df"}],"firstSequence":"intro","duration":1466.228,"numSequences":130,"numWords":10292,"sequences":[{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"06efa100-a0fd-4149-85ab-d8852a2bcfe8","size":"huge","isBefore":false,"allowZoom":true},"id":"intro","content":"<p>Un jour de l&#39;année 1176 de l&#39;Incarnation de Notre Seigneur Jésus Christ. Les rayons du soleil automnal irisaient les cristaux du désert. Christophe contemplait ce spectacle d&#39;un lever du jour dans les désolations d&#39;Anatolie, à mille lieux des clichés qu&#39;il entretenait sur ces régions hostiles. Il aurait d&#39;autant plus apprécié le spectacle s&#39;il avait été seul. Mais il en était loin.</p><p>En ce jour du 16 septembre, il n&#39;était qu&#39;un maillon de la chaîne humaine que formait l&#39;armée du basileus de Byzance, Manuel Comnène. L&#39;empereur s&#39;était mis en tête de châtier les Turcs. Et ce moment était imminent.</p>","noContent":false,"final":false,"next":"seq-1","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"7ccfdd1a-afba-4adc-975a-6f632d411d8a","size":"medium","kind":"default","isBefore":true,"allowZoom":false},"id":"seq-1","content":"<p>Christophe goûtait fort peu aux joies des expéditions militaires. Et pourtant, le plaisir durait depuis trois longues semaines déjà. Les marches interminables n&#39;étaient pas faites pour ce moine du mont Athos, cet éperon rocheux de Grèce où le manque d&#39;exercice cultivait le gras des cénobites. Ces hommes de Dieu aimaient la fraîcheur de l&#39;écume et les embruns méditerranéens, bien moins le vent sec et poussiéreux qui régnait en maître en Cappadoce et en Anatolie. Avant que l&#39;armée innombrable ne se remette en branle, Christophe dispose de quelques options.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[{"target":"814b6eb6-058c-4ee3-9c21-740d21a72c98","condition":"=","value":false,"valueType":"bool","animation":false,"_id":"68e42f6a6e6bbf34c36b9e0a"}]},"kind":"flag"},"content":"<p>Une lecture à l&#39;ombre d&#39;un rocher proéminent.</p>","next":"seq-2","actions":[],"conditions":[],"_id":"68cc67ba48d8552571f9f45c"},{"showCondition":{"query":{"params":[{"target":"8eb19727-300d-4910-b34a-53f2862accda","condition":"=","value":false,"valueType":"bool","animation":false,"_id":"68e42f6a6e6bbf34c36b9e0c"}]},"kind":"flag"},"content":"<p>Une série de prières face au soleil renaissant.</p>","next":"seq-5","actions":[],"conditions":[],"_id":"68cc67ba48d8552571f9f45d"},{"showCondition":{"query":{"params":[{"target":"610df43b-0025-470a-8faf-864ccb0eee10","condition":"=","value":false,"valueType":"bool","animation":false,"_id":"68e42f6a6e6bbf34c36b9e0e"}]},"kind":"flag"},"content":"<p>Une promenade pour un meilleur dynamisme.</p>","next":"seq-7","actions":[],"conditions":[],"_id":"68cc67ba48d8552571f9f45e"},{"showCondition":{"query":{"params":[{"target":"b689a4bb-8bdc-4446-8122-b2048d05b146","condition":"=","value":false,"valueType":"bool","animation":false,"_id":"68e42f6a6e6bbf34c36b9e10"}]},"kind":"flag"},"content":"<p>De la méditation pour calmer l&#39;amertume et la colère sourde.</p>","next":"seq-9","actions":[],"conditions":[],"_id":"68cc67ba48d8552571f9f45f"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-2","content":"<p><em>Vous incarnez désormais Christophe. </em></p><p><em>Vous vous rappelez à quel point vous aimez lire..</em></p><p></p><p>Vous ne souhaitez pas être ignare sur l&#39;histoire de la guerre, chose que vous avez splendidement ignoré pendant toute votre vie monastique. Aussi, vous sortez la seule chronique que votre higoumène vous a laissé avant votre départ. Vous avalez goulument la description de la bataille de Mantzibert, une catastrophe byzantine face aux mécréants musulmans.</p><p>Si l&#39;incurie des généraux chrétiens vous arrache une moue de dépit, la lecture est stimulante et votre esprit bouillonne.</p>","noContent":false,"final":false,"next":"seq-3","actions":[{"params":{"target":"622cffcf-c566-4ee5-8741-ad0d7ba2b1d5","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"690499b9019d803d0f17053b"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"0809bbb9-9f3b-4be1-ba51-a5cbf1a7e602","size":"medium","kind":"circular","isBefore":true,"allowZoom":true},"id":"seq-3","content":"<p><em>Christophe redécouvre son </em><strong><em>Trait </em></strong><em>de </em><strong><em>Bibliophile</em></strong><em>.</em></p><p></p><p><em>La lecture attise l&#39;intellect de Christophe. Pour représenter cela, il gagne un jeton dans le </em><strong><em>segment 4</em></strong><em> de son octogone. L&#39;octogone représente l&#39;ensemble des éléments (chiffres impairs) et des humeurs (chiffres pairs) qui l&#39;influencent.</em></p><p></p><p><em>Les jetons blancs sont dits </em><strong><em>purs</em></strong><em>, et bénéfiques pour le personnage, contrairement aux jetons noirs dits </em><strong><em>dévoyés</em></strong><em>.</em></p><p></p><p><em>Le </em><strong><em>segment 4</em></strong><em> représente la </em><strong><em>Bile Noire,</em></strong><em> associée à l&#39;élément </em><strong><em>Terre (segment 3)</em></strong><em>, siège de la raison, de la mémoire, de l&#39;intellect. </em></p>","noContent":false,"final":false,"next":"seq-4","actions":[{"params":{"target":"814b6eb6-058c-4ee3-9c21-740d21a72c98","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68e42f6a6e6bbf34c36b9e13"},{"params":{"target":"3db430d0-42ab-4092-ae3e-9536255d4f0d","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"6903da94019d803d0f14a931"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-4","content":"<p>Tout autour de vous, le convoi se réveille. Les voyageurs fatigués rassemblent leurs effets personnels, s&#39;étirent, se meuvent pour sortir de la torpeur d&#39;une nuit bien froide. </p><p>Vous avez encore un peu de temps pour vous adonner à une autre activité avant de reprendre votre marche.</p><p><br/></p><p><em>Vous pouvez donc choisir une autre option. Si vous avez déjà effectué cette action, vous devez repartir.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"operator":"or","params":[{"kind":"flag","target":"814b6eb6-058c-4ee3-9c21-740d21a72c98","condition":"=","value":false,"animation":false,"_id":"6917b42a019d803d0fa85493"},{"kind":"flag","target":"8eb19727-300d-4910-b34a-53f2862accda","condition":"=","value":false,"animation":false,"_id":"6917b42a019d803d0fa85494"},{"kind":"flag","target":"610df43b-0025-470a-8faf-864ccb0eee10","condition":"=","value":false,"animation":false,"_id":"6917b42a019d803d0fa85495"},{"kind":"flag","target":"b689a4bb-8bdc-4446-8122-b2048d05b146","condition":"=","value":false,"animation":false,"_id":"6917b42a019d803d0fa85496"}]},"kind":"multiple"},"content":"<p>Une autre option.</p>","next":"seq-1","actions":[],"conditions":[],"_id":"68cc67ba48d8552571f9f463"},{"showCondition":{"query":{"params":[]}},"content":"<p>En route vers le théâtre de la guerre.</p>","next":"seq-11","actions":[{"params":{"target":"814b6eb6-058c-4ee3-9c21-740d21a72c98","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690a3acf019d803d0f3e329d"}],"conditions":[],"_id":"68cc67ba48d8552571f9f464"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-5","content":"<p><em>Vous incarnez désormais Christophe. </em></p><p>Pour commencer la journée et vous pardonner du sommeil qui vous a submergé et exonéré des prières nocturnes, vous entonnez le Tropaire, un classique de septembre en l&#39;honneur de la Vierge Marie.</p><p></p><p>&quot;Ta naissance o Mère de Dieu annonça la joie à toute la terre ; de toi, en effet, le soleil de justice s&#39;est levé, le Christ notre Dieu.</p><p>En ayant défait la malédiction, tu nous as donné la bénédiction ; et la mort étant détruite, tu nous as fait cadeau de la vie éternelle.&quot;</p><p></p>","noContent":false,"final":false,"next":"seq-6","actions":[{"params":{"target":"e064986f-6b2e-403c-be6e-54952be79072","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"6903da94019d803d0f14a936"},{"params":{"target":"8eb19727-300d-4910-b34a-53f2862accda","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690a3acf019d803d0f3e32a0"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"6b6a476e-b612-4f05-96c4-37d8f7e2b095","size":"medium","kind":"circular","isBefore":true,"allowZoom":true},"id":"seq-6","content":"<p><em>La prière affine la spiritualité de Christophe. Pour représenter cela, il gagne un jeton dans le </em><strong><em>segment 8 </em></strong><em>de son octogone. L&#39;octogone représente l&#39;ensemble des éléments (chiffres impairs) et des humeurs (chiffres pairs) qui l&#39;influencent.</em></p><p></p><p><em>Les jetons blancs sont dits </em><strong><em>purs</em></strong><em>, et bénéfiques pour le personnage, contrairement aux jetons noirs dits </em><strong><em>dévoyés</em></strong><em>.</em></p><p></p><p><em>Le </em><strong><em>segment 8</em></strong><em> représente le </em><strong><em>Sang</em></strong><em>, associée à l&#39;élément </em><strong><em>Air (segment 7)</em></strong><em>, siège de l&#39;intuition, de la spiritualité, de l&#39;union avec Dieu. </em></p>","noContent":false,"final":false,"next":"seq-4","actions":[{"params":{"target":"814b6eb6-058c-4ee3-9c21-740d21a72c98","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68e42f6a6e6bbf34c36b9e19"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-7","content":"<p><em>Vous incarnez désormais Christophe. </em></p><p>Cahin-caha, vous gravissez une colline de pierres pour porter votre regard au loin. Votre pas assuré cède la place à une certaine lassitude, quand votre souffle tourne court sous l&#39;action de votre poids. Néanmoins, ce petit exercice vous fortifie et à n&#39;en pas douter, sera salutaire au vu de la marche qui vous attend...</p>","noContent":false,"final":false,"next":"seq-8","actions":[{"params":{"target":"b1d9cf79-ebbb-4348-9629-1032f2b99dc2","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"6903da94019d803d0f14a93a"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"aa7898d6-5e2d-4d5b-96c5-35a58819e16e","size":"medium","kind":"circular","isBefore":true,"allowZoom":true},"id":"seq-8","content":"<p><em>La marche ravive l&#39;énergie dont fait preuve Christophe. Pour représenter cela, il gagne un jeton dans le </em><strong><em>segment 2</em></strong><em> de son octogone. L&#39;octogone représente l&#39;ensemble des éléments (chiffres impairs) et des humeurs (chiffres pairs) qui l&#39;influencent.</em></p><p><br/></p><p><em>Les jetons blancs sont dits </em><strong><em>purs</em></strong><em>, et bénéfiques pour le personnage, contrairement aux jetons noirs dits </em><strong><em>dévoyés</em></strong><em>.</em></p><p><br/></p><p><em>Le </em><strong><em>segment 2</em></strong><em> représente la </em><strong><em>Bile Jaune</em></strong><em>, associée à l&#39;élément </em><strong><em>Feu&nbsp;(segment 1) </em></strong><em>: ils président tous deux au dynamisme, à la rapidité, à l&#39;énergie. </em></p>","noContent":false,"final":false,"next":"seq-4","actions":[{"params":{"target":"610df43b-0025-470a-8faf-864ccb0eee10","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68e42f6a6e6bbf34c36b9e1c"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-9","content":"<p><em>Vous incarnez désormais Christophe. </em></p><p>Vous cherchez un endroit pour méditer tranquillement, sur le modèle des lignées d&#39;ascètes dont se glorifie votre monastère d&#39;Athos. Les pères du désert ont rencontré le divin dans les affres du désert égyptien. Pourquoi pas vous, ici-même ?</p><p>Et le premier obstacle et de renoncer à s&#39;agenouiller tant les pierres sont coupantes, à adopter la position du tailleur tant votre souplesse fait défaut... Reposant finalement sur votre séant, vous fermez les yeux, apaisez votre esprit en tripotant votre chapelet de prières.</p>","noContent":false,"final":false,"next":"seq-10","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"788bb8d0-464a-4e51-ab9f-6f750a3e9fd8","size":"medium","kind":"circular","isBefore":true,"allowZoom":true},"id":"seq-10","content":"<p><em>La méditation calme l&#39;agitation dont fait preuve Christophe. Pour représenter cela, il gagne un jeton dans le </em><strong><em>segment 6 </em></strong><em>de son octogone. L&#39;octogone représente l&#39;ensemble des éléments (chiffres impairs) et des humeurs (chiffres pairs) qui l&#39;influencent.</em></p><p><br/></p><p><em>Les jetons blancs sont dits </em><strong><em>purs</em></strong><em>, et bénéfiques pour le personnage, contrairement aux jetons noirs dits </em><strong><em>dévoyés</em></strong><em>.</em></p><p><br/></p><p><em>Le </em><strong><em>segment 6 </em></strong><em>représente le </em><strong><em>Flegme</em></strong><em>, associée à l&#39;élément </em><strong><em>Eau&nbsp;</em></strong><em>: ils sont le garant du maintien du calme, de la sérénité, de l&#39;absence de troubles. </em></p>","noContent":false,"final":false,"next":"seq-4","actions":[{"params":{"target":"b689a4bb-8bdc-4446-8122-b2048d05b146","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68e42f6a6e6bbf34c36b9e1f"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"7e8c61f4-d95c-480a-97ef-0ab080b914b0","size":"small","isBefore":true,"allowZoom":true},"id":"seq-11","content":"<p><em>Vous connaissez désormais les valeurs de base de l&#39;octogone de Christophe.</em></p><p><br/></p><p>Vous reprenez votre bâton de marche et vous mettez en route, rejoignant la troupe. L&#39;armée est telle un fleuve irrigué par des affluents toujours plus nombreux. Des milliers de <em>tagmata </em>issus de l&#39;élite de Constantinople, se sont ajoutés des dizaines de milliers de <em>themata </em>issus des provinces que vous avez arpentées, avec à leur tête des <em>stratogoï </em>aux uniformes chatoyants, vociférant leurs ordres pour que leurs ouailles se fondent dans la masse.</p><p><br/></p><p>Quant à vous, vous êtes entouré de non combattants, ventre mou de cet ost ; un jeune soldat imberbe et perdu est le seul à vous apostropher.</p>","noContent":false,"final":null,"isHappyEnd":null,"httplabel":null,"httplink":null,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous échangez avec cet inconnu.</p>","next":"seq-12","actions":[],"conditions":[],"_id":"690a3acf019d803d0f3e32ab"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous avez besoin de récapituler les règles que vous avez apprises.</p>","next":"use-comprendre-les-regles","actions":[],"conditions":[],"_id":"690a3acf019d803d0f3e32ac"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-12","content":"<p>-&quot;Je vous prie de m&#39;en excuser, mais j&#39;ai fort faim, se pourrait-il que vous m&#39;fassiez l&#39;aumône d&#39;un morceau de pain ?&quot;</p><p></p><p>Le puceau s&#39;exprime fort bien, mais cela ne vous enlève pas votre liberté de le renvoyer loin de là où vous êtes.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous lui concédez un morceau de pain, quoique rassi.</p>","next":"seq-13","actions":[],"conditions":[],"_id":"68cc67ba48d8552571f9f46d"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous prétextez que la farine est chère et que la faim vous tenaille également.</p>","next":"seq-35","actions":[],"conditions":[],"_id":"68cc67ba48d8552571f9f46e"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"876f2dbd-2172-4008-8620-9404302acd3c","size":"small","kind":"circular","isBefore":true,"allowZoom":true},"id":"seq-13","content":"<p>Le jouvenceau attrape au vol le quignon de pain et vous gratifie d&#39;un grand sourire. Il vous rappelle furieusement ces oblats de grande famille qui ne tiennent pas quelques années au sein des monastères du mont Athos. Mais au vu du peu d&#39;opportunité de tailler un morceau de gras avec quelqu&#39;un, vous entamez la conversation.</p><p><br/></p><p><em>Christophe a fait preuve de </em><strong><em>charité</em></strong><em>, une vertu dont le score est de 1, à l&#39;inverse, son vice </em><strong><em>d&#39;avarice </em></strong><em>est de 0. Il est donc cohérent avec ces totaux.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous parlez de la bataille à venir.</p>","next":"seq-14","actions":[],"conditions":[],"_id":"68d06263de8d084ed99e9503"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-14","content":"<p>Le soldat semble participer à sa première campagne. Il empeste l&#39;angoisse et la fébrilité.</p><p></p><p>-&quot;Pensez-vous que l&#39;armée de Byzance est aussi invulnérable qu&#39;il n&#39;y parait ?&quot;</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous le rassurez, car vous cultivez cette conviction.</p>","next":"seq-15","actions":[{"params":{"target":"f4dfd68a-536e-427a-8116-a520fc95525a","subTargets":[],"m "query":{"params":[]}},"content":"<p>Vous lui dites qu&#39;il faudra faire preuve de courage et se montrer digne de notre peuple et de notre culture.</p>","next":"seq-17","actions":[{"params":{"target":"af36ee72-b4fc-4a99-86b5-28dfac581ac3","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"690499b9019d803d0f17055a"}],"conditions":[],"_id":"68d06263de8d084ed99e9508"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous lui susurrez que parfois, il faut savoir trahir son camp pour sauver son corps et même son âme.</p>","next":"seq-18","actions":[{"params":{"target":"9fbabf99-2aef-485b-b231-ad9cef45bc22","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68e4d56d6e6bbf34c36fcf66"}],"conditions":[],"_id":"68d06263de8d084ed99e9509"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"bacae2c4-7465-4634-a3e5-320999bf6402","size":"medium","kind":"circular","isBefore":true},"id":"seq-16","content":"<p>-&quot;Il y a près d&#39;un siècle, et dans cette même région, nos armées se faisaient pulvériser à Mantzibert. Un massacre qui vient à la suite d&#39;autres, au cours des six derniers siècles de notre histoire &quot;.</p><p><br/></p><p><em>Christophe possède 0 dans la vertu </em><strong><em>d&#39;espérance</em></strong><em>, mais aussi 0 dans le vice </em><strong><em>d&#39;acédie</em></strong><em>, qui représente le doute dans les bonnes volontés du Seigneur. </em></p><p><br/></p><p>Le soldat reprend la parole après des secondes d&#39;hésitation. -&quot;Je redoute surtout la cruauté des infidèles envers leurs prisonni sitez sur les règles de l&#39;étiquette que vous devriez suivre en la présence d&#39;un si honorable officier, tentant de passer pour autre chose qu&#39;un moinillon de province.</p><p>L&#39;hétériarque vous regarde avec curiosité, ferme votre chronique et la range délicatement dans le coffre prévu à cet effet. Il esquisse un mouvement vers sa monture qui l&#39;attendait non loin de là.</p><p></p><p><em>Votre </em><strong><em>flegme </em></strong><em>vient d&#39;augmenter de 1, suite au contrôle de vos émotions négatives.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous le laissez partir, tout à votre stupéfaction.</p>","next":"seq-25","actions":[{"params":{"target":"e91d0194-b6f1-4837-aa04-9f814ad0b39e","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68e7d9c46e6bbf34c392b3fd"}],"conditions":[],"_id":"68d1b2aade8d084ed9aa12c0"},{"showCondition":{"query":{"params":[]}},"content":"<p><strong>Vous vous interposez et engagez la conversation.</strong></p>","next":"seq-26","actions":[],"conditions":[],"_id":"68e42f6a6e6bbf34c36b9e3f"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"9f3075f1-4a7a-42c3-bbc3-e81befc238f4","size":"medium","kind":"circular","isBefore":true},"id":"seq-24","content":"<p style=\"text-align: left;\">Bien que vos tripes vous rappellent combien vous angoissez vous-même, vous n&#39;en paraissez rien et vous haranguez ce soldat, à grand recours de propagande martiale et de grands discours moralisateurs. Après tout, vous le faites aussi pour vous rassurer vous-même.</p><p><br/></p><p><em>Christophe possède 1 dans sa vertu de </em><strong><em>force</em></strong><em>, contre 0 dans son vice de </em><strong><em>lâcheté</em></strong><em>.</em></p><p><br/></p><p>Vous quittez l&#39;apprenti guerrier pour retourner vers votre charroi.</p><p><br/></p><p><em>Christophe gagne un point dans son score de </em><strong><em>force</em></strong><em>.</em></p>","noContent":false,"final":false,"next":"seq-20","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-25","content":"<p style=\"text-align: left;\">Encore sous le coup de votre rencontre avec Jean Doukas, vous reprenez vos esprits et vous mettez en marche, comme le font des milliers de vos congénères tout autour de vous. Si l&#39;armée ne forme qu&#39;un corps agissant de concert, il arrive parfois qu&#39;une de ses parties ne déborde sur une autre.</p><p style=\"text-align: left;\"></p><p style=\"text-align: left;\">En l&#39;occurrence, un détachement de soldats lourdement armés dépasse au trot le ventre mou dans lequel vous êtes englué. Parmi eux, un <em>apothêke </em>harangue la foule en proposant des armes à qui sait les manier.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Un moine armé&nbsp;? Chez les chrétiens occidentaux, peut-être, mais à Byzance, jamais&nbsp;!</p>","next":"seq-27","actions":[],"conditions":[],"_id":"68d1b2aade8d084ed9aa12c3"},{"showCondition":{"query":{"params":[]}},"content":"<p>Si jamais vous étiez en danger, sur un malentendu, vous pourriez peut-être vaincre un adversaire&nbsp;?</p>","next":"seq-42","actions":[{"params":{"target":"48303ae6-106a-41bc-bd4b-4efff1f5d102","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"690499b9019d803d0f17057f"}],"conditions":[],"_id":"68d1b2aade8d084ed9aa12c4"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-26","content":"<p>En jetant un oeil alentour, vous comprenez les raisons de la présence de l&#39;hétériarque. Ses hommes de main distribuent des armes peu courtoises à ceux qui le souhaitent, afin de donner une chance aux non combattants de défendre leur peau.</p><p><br/></p><p>-&quot;La présence d&#39;un homme de Dieu est une bénédiction pour notre armée. Non seulement par votre appel à la Providence divine, mais aussi par votre savoir&quot;.</p><p><br/></p><p>-&quot; Je doute fort d&#39;être d&#39;une quelconque utilité pour les choses de la guerre. Je n&#39;y comprends goutte&quot;, rétorquez-vous.</p><p><br/></p><p>Jean Doukas vous sourit franchement.</p><p>-&quot; Et pourtant, la victoire ne tient-elle pas dans ces armes-ci, plutôt que dans celles qui ceignent ma taille&nbsp;?&quot;</p><p><br/></p><p>Il brandit deux manuscrits&nbsp;: dans la main gauche, vous repérez le titre <em>Strategicon</em>, quand la droite s&#39;est refermée sur un certain <em>De velitatione bellica</em>. Tous deux inconnus au bataillon des bibliothèques que vous avez fréquentées.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous prétextez qu&#39;un homme de Dieu ne saurait trouver son compte dans des traités militaires.</p>","next":"seq-38","actions":[{"params":{"target":"e91d0194-b6f1-4837-aa04-9f814ad0b39e","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68e7d9c46e6bbf34c392b405"}],"conditions":[],"_id":"68e42f6a6e6bbf34c36b9e45"},{"showCondition":null,"content":"<p>Votre Trait de bibliophile vous met dans la condition d&#39;un chien de guerre reniflant une récompense bien méritée.</p>","next":"seq-41","actions":[{"params":{"target":"622cffcf-c566-4ee5-8741-ad0d7ba2b1d5","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"690b1054019d803d0f42bfc5"}],"conditions":[],"_id":"68e42f6a6e6bbf34c36b9e46"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-27","content":"<p style=\"text-align: left;\">La journée est longue. La marche est d&#39;abord égayée par ces colonnes de nouvelles têtes, ces rumeurs ponctuées de hennissements et de vagissements, ces odeurs humaines ou animales, les remugles des malades plaintifs, les arômes des cuisines ambulantes qui ponctuent l&#39;heure de midi...</p><p style=\"text-align: left;\">Mais bientôt, la fatigue et la lassitude éteignent cette nonchalance, le regard se baisse et se fixe sur les cailloux et le sable qui deviennent votre unique horizon.</p><p></p><p style=\"text-align: left;\"><em>Christophe subit les effets de la fatigue. De ce fait, un de ses dés d&#39;aptitudes devient un dé </em><strong><em>dévoyé</em></strong><em>.</em></p>","noContent":false,"final":false,"next":"seq-28","actions":[{"params":{"target":"66d53693-fbde-476a-9b89-71dc97b52e91","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68e7d9c46e6bbf34c392b408"},{"params":{"target":"b448889f-096d-48cf-841c-2c8d18b016cb","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690a3acf019d803d0f3e32e9"},{"params":{"target":"da584dc2-81c7-4537-9091-36830837e4ae","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"690b22cf019d803d0f458c87"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-28","content":"<p style=\"text-align: left;\">Le soir, enfin, un repos salvateur. L&#39;armée de Manuel Comnène s&#39;arrête enfin, alors que le soleil décline assurément. Les plus chanceux dressent leurs tentes. Avec plusieurs compagnons de marche, vous érigez la vôtre qui a son importance&nbsp;: elle est l&#39;écrin dans lequel sera contemplée la <strong>relique de St Christophe</strong>, celle dont vous avez la garde.</p><p><br/></p><p style=\"text-align: left;\">Pendant près d&#39;une heure, vous recevez de nombreux fidèles, administrez des paroles réconfortantes et des signes de croix propitiatoires. Ce service à la chaîne a raison de vous&nbsp;: mort de fatigue, vous pensez pouvoir vous jeter dans un somme quand une dernière personne entre dans la guérite.</p>","noContent":false,"final":false,"next":"seq-29","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-29","content":"<p style=\"text-align: left;\">Et c&#39;est un cortège de femmes, engoncées dans leurs robes de cour, qui s&#39;avancent vers le reliquaire, sans prendre attache auprès de vous. Elles s&#39;avancent simplement, dans l&#39;ombre grandissante du crépuscule, les coiffes tombantes qui dissimulent une partie de leurs visages.</p><p><br/></p><p style=\"text-align: left;\">Il ne manquait plus que cela&nbsp;! Un troupeau de femelles en quête d&#39;une expérience mystique alors que vous caressiez du bout des doigts la délivrance d&#39;un sommeil réparateur&nbsp;!</p><p><br/></p><p style=\"text-align: left;\"><em>Christophe possède le </em><strong><em>Trait Misogyne</em></strong><em>. Il déteste la gent féminine. Mais il a toujours le contrôle de ses actes, sauf qu&#39;en allant à l&#39;encontre de son inclinaison, il risque de se fatiguer moralement.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>La peste soit ces femmes&nbsp;! Vous les congédiez séance tenante&nbsp;!</p>","next":"seq-31","actions":[{"params":{"target":"ed529d23-bc5d-438f-a206-c12a302402d5","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"690b1054019d803d0f42bfcc"}],"conditions":[],"_id":"68d1b2aade8d084ed9aa12c9"},{"showCondition":{"query":{"params":[]}},"content":"<p>Pas de précipitation. Attendons de voir ce qu&#39;elles mijotent.</p>","next":"seq-30","actions":[{"params":{"target":"66d53693-fbde-476a-9b89-71dc97b52e91","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68e7d9c46e6bbf34c392b40d"},{"params":{"target":"ed529d23-bc5d-438f-a206-c12a302402d5","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"690b1054019d803d0f42bfcf"}],"conditions":[],"_id":"68d1b2aade8d084ed9aa12ca"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-30","content":"<p style=\"text-align: left;\">Comme souvent, il était urgent d&#39;attendre. Vous avez quand même failli congédier Marie Marguerite Constance d&#39;Antioche, épouse de l&#39;empereur Manuel Comnène Ier. Ni plus, ni moins. </p><p><br/></p><p style=\"text-align: left;\">La mère de celui qui a toutes les chances de succéder sur le trône, même si d&#39;un premier mariage, son père eut la princesse Marie Porphyrogénète, légitimée lors de sa naissance dans la pourpre et le porphyre, mais reléguée à son statut de simple femme par son jeune demi-frère.</p><p><br/></p><p style=\"text-align: left;\">L&#39;impératrice vous toise d&#39;un air auguste, guettant la manière dont vous allez l&#39;aborder.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous vous agenouillez, attendant qu&#39;elle formule la moindre requête.</p>","next":"seq-33","actions":[{"params":{"target":"af36ee72-b4fc-4a99-86b5-28dfac581ac3","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"690527cc019d803d0f193c28"}],"conditions":[],"_id":"68d1b2aade8d084ed9aa12cc"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous vous interposez, prétextant que les prières n&#39;ont plus lieu d&#39;être dans cette nuit qui débute.</p>","next":"seq-31","actions":[],"conditions":[],"_id":"68d1b2aade8d084ed9aa12cd"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-31","content":"<p style=\"text-align: left;\">Vous jaillissez comme un diable gesticulant, effarouchant plusieurs dames à l&#39;exception notable de celle qui ouvrait la marche. Elle reste impassible face au spectacle de l&#39;homme bedonnant et hirsute qui la somme de partir séance tenante. </p><p style=\"text-align: left;\"></p><p style=\"text-align: left;\">Bien que vous ne distinguiez pas l&#39;ensemble de ses traits, il vous semble avoir déjà vu cette dame qui n&#39;a rien d&#39;une vulgaire partisane.</p><p style=\"text-align: left;\">Son regard embrasse l&#39;intégralité de votre silhouette, comme s&#39;il cherchait à l&#39;imprimer dans ses moindres détails. Elle tourne les talons et quitte votre tente.</p><p style=\"text-align: left;\">Vous voici enfin tranquille !</p>","noContent":false,"final":false,"next":"seq-32","actions":[{"params":{"target":"0948c1fc-1f77-4044-81e2-728d797e0155","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68ef4772d6f568715fc16d54"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-32","content":"<p>Vous pensez goûter à un repos bien mérité, mais un maelström de pensées parasites empêche votre assoupissement. Vous revoyez pêle-mêle les personnes rencontrées, du soldat prépubère et glabre à <em>l&#39;hétériarque</em>, en passant par le général Andronikos et la mystérieuse dame de Cour venue se recueillir auprès de St Christophe...</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous tentez envers et contre tout de vous endormir.</p>","next":"seq-50","actions":[],"conditions":[],"_id":"68e7d9c46e6bbf34c392b413"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous vous concentrez sur le visage de cette dévote éconduite cette nuit.</p>","next":"seq-52","actions":[],"conditions":[],"_id":"68e7d9c46e6bbf34c392b414"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous en profitez pour lire les ouvrages prêtés par Jean Doukas.</p>","next":"seq-129","actions":[],"conditions":[],"_id":"68e7d9c46e6bbf34c392b415"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-33","content":"<p>Vous restez non loin de l&#39;impératrice qui s&#39;est agenouillée face au reliquaire de St Christophe. </p><p>Un long moment de silence et de recueillement, alors que vous sentez le regard pesant de ses suivantes.</p><p>C&#39;est ensuite que Marie Marguerite Constance d’Antioche se tourne vers vous et vous demande&nbsp;:</p><p><br/></p><p>-&quot;Pourriez-vous adresser une courte prière pour le salut de ma famille et de mon fils, afin qu&#39;il puisse monter <em>comme il se doit</em> sur le trône&nbsp;?&quot;</p><p><br/></p><p>Cette requête vous laisse pantois. La dame et son bambin sont légitimes, mais pas autant que Marie Porphyrogénète, née d&#39;un précédent mariage.  De plus, l&#39;impératrice est la fille par alliance de l&#39;infâme Renaud de Châtillon, un chevalier brigand qui sème la zizanie où qu&#39;il passe. Prier pour elle serait loyal envers Manuel, mais soutenir la fille écartée, acte de félonie, est plus en accord avec vos valeurs.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Marie Marguerite Constance d’Antioche reste votre souveraine lige.</p>","next":"seq-125","actions":[{"params":{"target":"af36ee72-b4fc-4a99-86b5-28dfac581ac3","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"690527cc019d803d0f193c32"}],"conditions":[],"_id":"690527cc019d803d0f193c31"},{"showCondition":{"query":{"params":[]}},"content":"<p>Dieu a fait de Marie Porphyrogénète l&#39;héritière légitime. Point.</p>","next":"seq-126","actions":[{"params":{"target":"9fbabf99-2aef-485b-b231-ad9cef45bc22","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"690527cc019d803d0f193c34"}],"conditions":[],"_id":"690527cc019d803d0f193c33"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-35","content":"<p><em>Christophe aurait pu faire preuve de charité, une vertu dont le score est de 1. à l&#39;inverse, son vice d&#39;avarice est de 0. Il est peu cohérent avec ces totaux, mais son libre-arbitre est le plus important.</em></p><p></p><p>-&quot;Nous ne sommes pas dans une ruelle malfamée du quartier de Galata, ici ! Ce n&#39;est pas la croisade des mendiants ! Va quémander ton pain auprès des têtes couronnées !&quot;</p><p></p><p>Vous le congédiez sans autre forme de procès ; le soldat part contrit, avec la déférence que les plus jeunes doivent aux anciens.</p>","noContent":false,"final":false,"next":"seq-20","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-38","content":"<p>Le dignitaire ne semble pas affecté par votre refus. Il replace les deux ouvrages dans le havresac qui pend des deux côtés de la selle de son destrier.</p>","noContent":false,"final":false,"next":"seq-39","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-39","content":"<p>Saisissant les rênes, il vous jette un dernier regard.</p><p>-&quot;Comment doit-on vous appeler, maître moine ?&quot;</p><p></p><p>-&quot;Christophe de Mitylène. Des monts Athos.&quot;</p><p>Vous vous fourvoyez, comme si vous étiez obligé de vous créer une noble ascendance, alors que votre famille vous a offert comme oblat dès votre tendre enfance.</p><p></p><p>-&quot;Christophe de Mitylène, apprenez à observer le monde avec acuité. Nos jours sont brefs, surtout en temps de guerre. Il serait dommage de passer à côté de votre destin&quot;.</p><p></p><p>Se hissant avec grâce sur l&#39;animal, il vous adresse un geste courtois et part à bride abattue.</p>","noContent":false,"final":false,"next":"seq-25","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-41","content":"<p>Vous prenez avec un soin religieux les deux ouvrages. De vos doigts boudinés, vous compulsez rapidement les pages du premier, une probable copie malhabile d&#39;un manuscrit plus ancien.</p><p></p><p>-&quot;Le <em>Strategicon </em>écrit par Maurice date du VIème siècle après l&#39;Incarnation de Notre Seigneur. Quelques copies subsistent dont celle-ci ; vous me la rendrez après notre victoire&quot;.</p><p></p><p>Vous êtes interloqué : Jean Doukas aurait-il accès à vos pensées ? Lit-il en vous comme dans un livre ouvert ?</p><p>-&quot;Le <em>De velitatione bellica </em>est plus récent, un siècle tout au plus. Faites-en aussi bonne lecture&quot;.</p><p></p><p>Vous avez du mal à comprendre pourquoi l&#39;hétériarque vous prête ces trésors alors qu&#39;il ne vous connaît point.</p>","noContent":false,"final":false,"next":"seq-39","actions":[{"params":{"target":"58204513-e862-4345-ad99-2ec287d42f64","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"68e42f6a6e6bbf34c36b9e57"},{"params":{"target":"1e7115cb-b5b2-48bd-a51e-cf74ff7346e1","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"68e42f6a6e6bbf34c36b9e58"},{"params":{"target":"3f035a4d-aa70-412c-b380-036578ba6526","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68e7d9c46e6bbf34c392b41e"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-42","content":"<p><em>L&#39;apothêke </em>vous propose un bâton lesté et le jette dans votre direction. Vous le saisissez d&#39;un geste assuré ; le soldat vous regarde d&#39;un air surpris. Et reprend son air martial, déclamant d&#39;une forte voix ses ordres à ses nombreux sous-fifres.</p><p></p><p>Vous examinez avec attention l&#39;arme, d&#39;une facture sans commune mesure avec la pauvre canne qui vous soutient dans les marches interminables.</p><p></p><p>Mais cet attrait est rapidement coupé par l&#39;arrivée impromptue d&#39;un cavalier richement vêtu, qui s&#39;arroge le droit de surpasser les vociférations de <em>l&#39;apothêke</em>. Son visage et ses armes ne vous sont pas inconnus...</p>","noContent":false,"final":false,"next":"seq-43","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"8aa49969-e80d-47ef-bebe-18de737b966f","size":"medium","isBefore":true},"id":"seq-43","content":"<p><em>Réalisez une épreuve </em><strong><em>d&#39;Imaginer</em></strong><em>. Elle vous sert à savoir si vous reconnaissez cet homme à l&#39;aide du faisceau d&#39;indices dont vous disposez.</em></p><p><br/></p><p><em>Pour cela, utilisez autant de dés que l&#39;aptitude </em><strong><em>Imaginer </em></strong><em>de Christophe. Comptez les dés qui indiquent un 3 </em><strong><em>ou </em></strong><em>ceux qui indiquent un 4. Ces deux valeurs sont associées à la raison et à l&#39;intellect.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous obtenez au moins une réussite.</p>","next":"seq-44","actions":[{"params":{"target":"a105667d-8f81-4a56-9df3-288221d7edae","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690a3acf019d803d0f3e330a"}],"conditions":[],"_id":"68e42f6a6e6bbf34c36b9e5b"},{"showCondition":{"query":{"params":[]}},"content":"<p>Non, les 3 et les 4 vous échappent irrémédiablement.</p>","next":"seq-45","actions":[{"params":{"target":"a105667d-8f81-4a56-9df3-288221d7edae","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690a3acf019d803d0f3e330c"}],"conditions":[],"_id":"68e42f6a6e6bbf34c36b9e5c"},{"showCondition":{"query":{"params":[]}},"content":"<p><em>Utilisez nos résultats de dés prétirés.</em></p>","next":"use-resultats-pretires","actions":[],"conditions":[],"_id":"690b1054019d803d0f42bfed"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-44","content":"<p>Andronikos Lampardas. Tel est son nom. Le meneur des <em>kataphraktoi</em>, ces soldats d&#39;élite qu&#39;on ne peut que remarquer : avec leurs splendides épées mortifères qui mesurent un bon mètre, ils forment un bataillon redoutable et redouté, depuis qu&#39;ils eurent à trucider une myriade de hongrois neuf années plus tôt.</p><p></p><p>Andronikos a de nombreux surnoms, mais il affectionne celui de faucon, donné par le Turc Kilij Arslan II, son ennemi implacable mais capable de reconnaître sa valeur.</p><p></p><p>Cependant, au vu de la suite de votre rencontre, vous l&#39;affubleriez bien d&#39;un surnom moins flatteur...</p>","noContent":false,"final":false,"next":"seq-46","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-45","content":"<p>Impossible de mettre un nom sur cet officier de haut rang. Et pourtant, vous auriez été bien avisé de reconnaître celui qui va vous servir de bourreau.</p>","noContent":false,"final":false,"next":"seq-46","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-46","content":"<p>-&quot;<em>Apothekê</em>, de quel droit dilapidez-vous les armes de Byzance ?&quot;</p><p>L&#39;officier concerné bredouille en se justifiant, tenant ses ordres de Jean Doukas.</p><p></p><p>-&quot;Et comment penses-tu que ces inermes puissent se défendre face aux glaives ennemis ? Ont-ils cela dans le sang ? La bile bout-elle dans leurs veines davantage que leur flegme ?&quot;</p><p></p><p>Quelques rires fusent des <em>kataphraktoi</em>, ces soldats d&#39;élite qui l&#39;accompagnent. D&#39;un hochement de tête, le chef qu&#39;ils nomment Andronikos vous désigne à l&#39;un d&#39;eux ; ce dernier exécute cet ordre muet et mène son cheval à votre hauteur, dans l&#39;espoir de vous jeter à terre.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Mieux vaut laisser cet imbécile parvenir à ses fins. Vous ne voudriez pas finir embrocher sur la lame de son paramerion. <em>Votre prudence et votre lâcheté en seront affectées.</em></p>","next":"seq-47","actions":[{"params":{"target":"0ee0735d-2026-4f35-99b5-8793d0d2df4e","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68ef4772d6f568715fc16d6a"},{"params":{"target":"02085f3e-158c-4be1-851a-c1812666e4ff","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68ef4772d6f568715fc16d6b"},{"params":{"target":"5b98f275-1561-46ab-873b-b14db5838e2b","subTargets":[],"modifier":"add","animation":false},"kind":"object","condition":null,"_id":"68ef4772d6f568715fc16d6c"},{"params":{"target":"70499140-e140-4a12-b334-d187811ad2ca","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690a3acf019d803d0f3e3314"}],"conditions":[],"_id":"68e42f6a6e6bbf34c36b9e60"},{"showCondition":{"query":{"params":[]}},"content":"<p>Un âne sur un destrier. Il ne sait pas à qui il a affaire. Vous allez lui faire tâter de votre nouveau bâton. <em>Votre force et votre témérité en seront affectées.</em></p>","next":"seq-48","actions":[{"params":{"target":"4fab29aa-4d04-46d2-be6a-8d2e56889231","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68ef4772d6f568715fc16d6e"},{"params":{"target":"e5cec615-ea4f-49f8-9617-d42accab8bab","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68ef4772d6f568715fc16d6f"},{"params":{"target":"70499140-e140-4a12-b334-d187811ad2ca","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690a3acf019d803d0f3e3318"}],"conditions":[],"_id":"68e42f6a6e6bbf34c36b9e61"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-47","content":"<p>Vous êtes bousculé tel un fétu de paille et votre corps, pourtant si lourd, s&#39;affranchit de toute pesanteur pour décrire un court arc de cercle gracieux, avant de chuter sans ménagement sur la terre battue.</p><p>Les chevaliers goguenards font tourner leurs chevaux autour de vous, alors que vous tentez péniblement de vous relever. Avant d&#39;être vaincu par une atroce douleur qui vous martèle le flanc.</p><p></p><p><em>Vous gagnez le </em><strong><em>Trait Côtes endolories, donnant une maladresse de niveau 1.</em></strong><em> Vous gagnez également un dé </em><strong><em>dévoyé</em></strong><em>.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous endurez ces souffrances sans mot dire et attendez le reste de la journée pour souffler.</p>","next":"seq-56","actions":[],"conditions":[],"_id":"68ef4772d6f568715fc16d71"},{"showCondition":{"query":{"params":[]}},"content":"<p>Un moine du mont Athos n&#39;est pas une victime expiatoire. Insultez ceux qui auraient pu le croire.</p>","next":"seq-57","actions":[{"params":{"target":"d00a083e-448f-4e8f-9553-862de61ae7a8","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68ef4772d6f568715fc16d73"}],"conditions":[],"_id":"68ef4772d6f568715fc16d72"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-48","content":"<p><em>Réalisez une épreuve avec l&#39;aptitude </em><strong><em>Se Mesurer</em></strong><em> : jetez autant de dés que votre score. Tous les dés donnant des </em><strong><em>5</em></strong><em> </em><strong><em>ou </em></strong><em>tous les dés donnant des </em><strong><em>6</em></strong><em> sont des réussites. Cela représente votre </em><strong><em>sang froid</em></strong><em> pour esquiver cette attaque d&#39;un combattant trop sûr de lui.</em></p><p></p><p><em>Attention ! Si vous obtenez </em><strong><em>plus de 1 que de 5</em></strong><em>, ou </em><strong><em>plus de 2 que de 6</em></strong><em>, votre nervosité prend le dessus et vous échouez !</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Au moins une réussite&nbsp;: cela va devenir intéressant...</p>","next":"seq-49","actions":[],"conditions":[],"_id":"68e42f6a6e6bbf34c36b9e64"},{"showCondition":{"query":{"params":[]}},"content":"<p>Un échec&nbsp;? Le choc va être rude...</p>","next":"seq-47","actions":[{"params":{"target":"1b582f85-922b-4fd6-8cfd-b58ad3b99611","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68ef4772d6f568715fc16d77"},{"params":{"target":"70499140-e140-4a12-b334-d187811ad2ca","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690b1054019d803d0f42c002"}],"conditions":[],"_id":"68e42f6a6e6bbf34c36b9e65"},{"showCondition":{"query":{"params":[]}},"content":"<p><em>Utilisez nos résultats de dés prétirés.</em></p>","next":"use-resultats-pretires-1","actions":[],"conditions":[],"_id":"690b1054019d803d0f42c003"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-49","content":"<p>Vous vous écartez de façon gracile de la trajectoire du soldat d&#39;élite. Ce dernier ne s&#39;attendait pas à une réaction aussi vive. Il tente de faire tourner son cheval pour vous faire face, mais c&#39;est sans compter le sol meuble qui ne lui offre pas l&#39;assise nécessaire. Sa monture dérape et dodeline de l&#39;arrière-train, manquant de faire chuter son cavalier.</p><p>Ses comparses laissent échapper quelques rires gras, avant que la trogne d&#39;Andronikos ne leur enlève toute velléité de continuer.</p><p>Vous trônez toujours sur vos deux pieds, et conservez toute votre superbe.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Un moine du mont Athos n'est pas une victime expiatoire. Insultez ceux qui auraient pu le croire.</p>","next":"seq-57","actions":[{"params":{"target":"d00a083e-448f-4e8f-9553-862de61ae7a8","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68ef4772d6f568715fc16d7a"}],"conditions":[],"_id":"68ef4772d6f568715fc16d79"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous vous mettez en garde silencieuse, et attendez la réaction de vos adversaires.</p>","next":"seq-58","actions":[{"params":{"target":"d00a083e-448f-4e8f-9553-862de61ae7a8","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"68ef4772d6f568715fc16d7c"}],"conditions":[],"_id":"68ef4772d6f568715fc16d7b"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-50","content":"<p>Et c&#39;est le repos du juste qui vous attend. Vous espérez dormir des siècles comme les sept condormants d&#39;Ephèse, mais ce n&#39;est qu&#39;une légende et la réalité vous rattrape au petit matin, quand le soleil point et réchauffe le sol gelé par l&#39;étreinte glaciale de la nuit.</p><p></p><p><em>Vous récupérez une partie de vos forces et pouvez enlever un </em><strong><em>dé dévoyé</em></strong><em>.</em></p>","noContent":false,"final":false,"next":"seq-51","actions":[{"params":{"target":"66d53693-fbde-476a-9b89-71dc97b52e91","subTargets":[],"modifier":"sub","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"68e7d9c46e6bbf34c392b42e"},{"params":{"target":"82fd47ea-c5c0-4b64-912a-604852561d8e","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690d1179019d803d0f5f8d72"},{"params":{"target":"ad01f3f3-c093-4fa4-84b3-d731e4a1ffc4","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690d1179019d803d0f5f8d73"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-51","content":"<p>Vous arrivez à quelques lieux de Konya, le probable théâtre de la bataille, si les rapports des éclaireurs ont fait mouche. C&#39;est un vaste défilé rocheux qui s&#39;offre à votre regard. Un corridor dans lequel s&#39;engouffrera bientôt des centaines de milliers d&#39;âmes, précipitées par Dieu vers une destinée incertaine. </p><p></p><p>Une vue mystique s&#39;empare de vous, quand vous vous hasardez à songer à ces femmes et ces hommes comme des trépassés se pressant au Jugement Dernier. Vous secouez la tête. Le soleil est plus fort que jamais.</p><p></p><p>La fourmilière s&#39;arrête non loin de l&#39;entrée de la vallée rocheuse. Une tente est dressée à la hâte pour accueillir ce qui ressemble à un conseil de guerre.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p><em>Il est peut-être temps de voir dans quel état vous vous trouvez.</em></p>","next":"use-etat-des-lieux","actions":[],"conditions":[],"_id":"68e7d9c46e6bbf34c392b430"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous êtes curieux de savoir ce qui se trame dans la tente. Un moine devrait pouvoir s&#39;y frayer un chemin.</p>","next":"seq-59","actions":[],"conditions":[],"_id":"68ef4772d6f568715fc16d81"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-52","content":"<p>Vous tentez de vous souvenir de ces traits, avec l&#39;impression de les avoir contemplés à plusieurs reprises.</p><p></p><p><em>Prenez autant de dés que votre score en </em><strong><em>Dévoiler</em></strong><em>. Comptez les résultats de </em><strong><em>7</em></strong><em> ou les résultats de</em><strong><em> 8</em></strong><em> comme des succès. Les 7 et les 8 sont associés à l&#39;inspiration, l&#39;intuition. Si vous obtenez un </em><strong><em>10</em></strong><em>, transformez-le dans le résultat que vous souhaitez. Si vous obtenez un </em><strong><em>9</em></strong><em>, relancez-le.</em></p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Vous avez au moins deux réussites.</p>","next":"seq-53","actions":[{"params":{"target":"3ba27df4-db33-4e06-a1eb-0563df6cdc65","subTargets":[],"modifier":"add","value":1,"valueType":"numeric","minValueType":"numeric","minValue":-1,"maxValueType":"numeric","maxValue":-1,"animation":false},"kind":"counter","condition":null,"_id":"690b1054019d803d0f42c010"}],"conditions":[],"_id":"68e7d9c46e6bbf34c392b432"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous n&#39;obtenez qu&#39;une réussite ou moins.</p>","next":"seq-54","actions":[],"conditions":[],"_id":"68e7d9c46e6bbf34c392b433"},{"showCondition":{"query":{"params":[]}},"content":"<p><em>Vous souhaitez utiliser nos résultats de dés prétirés.</em></p>","next":"use-resultats-pretires-2","actions":[],"conditions":[],"_id":"690b1054019d803d0f42c012"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-53","content":"<p style=\"text-align: left;\">Mince, vos songes sont précieux mais pernicieux : ils vous révèlent l&#39;identité de la dame.</p><p style=\"text-align: left;\"></p><p style=\"text-align: left;\">Marie Marguerite Constance d&#39;Antioche, épouse de l&#39;empereur Manuel Comnène Ier. Ni plus, ni moins. La mère de celui qui a toutes les chances de succéder sur le trône, même si d&#39;un premier mariage, son père eut la princesse Marie Porphyrogénète, légitimée lors de sa naissance dans la pourpre et le porphyre, mais reléguée à son statut de simple femme par son jeune demi-frère.</p><p style=\"text-align: left;\">Et vous vous êtes certainement attiré son inimitié...</p><p style=\"text-align: left;\"></p><p style=\"text-align: left;\"><em>Ce qui ne manque pas de vous inquiéter fortement. Vous gagnez un jeton dévoyé en </em><strong><em>Flegme</em></strong><em>.</em></p><p></p>","noContent":false,"final":false,"next":"seq-50","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-54","content":"<p>La mémoire vous fait défaut. Et pourtant... En tant que moine, vous l&#39;avez entraînée tellement de fois ! A croire qu&#39;un sortilège pèse sur votre esprit embrumé... Vous ne tardez pas à rendre les armes et à sombrer dans un sommeil bien lourd.</p>","noContent":false,"final":false,"next":"seq-50","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"use-etat-des-lieux","content":"","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":"542b3282-d6b1-4ae3-a021-fa032f780a2b","routineExit":[{"from":"start-4","next":"seq-51","actions":[],"conditions":[],"_id":"68e7d9c46e6bbf34c392b437"}]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-56","content":"","noContent":true,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Si vous souhaitez consulter l&#39;état de Christophe de Mitylène...</p>","next":"use-etat-des-lieux-1","actions":[],"conditions":[],"_id":"68ef4772d6f568715fc16d8b"},{"showCondition":{"query":{"params":[]}},"content":"<p>Si vous jugez que cela ne vous ferait que vous apitoyer sur son sort, passez votre chemin.</p>","next":"seq-27","actions":[],"conditions":[],"_id":"68ef4772d6f568715fc16d8c"}],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"use-etat-des-lieux-1","content":"","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":"542b3282-d6b1-4ae3-a021-fa032f780a2b","routineExit":[{"from":"start-4","next":"seq-27","actions":[],"conditions":[],"_id":"68ef4772d6f568715fc16d8e"}]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-57","content":"<p>-&quot;<em>Abi pedicatum</em>&quot;, lancez vous à demi-mot, suffisamment fort pour que votre tortionnaire vous entende.</p><p><br/></p><p>-&quot;Qu&#39;as-tu dit, maraud&nbsp;?&quot;</p><p>-&quot;<em>Sane coleus es&nbsp;!</em>&quot;</p><p>Le soudard se retourne vers Andronikos. Ils semblent ne pas comprendre le latin, surtout dans sa version vulgaire. Autant en profiter.</p><p>-&quot;<em>In cruce figaris, Caepa cirrata&nbsp;!</em>&quot;</p><p><br/></p><p>Le cavalier s&#39;avance vers vous, visiblement motivé à abréger vos maux et vos mots. Andronikos s&#39;interpose et vous jette un regard noir. D&#39;un geste de la main, il congédie ses gardes et repart à bride abattue vers le début de la colonne d&#39;armée.</p><p><br/></p><p>Un sourire forcé se dessine sur votre visage. Passer un <em>va te faire foutre, tu es un vrai couillon, va te faire crucifier oignon frisé </em>constituera votre trophée de la journée.</p>","noContent":false,"final":false,"next":"seq-27","actions":[{"params":{"target":"0a10a564-2361-438a-864f-fd539f69581d","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690499b9019d803d0f1705cc"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-58","content":"<p>Les gardes tournoient autour de vous, lentement, comme des fauves qui encerclent une pauvre antilope sortie du troupeau. Mais le lion rugit. Andronikos rappelle ses hommes, non sans vous gratifier d&#39;un regard des plus courroucés. Tous se lancent dans une cavalcade vers l&#39;avant-garde de l&#39;armée. Vous l&#39;avez échappé belle.</p>","noContent":false,"final":false,"next":"seq-27","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-59","content":"<p>Un dais a été dressé à la hâte pour que l&#39;empereur puisse y siéger en compagnie de ses proches. Manuel Comnène apparaît dans toute sa splendeur, en compagnie des membres éminents de sa Cour. </p><p><br/></p><p>Ces figures hiératiques ont une rigidité héritée de cette étiquette impériale où chaque mouvement de cil peut être interprété. Ces visages de porcelaine ne sont pas ceux des généraux dont le teint s&#39;empourpre quand il s&#39;agit de décider de la stratégie à suivre. Surtout qu&#39;ils ne sont guère d&#39;accord sur le sujet.</p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[{"target":"d00a083e-448f-4e8f-9553-862de61ae7a8","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"68f00e18019d803d0f95e713"}]},"kind":"flag"},"content":"<p>Vous retrouvez Andronikos, votre nouvel ennemi, dans ce conciliabule.</p>","next":"seq-60","actions":[{"params":{"target":"e5cec615-ea4f-49f8-9617-d42accab8bab","subTargets":[],"modifier":"add","value":1,"valueType":"
