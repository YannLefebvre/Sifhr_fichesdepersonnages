t":"<p>Le manuscrit est plus récent que son homologue. Sur de nombreux sujets, il est d&#39;ailleurs en désaccord en termes de stratégie. Notamment sur la façon d&#39;organiser une armée en marche.</p><p></p><p>&quot;S&#39;il y a de hautes montagnes, à la frontière de l&#39;ennemi, c&#39;est là qu&#39;il faut installer</p><p>les postes de soldats. Il est important d&#39;occuper les sommets des montagnes</p><p>et l&#39;infanterie doit être placée des deux côtés de la route.&quot;</p>","noContent":false,"final":false,"next":"seq-32","actions":[{"params":{"target":"a12b47f4-99a3-48c4-980a-2f2c3ca98fe7","subTargets":[],"modifier":"set","value":true,"valueType":"bool","animation":false},"kind":"flag","condition":null,"_id":"690b1054019d803d0f42c0ee"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-132","content":"<p>----------------------------------------</p>","noContent":false,"final":false,"next":"seq-102","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-133","content":"<p>------------------------------------------</p>","noContent":false,"final":false,"next":"seq-102","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"seq-134","content":"<p>-------------------------------------------</p>","noContent":false,"final":false,"next":"seq-102","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volu rentes parties de l&#39;armée soient suivies par ses chariots. Le train de chariots commun doit suivre les guerriers légèrement armés. </em></p><p></p><p>Soit. mais vous vous posez la question de la pertinence de ce placement, si jamais les guerriers lourds ne pouvaient intervenir quand ce train de siège est victime d&#39;une embuscade...</p>","noContent":false,"final":false,"next":"start","actions":[{"params":{"target":"21a9747c-9608-40ed-b8e1-fa17698b5a25","modifier":"set","value":true,"valueType":"bool","subTargets":[],"animation":false},"kind":"flag","condition":null,"_id":"691b9a35019d803d0fc5df9f"}],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-7","content":"<p>Vous n&#39;avez guère le temps de vous plonger plus avant dans la lecture de cet ouvrage. Vous remettez cela à plus tard, happé par des impératifs plus pressants.</p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-8","content":"<p>Le <em>De velitatione bellica</em> n&#39;est que la traduction latine de Περὶ Παραδρομῆς, qu&#39;on peut traduire par &quot;<em>de l&#39;embuscade</em>&quot;. Vous pestez sur le fait que Byzance n&#39;est même plus capable de fournir à ses citoyens des livres dans leur langue d&#39;origine.</p><p>En le parcourant rapidement, ce n&#39;est qu&#39;un assemblage de tactiques défensives byzantines d&#39;un autre âge. </p>","noContent":false,"final":false,"actions":[],"conditions":[],"choices":[{"showCondition":{"query":{"params":[]}},"content":"<p>Inutile de perdre son temps et de se fatiguer à lire ceci.</p>","next":"start-7","actions":[],"conditions":[],"_ s":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-33","content":"<p>Notre moine semble atteint par la grâce : un vent éthéré empli d&#39;une pneuma harmonieuse dope ses capacités spirituelles.</p><p></p><p><em>Christophe fixera un résultat de 7 dans ses jets de dés de Souffle. Ce résultat peut être modifié par le dévoiement du dé fixé.</em></p>","noContent":false,"final":false,"next":"start-2","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-34","content":"<p>Le discernement est une chose complexe, mélange d&#39;intuition et de jugement. Christophe semble ne disposer ni de l&#39;un, ni de l&#39;autre en ce moment. Cela pourrait l&#39;amener à concevoir des pensées erronées ou pire - hérétiques...</p><p></p><p><em>Christophe fixera un résultat de 8 dans ses jets de dés de Souffle. Ce résultat ne pourra être modifié d&#39;une quelconque manière, jusqu&#39;à ce que cette saturation cesse.</em></p>","noContent":false,"final":false,"next":"start-2","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-35","content":"<p>Le sang est un puissant vecteur d&#39;inspiration divine. Le coeur mystique de Christophe bat à l&#39;unisson de la volonté divine.</p><p></p><p><em>Christophe fixera un résultat de 8 dans ses jets de dés de Souffle. Ce résultat peut être modifié par le dévoiement du dé fixé.</em></p>","noContent":false,"final":false,"next":"start-2","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]}],"numWords":1881,"numSequences":37},{"id":"ce5380aa-442a-48d9-b3ec-dc8a7287a4f7","label":"comprendre-les-regles","firstSequence showCondition":{"query":{"params":[]}},"content":"<p>Les Traits</p>","next":"start-5","actions":[],"conditions":[],"_id":"690a3acf019d803d0f3e345e"},{"showCondition":{"query":{"params":[{"target":"ad01f3f3-c093-4fa4-84b3-d731e4a1ffc4","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"690a3acf019d803d0f3e3460"}]},"kind":"flag"},"content":"<p>Fixer des dés</p>","next":"start-6","actions":[],"conditions":[],"_id":"690a3acf019d803d0f3e345f"},{"showCondition":{"query":{"params":[{"target":"70499140-e140-4a12-b334-d187811ad2ca","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"690a3acf019d803d0f3e3462"}]},"kind":"flag"},"content":"<p>Les épreuves complexes&nbsp;: les maladresses</p>","next":"start-10","actions":[],"conditions":[],"_id":"690a3acf019d803d0f3e3461"},{"showCondition":{"query":{"params":[{"target":"2774be65-638b-4532-86e5-1f08fc707efb","condition":"=","value":true,"valueType":"bool","animation":false,"_id":"690a3acf019d803d0f3e3464"}]},"kind":"flag"},"content":"<p>Vertus et vices et dilemmes moraux</p>","next":"start-11","actions":[],"conditions":[],"_id":"690a3acf019d803d0f3e3463"},{"showCondition":{"query":{"params":[]}},"content":"<p>Vous avez acquis le savoir nécessaire&nbsp;? Poursuivez votre aventure ici.</p>","next":"start-12","actions":[],"conditions":[],"_id":"690a3acf019d803d0f3e3465"}],"usedVariables":[],"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"7e8c61f4-d95c-480a-97ef-0ab080b914b0","size":"small","kind":"circular","isBefore":true,"allowZoom":true},"id":"start-1","content":"<p>L&#39;octogone décrit l&#39;influence des quatre <strong>éléments </strong>et des quatre <strong>humeurs </strong>sur le personnage.</p><p>Ces influences sont traduites par des jetons, trois maximum dans chacun des huit segments. </p><p>Avec trois jetons, le segment est <strong>saturé </strong>: l&#39;influence est telle qu&#39;elle emplit le personnage et affecte ses réactions émotionnelles, intellectuelles ou spirituelles.</p><p>Ces jetons sont <strong>purs </strong>(en blanc) s&#39;ils reflètent une influence bénéfique, ou <strong>dévoyés </strong>(en noir) si c&#39;est néfaste.</p><p><br/></p><p>L&#39;octogone est la grille de lecture permettant de saisir l&#39;état d&#39;un personnage à l&#39;instant T.</p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"f94f294f-aac6-46a1-bc8a-7ffa3fa5856a","size":"small","isBefore":false,"allowZoom":true},"id":"start-2","content":"<p>Les <strong>aptitudes </strong>servent à définir ce que le personnage est plus ou moins capable d&#39;accomplir. Leur score détermine le nombre de dés 10 à lancer quand l&#39;aventure nécessite de recourir à une <strong>épreuve</strong>.</p><p>Le <strong>souffle </strong>est le supplément d&#39;âme qu&#39;apporte l&#39;initié, en fonction de ses humeurs, des influences qu&#39;il subit. Un initié bénéficie de deux dés 10 qui viennent en supplément des dés d&#39;aptitudes.</p><p></p><p>Pour réaliser une <strong>épreuve</strong>, il faut lancer l&#39;ensemble de ces dés 10, et cumuler des résultats sur deux valeurs bien spécifiques.</p><p></p><p></p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-4","content":"<p>Un personnage puissant - initié ou pas - a la faculté de modifier certains résultats de dés. Par un surcroit de fatigue ou par des prises de risques, il peut alors <strong>changer une valeur d&#39;un point</strong> (additionner ou soustraire 1 d&#39;un résultat). On dit alors <strong>qu&#39;on dévoie</strong> le résultat.</p><p>Cela ne fonctionne que sur les valeurs de l&#39;octogone, de 1 à 8.</p><p></p><p><em>Les valeurs se modifient en suivant les segments de l&#39;octogone : si un 5 dévoyé devient un 4 ou un 6, le 1 dévoyé devient un 2 ou un </em><strong><em>8</em></strong><em>, le 8 dévoyé devient un 7 ou un </em><strong><em>1</em></strong><em>.</em></p><p></p><p>Le nombre de dés dévoyés à une importance : lors des épreuves suivantes, <strong>on ne pourra plus dévoyer autant de dés </strong>que ce nombre. Cela traduit l&#39;affaiblissement progressif du personnage, contraint d&#39;accepter ces premiers résultats...</p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-5","content":"<p>--------------------------------</p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-6","content":"<p>-----------------------------------</p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-7","content":"<p>Un résultat de <strong>10 </strong>est très bénéfique. Un véritable cadeau de Dieu que le joueur peut transformer ensuite dans la valeur de son choix.</p><p></p><p>Un résultat de <strong>9</strong> est plus ambigu. Il est associé à des facteurs inconnus qui influencent l&#39;épreuve, d&#39;une manière qui échappe au joueur, mais pas au meneur de jeu qui le guide. Des acteurs occultes, des vents d&#39;énergie mystique particulièrement chargés peuvent en être responsables.</p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"image":{"id":"5ed73662-b207-4a33-8f1a-ca6d057bfbff","size":"small","isBefore":false,"allowZoom":true},"id":"start-9","content":"<p>3 jetons dans le même segment de l&#39;octogone ? Cela induit des réactions en fonction :</p><ul><li>d&#39;une saturation majoritairement pure ou majoritairement dévoyée</li><li>de l&#39;élément ou l&#39;humeur concernés</li></ul><p></p><p><em>Le </em><strong><em>feu </em></strong><em>et la bile </em><strong><em>jaune </em></strong><em>saturés de façon </em><strong><em>pure </em></strong><em>donnent un surcroit d&#39;énergie, sont propices à une action et une réaction sans détour.</em></p><p><em>Le </em><strong><em>feu </em></strong><em>et la </em><strong><em>bile jaune</em></strong><em> saturés de façon </em><strong><em>dévoyée </em></strong><em>créent une colère irrépressible et trop souvent préjudiciable pour le personnage.</em></p><p><em>La </em><strong><em>terre </em></strong><em>et la </em><strong><em>bile noire</em></strong><em> saturés de façon </em><strong><em>pure </em></strong><em>aident à la concentration, à la réflexion, au génie.</em></p><p><em>La </em><strong><em>terre </em></strong><em>et la </em><strong><em>bile noire</em></strong><em> saturés de façon </em><strong><em>dévoyée </em></strong><em>occasionnent une confusion mentale, une indolence, une perte de volonté.</em></p><p><strong><em>L&#39;eau </em></strong><em>et le </em><strong><em>flegme </em></strong><em>saturés de façon </em><strong><em>pure </em></strong><em>aident à garder son sang-froid, adopter une attitude calme et centrée.</em></p><p><strong><em>L&#39;eau </em></strong><em>et le </em><strong><em>flegme </em></strong><em>saturés de façon </em><strong><em>dévoyée </em></strong><em>induisent une gêne, une peur, une panique.</em></p><p><strong><em>L&#39;air </em></strong><em>et le </em><strong><em>sang </em></strong><em>saturés de façon </em><strong><em>pure</em></strong><em> ouvrent le personnage à la spiritualité, à l&#39;énergie mystique, au savoir divin.</em></p><p><strong><em>L&#39;air </em></strong><em>et le </em><strong><em>sang </em></strong><em>saturés de façon </em><strong><em>dévoyée </em></strong><em>sont pernicieux : la perte de la connexion divine ou l&#39;erreur diabolique en sont les résultantes.</em></p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-10","content":"<p>----------------------------------------------</p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-11","content":"<p>-----------------------------------------</p>","noContent":false,"final":false,"next":"start","actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[]},{"soundLoop":{"params":{"volume":1,"delay":0,"speed":1}},"soundSfx":{"params":{"volume":1,"delay":0,"speed":1}},"timer":{"active":false},"id":"start-12","content":"","noContent":false,"final":true,"actions":[],"conditions":[],"choices":[],"usedVariables":[],"routineId":null,"routineExit":[],"routineExitLabel":"sortie regles"}],"numWords":682,"numSequences":11},{"id" <script>

const SUPABASE_URL = 'https://qyifamxfvswcglvrzduf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aWZhbXhmdnN3Y2dsdnJ6ZHVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njc5NDcsImV4cCI6MjA5NjM0Mzk0N30.CEx_xQGgEiWukuc62Z_NSrrYX6TalAHC-z3HdjI4ZPs';

const SB = {
  hdrs:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},
  async get(id){const r=await fetch(`${SUPABASE_URL}/rest/v1/fiches?id=eq.${encodeURIComponent(id)}&select=*`,{headers:this.hdrs});const d=await r.json();return d[0]||null;},
  async patch(id,data){return fetch(`${SUPABASE_URL}/rest/v1/fiches`,{method:'POST',headers:{...this.hdrs,'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({id,...data})});}
};

// ── Mappings ──
const AXES = ['feu','bile_j','terre','bile_n','eau','flegme','air','sang'];
const AXES_LABELS = {feu:'Feu',bile_j:'Bile J.',terre:'Terre',bile_n:'Bile N.',eau:'Eau',flegme:'Flegme',air:'Air',sang:'Sang'};
const COUNTER_TO_OCT = {
  '1FeuPur':{axe:'feu',pol:'w'},'1FeuDev':{axe:'feu',pol:'b'},
  '2BJPur':{axe:'bile_j',pol:'w'},'2BJDev':{axe:'bile_j',pol:'b'},
  '3TerrePur':{axe:'terre',pol:'w'},'3TerreDev':{axe:'terre',pol:'b'},
  '4BNPur':{axe:'bile_n',pol:'w'},'4BNDev':{axe:'bile_n',pol:'b'},
  '5EauPur':{axe:'eau',pol:'w'},'5EauDev':{axe:'eau',pol:'b'},
  '6FlegmePur':{axe:'flegme',pol:'w'},'6FlegmeDev':{axe:'flegme',pol:'b'},

  '8SangPur':{axe:'sang',pol:'w'},'8SangDev':{axe:'sang',pol:'b'},
};
const APT_COUNTER_MAP = {
  'Apt_SeDeplacer':'se_deplacer','Apt_SeMesurer':'se_mesurer',
  'Apt_Occulter':'occulter','Apt_Imaginer':'imaginer',
  'Apt_Fabriquer':'fabriquer','Apt_Devoiler':'devoiler',
  'Apt_Resister':'resister','Apt_Ravir':'ravir',
};

  'se déplacer':'se_deplacer','se mesurer':'se_mesurer',
  'occulter':'occulter','imaginer':'imaginer',
  'fabriquer':'fabriquer','dévoiler':'devoiler','devoiler':'devoiler',
  'résister':'resister','resister':'resister','ravir':'ravir',
};
const VV_COUNTERS = ['Force','Envie','Charité','Luxure','Loyauté','Malignité',
  'Prudence','Acédie','Tempérance','Lâcheté','Chasteté','Avarice','Foi','Félonie','Espérance','Témérité'];

// ── État ──
let FICHE_ID='', ficheEtat=null, saveTimer=null, _syncOctTimer=null;
let gameState = {counters:{},flags:{},inventory:[],currentSeq:'',history:[]};

const seqIndex={}, counterIndex={}, flagIndex={}, assetIndex={};

function initIndexes(){
  STORY_DATA.sequences.forEach(s=>seqIndex[s.id]=s);
  STORY_DATA.counters.forEach(c=>{counterIndex[c.id]=c;counterIndex[c.name]=c;});
  STORY_DATA.flags.forEach(f=>{flagIndex[f.id]=f;flagIndex[f.name]=f;});
  (STORY_DATA.assets||[]).forEach(a=>{assetIndex[a.id]=a;});
  STORY_DATA.counters.forEach(c=>{gameState.counters[c.id]=c.defaultValue;});
  STORY_DATA.flags.forEach(f=>{gameState.flags[f.id]=f.defaultValue;});
}

// ── Auth ──
document.getElementById('modal-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('modal-fiche').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('modal-pw').focus();});

async function doLogin(){
  const fiche=document.getElementById('modal-fiche').value.trim();
  const pw=document.getElementById('modal-pw').value.trim();
  const err=document.getElementById('modal-err');
  err.textContent='';
  if(!fiche||!pw){err.textContent='Remplis les deux champs.';return;}
  const btn=document.querySelector('.modal-btn');btn.textContent='…';btn.disabled=true;
  try{
    const row=await SB.get(fiche);
    if(!row){err.textContent='Fiche introuvable : «'+fiche+'»';}
    else if(row.mot_de_passe!==pw){err.textContent='Mot de passe incorrect.';}
    else{
      FICHE_ID=fiche;ficheEtat=row.etat||{};
      _fichePanelPw=pw; // Stocker pour fédération d'identité
      document.getElementById('modal-overlay').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('fiche-fab').style.display='flex';
      initIndexes();
      if(row.aventure_state){
        try{
          const saved=typeof row.aventure_state==='string'?JSON.parse(row.aventure_state):row.aventure_state;
          if(saved&&saved.currentSeq&&confirm('Reprendre votre partie en cours ?')){
            Object.assign(gameState,saved);renderSequence(gameState.currentSeq);renderStatusBar();startRealtime();return;
          }
        }catch(e){}
      }
      syncFromOctogone();
      renderSequence(STORY_DATA.firstSequence);
      renderStatusBar();
      startRealtime();
    }
  }catch(e){err.textContent='Erreur réseau.';}
  btn.textContent='Commencer';btn.disabled=false;
}

  octogone: ['aptitudes-panel','traits-panel','confrerie-panel','equipement-panel',
             'artefacts-panel','prodiges-panel','historique-panel'],
  des:      ['dice-overlay'],

// ── Détection d'épreuve dans le contenu ──
function detectEpreuve(htmlContent){
  const text=htmlContent.replace(/<[^>]+>/g,'');
  const isEpreuve=/r[eé]alisez une [eé]preuve|jetez autant de d[eé]s|[eé]preuve (d[e']|avec|de) /i.test(text);
  if(!isEpreuve) return null;
  // Extraire aptitude
  const aptMatch=text.match(/(?:aptitude|épreuve d[e']\s*|épreuve de\s+)([A-ZÀ-Ü][a-zà-ü\s]+?)(?:\s*[.:,]|\s+avec|\s+\[|$)/i);
  let aptKey=null;
  if(aptMatch){
    const aptName=aptMatch[1].trim().toLowerCase();
    aptKey=APT_NAME_TO_KEY[aptName]||null;
  }
  // Extraire valeurs de réussite
  const valMatch=text.match(/(?:valeurs? de r[eé]ussite[^0-9]*|donnant[^0-9]*)([1-8])(?:[^0-9]+)(?:ou|et)[^0-9]*([1-8])/i);
  const vals=valMatch?[parseInt(valMatch[1]),parseInt(valMatch[2])]:[];
  return {aptKey,vals,text:text.substring(0,200)};
}

// ── Sync Octogone → Moiki ──
function syncFromOctogone(){
  if(!ficheEtat) return;
  const apts=ficheEtat.aptitudes||{};
  Object.entries(APT_COUNTER_MAP).forEach(([cName,aptKey])=>{
    const c=counterIndex[cName];if(!c)return;
    gameState.counters[c.id]=Math.min(apts[aptKey]?.score||0,c.max);
  });
  const tokens=ficheEtat.tokens||{};
  Object.entries(COUNTER_TO_OCT).forEach(([cName,{axe,pol}])=>{
    const c=counterIndex[cName];if(!c)return;
    const arr=tokens[axe]||['empty','empty','empty'];
    gameState.counters[c.id]=arr.filter(t=>t===(pol==='w'?'white':'black')).length;
  });
}

// ── Sync Moiki → Octogone ──
async function syncToOctogone(){
  if(!ficheEtat) return;
  const etat=JSON.parse(JSON.stringify(ficheEtat));
  if(!etat.tokens) etat.tokens={};
  AXES.forEach(axe=>{if(!etat.tokens[axe])etat.tokens[axe]=['empty','empty','empty'];});
  Object.entries(COUNTER_TO_OCT).forEach(([cName,{axe,pol}])=>{
    const c=counterIndex[cName];if(!c)return;
    const val=Math.max(0,Math.min(3,gameState.counters[c.id]||0));
    const arr=etat.tokens[axe];
    const tokType=pol==='w'?'white':'black';
    const otherPol=pol==='w'?'black':'white';
    const otherCount=arr.filter(t=>t===otherPol).length;
    const newArr=[];
    for(let i=0;i<3;i++){
      if(i<otherCount)newArr.push(otherPol);
      else if(i<otherCount+val)newArr.push(tokType);
      else newArr.push('empty');
    }
    etat.tokens[axe]=newArr;
  });
  ficheEtat=etat;
  await SB.patch(FICHE_ID,{etat});
}
function syncToOctogoneDebounced(){clearTimeout(_syncOctTimer);_syncOctTimer=setTimeout(syncToOctogone,2000);}

// ── Barre de statut ──
function renderStatusBar(){
  // Axes
  const pillsAxes=document.getElementById('pills-axes');
  pillsAxes.innerHTML='';
  AXES.forEach(axe=>{
    const purC=Object.values(counterIndex).find(c=>c.name&&COUNTER_TO_OCT[c.name]?.axe===axe&&COUNTER_TO_OCT[c.name]?.pol==='w');
    const devC=Object.values(counterIndex).find(c=>c.name&&COUNTER_TO_OCT[c.name]?.axe===axe&&COUNTER_TO_OCT[c.name]?.pol==='b');
    const purV=purC?gameState.counters[purC.id]||0:0;
    const devV=devC?gameState.counters[devC.id]||0:0;
    if(purV===0&&devV===0)return;
    const pill=document.createElement('span');
    pill.className='stat-pill'+(purV>devV?' white':devV>purV?' black':'');
    const dots=[];
    for(let i=0;i<purV;i++)dots.push('<span class="oct-dot w"></span>');
    for(let i=0;i<devV;i++)dots.push('<span class="oct-dot b"></span>');
    pill.innerHTML=`<span style="font-size:.6rem;font-family:Cinzel,serif;color:var(--ink3);margin-right:2px;">${AXES_LABELS[axe]}</span>${dots.join('')}`;
    pill.title=`${AXES_LABELS[axe]} — ${purV} blanc(s) · ${devV} noir(s)`;
    pillsAxes.appendChild(pill);
  });
  // Aptitudes
  const pillsApts=document.getElementById('pills-apts');
  pillsApts.innerHTML='';
  Object.entries(APT_COUNTER_MAP).forEach(([cName,aptKey])=>{
    const c=counterIndex[cName];if(!c)return;
    const val=gameState.counters[c.id]||0;
    if(val===0)return;
    const pill=document.createElement('span');
    pill.className='stat-pill'+(val>=4?' active':'');
    pill.textContent=aptKey.replace('_',' ')+' '+val;
    pillsApts.appendChild(pill);
  });
  // VV
  const pillsVV=document.getElementById('pills-vv');
  pillsVV.innerHTML='';
  VV_COUNTERS.map(name=>{const c=counterIndex[name];if(!c)return null;return{name,val:gameState.counters[c.id]||0};})
    .filter(v=>v&&v.val>0).sort((a,b)=>b.val-a.val).slice(0,4)
    .forEach(({name,val})=>{
      const pill=document.createElement('span');
      pill.className='stat-pill'+(val>=2?' active':'');
      pill.textContent=name+' '+val;
      pillsVV.appendChild(pill);
    });
  // Inventaire
  const invEl=document.getElementById('inventory-bar');
  const invItems=document.getElementById('inv-items');
  invItems.innerHTML='';
  if(gameState.inventory.length>0){
    invEl.style.display='block';
    gameState.inventory.forEach(aid=>{
      const a=assetIndex[aid];if(!a)return;
      const item=document.createElement('span');item.className='inv-item';
      item.textContent=a.label||aid;item.title=a.desc||'';
      invItems.appendChild(item);
    });
  } else invEl.style.display='none';
}

// ── Conditions ──
function evalCondition(cond){
  if(!cond||!cond.kind)return true;
  const {kind,query}=cond;
  if(kind==='flag'){
    return (query?.params||[]).every(p=>{
      const val=gameState.flags[p.target];
      if(p.condition==='=')return val===p.value;
      if(p.condition==='!=')return val!==p.value;
      return true;
    });
  }
  if(kind==='counter'){
    return (query?.params||[]).every(p=>{
      const val=gameState.counters[p.target]||0;
      if(p.condition==='=')return val===p.value;
      if(p.condition==='!=')return val!==p.value;
      if(p.condition==='>') return val>p.value;
      if(p.condition==='>=')return val>=p.value;
      if(p.condition==='<') return val<p.value;
      if(p.condition==='<=')return val<=p.value;
      return true;
    });
  }
  if(kind==='multiple'){
    const op=query?.operator||'AND';
    const results=(query?.params||[]).map(p=>evalCondition(p));
    return op==='AND'?results.every(Boolean):results.some(Boolean);
  }
  return true;
}

// ── Actions ──
function applyActions(actions){
  if(!actions||!actions.length)return;
  const changes=[];
  actions.forEach(action=>{
    if(action.condition&&!evalCondition(action.condition))return;
    const{kind,params}=action;
    if(kind==='flag'){
      const old=gameState.flags[params.target];
      if(params.modifier==='set')gameState.flags[params.target]=params.value;
      else if(params.modifier==='toggle')gameState.flags[params.target]=!gameState.flags[params.target];
      const f=flagIndex[params.target];
      if(f&&gameState.flags[params.target]!==old)changes.push({type:'flag',name:f.name,val:gameState.flags[params.target]});
    }
    if(kind==='counter'){
      const c=counterIndex[params.target];if(!c)return;
      const old=gameState.counters[params.target]||0;
      let nv=old;
      if(params.modifier==='add')nv=old+(params.value||1);
      else if(params.modifier==='set')nv=params.value||0;
      else if(params.modifier==='sub')nv=old-(params.value||1);
      nv=Math.max(c.min||0,Math.min(c.max||99,nv));
      gameState.counters[params.target]=nv;
      if(COUNTER_TO_OCT[c.name]&&nv!==old)changes.push({type:'octogone',name:c.name,old,val:nv});
      else if(VV_COUNTERS.includes(c.name)&&nv!==old)changes.push({type:'vv',name:c.name,old,val:nv});
    }
    if(kind==='object'){
      if(params.modifier==='add'&&!gameState.inventory.includes(params.target)){
        gameState.inventory.push(params.target);
        const a=assetIndex[params.target];
        if(a)changes.push({type:'item',name:a.label,acquired:true});
      }
      if(params.modifier==='remove')gameState.inventory=gameState.inventory.filter(id=>id!==params.target);
    }
  });
  if(changes.length)showChangeNotif(changes);
}

// ── Notifications changements ──
function showChangeNotif(changes){
  const msgs=[];
  changes.forEach(ch=>{
    if(ch.type==='octogone'){
      const map=COUNTER_TO_OCT[ch.name];
      if(map){const axeLabel=AXES_LABELS[map.axe]||map.axe;const polLabel=map.pol==='w'?'purifié':'dévoyé';msgs.push(`${axeLabel} ${ch.val>ch.old?'+':'-'}1 ${polLabel}`);}
    }
    if(ch.type==='vv')msgs.push(`${ch.name} : ${ch.val>ch.old?'+1':'-1'}`);
    if(ch.type==='item'&&ch.acquired)msgs.push(`Obtenu : ${ch.name}`);
  });
  if(!msgs.length)return;
  const notif=document.getElementById('oct-notif');
  notif.textContent=msgs.join(' · ');
  notif.classList.add('show');
  clearTimeout(notif._t);
  notif._t=setTimeout(()=>notif.classList.remove('show'),4000);
}

// ── Rendu séquence ──
let _nextSeq=null;
function renderSequence(seqId){
  const seq=seqIndex[seqId];
  if(!seq){console.error('Séquence introuvable:',seqId);return;}
  gameState.currentSeq=seqId;
  if(!gameState.history||gameState.history[gameState.history.length-1]!==seqId)
    (gameState.history=gameState.history||[]).push(seqId);
  _nextSeq=seq.next||null;
  const wrap=document.getElementById('sequence-wrap');
  wrap.classList.add('fading');
  setTimeout(()=>{wrap.classList.remove('fading');_doRenderSequence(seq);scheduleSave();},280);
}

function _doRenderSequence(seq){
  // Image
  const imgWrap=document.getElementById('seq-img-wrap');
  const imgEl=document.getElementById('seq-image');
  if(seq.image&&seq.image.id){
    imgEl.src='./images/content/'+seq.image.id+'.jpg';
    const maxH=seq.image.size==='huge'?'320px':seq.image.size==='medium'?'200px':'140px';
    imgEl.style.maxHeight=maxH;
    imgWrap.style.display='block';
  } else {
    imgWrap.style.display='none';
    imgEl.src='';
  }
  // Contenu
  const contentHtml=seq.noContent?'':( seq.content||'');
  document.getElementById('seq-content').innerHTML=contentHtml;
  applyActions(seq.actions||[]);
  renderStatusBar();
  // Détecter épreuve
  const epreuve=detectEpreuve(contentHtml);
  // Choix
  const choicesWrap=document.getElementById('choices-wrap');
  choicesWrap.innerHTML='';
  const btnNext=document.getElementById('btn-next');
  btnNext.style.display='none';
  // Bouton "Ouvrir ma fiche" si épreuve détectée
  if(epreuve){
    const hint=document.createElement('div');
    hint.className='epreuve-hint';
    hint.innerHTML=`<span class="epreuve-icon">🎲</span> Épreuve${epreuve.aptKey?' de '+epreuve.aptKey.replace('_',' '):''} — ouvrez votre fiche pour lancer les dés`;
    const btn=document.createElement('button');
    btn.className='open-fiche-btn';
    btn.textContent='Ouvrir ma fiche →';
    btn.addEventListener('click',()=>toggleFichePanel('des'));
    choicesWrap.appendChild(hint);
    choicesWrap.appendChild(btn);
    const sep=document.createElement('div');sep.className='choices-sep';sep.textContent='Puis choisissez votre résultat :';
    choicesWrap.appendChild(sep);
  }
  const choices=(seq.choices||[]).filter(ch=>{
    const sc=ch.showCondition;
    if(sc&&sc.kind&&(sc.query?.params||[]).length>0)return evalCondition(sc);
    return true;
  });
  if(choices.length>0){
    choices.forEach(ch=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.innerHTML=ch.content||'';
      const canSelect=!ch.conditions||ch.conditions.length===0||ch.conditions.every(c=>evalCondition(c));
      if(!canSelect)btn.classList.add('disabled');
      btn.addEventListener('click',()=>{
        if(btn.classList.contains('disabled'))return;
        applyActions(ch.actions||[]);
        renderSequence(ch.next||seq.next);
        syncToOctogoneDebounced();
      });
      choicesWrap.appendChild(btn);
    });
  } else if(seq.final){
    _renderEnding(seq);
  } else if(_nextSeq){
    btnNext.style.display='inline-block';
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function goNext(){if(_nextSeq)renderSequence(_nextSeq);}

function _renderEnding(seq){
  const wrap=document.getElementById('choices-wrap');
  const end=document.createElement('div');end.className='ending-wrap';
  end.innerHTML=`<div class="ending-icon">${seq.isHappyEnd?'✦':'✕'}</div>
    <div class="ending-title">${seq.isHappyEnd?"Fin victorieuse":"Fin de l'aventure"}</div>
    <button class="ending-restart" onclick="restartAdventure()">↺ Recommencer</button>`;
  wrap.appendChild(end);
  syncToOctogone();
}

function restartAdventure(){
  initIndexes();syncFromOctogone();gameState.history=[];
  renderSequence(STORY_DATA.firstSequence);renderStatusBar();
}

// ── Sauvegarde ──
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    const ind=document.getElementById('save-indicator');
    ind.textContent='Sauvegarde…';ind.classList.add('show');
    try{
      await SB.patch(FICHE_ID,{aventure_state:JSON.stringify(gameState)});
      ind.textContent='Sauvegardé ✓';
      setTimeout(()=>ind.classList.remove('show'),1500);
    }catch(e){ind.textContent='Hors-ligne';setTimeout(()=>ind.classList.remove('show'),2000);}
  },800);
}

// ── Realtime ──
function startRealtime(){
  const wsUrl=SUPABASE_URL.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+SUPABASE_KEY+'&vsn=1.0.0';
  let ws,hb;
  function connect(){
    ws=new WebSocket(wsUrl);
    ws.onopen=()=>{
      ws.send(JSON.stringify({topic:'realtime:public:fiches:id=eq.'+FICHE_ID,event:'phx_join',payload:{},ref:'a1'}));
      hb=setInterval(()=>ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'})),25000);
    };
    ws.onmessage=(e)=>{
      try{
        const m=JSON.parse(e.data);
        if((m.event==='UPDATE'||m.event==='INSERT')&&m.payload?.record?.etat){
          ficheEtat=m.payload.record.etat;
          syncFromOctogone();renderStatusBar();
          showChangeNotif([{type:'flag',name:'Fiche mise à jour',val:true}]);
        }
      }catch(err){}
    };
    ws.onclose=()=>{clearInterval(hb);setTimeout(connect,3000);};
    ws.onerror=()=>ws.close();
  }
  connect();
}
