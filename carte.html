<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carte — Octogone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
:root {
  --bg:#1a1208; --ink:#f5e8c8; --ink2:#d4b896; --ink3:#9a7a5a;
  --accent:#c8860a; --accent2:#1a6b8a; --border:#4a3218; --border2:#3a2810;
  --panel-bg:#241a0c; --input-bg:#2a1e0e;
  --star-color:#e8d5a0;
  --radius:4px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Text',serif;background:var(--bg);color:var(--ink);
  min-height:100vh;overflow:hidden;user-select:none;}

/* ── Auth modal ── */
#modal-overlay{position:fixed;inset:0;background:rgba(10,7,3,0.92);display:flex;
  align-items:center;justify-content:center;z-index:100;}
#modal-box{background:var(--panel-bg);border:1px solid var(--border);border-radius:8px;
  padding:2rem;max-width:340px;width:90%;text-align:center;
  box-shadow:0 4px 32px rgba(0,0,0,0.6);}
#modal-box h2{font-family:'Cinzel',serif;color:var(--accent);margin-bottom:.4rem;
  font-size:1.1rem;letter-spacing:.1em;}
#modal-box p{font-size:.9rem;color:var(--ink3);margin-bottom:1rem;font-style:italic;}
.modal-pw{width:100%;padding:.5rem;border:1px solid var(--border);border-radius:3px;
  font-family:'Cinzel',serif;font-size:.95rem;text-align:center;margin-bottom:.5rem;
  outline:none;background:var(--input-bg);color:var(--ink);}
.modal-pw:focus{border-color:var(--accent);}
.modal-btn{font-family:'Cinzel',serif;font-size:.82rem;padding:.5rem 1.2rem;
  border-radius:3px;border:none;cursor:pointer;margin:.2rem;letter-spacing:.05em;}
.modal-btn.primary{background:var(--accent);color:#1a1208;}
.modal-btn.primary:hover{background:#e09a0c;}
.modal-btn.secondary{background:var(--panel-bg);color:var(--ink2);border:1px solid var(--border);}
#modal-err{color:#e06050;font-size:.8rem;margin-top:.4rem;min-height:1em;font-style:italic;}

/* ── App ── */
#app{display:none;width:100vw;height:100vh;position:relative;overflow:hidden;}

/* ── Carte SVG ── */
#carte-canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab;}

/* ── Barre de contrôle ── */
#ctrl-bar{position:fixed;top:0;left:0;right:0;z-index:50;
  background:rgba(26,18,8,0.92);backdrop-filter:blur(4px);
  border-bottom:1px solid var(--border);padding:.4rem .7rem;
  display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;}
.ctrl-title{font-family:'Cinzel',serif;font-size:.8rem;color:var(--accent);
  letter-spacing:.08em;margin-right:.3rem;}
.ctrl-btn{font-family:'Cinzel',serif;font-size:.68rem;padding:3px 9px;
  border:1px solid var(--border);border-radius:3px;background:var(--input-bg);
  color:var(--ink2);cursor:pointer;letter-spacing:.04em;}
.ctrl-btn:hover{background:var(--border2);}
.ctrl-btn.active{border-color:var(--accent);color:var(--accent);}
.ctrl-btn.gm-only{display:none;}
.ctrl-btn.safe{border-color:#3a7a4a;color:#5a9a6a;}
.ctrl-btn.danger{border-color:#7a3a2a;color:#c06050;}
#save-msg{font-size:.7rem;color:var(--ink3);font-style:italic;margin-left:auto;}
#save-msg.saved{color:#5a9a4a;}
#save-msg.error{color:#c05040;}

/* ── Mode badge ── */
#mode-badge{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);
  background:rgba(26,18,8,0.85);border:1px solid var(--border);border-radius:20px;
  padding:.3rem .8rem;font-family:'Cinzel',serif;font-size:.68rem;color:var(--ink3);
  letter-spacing:.06em;z-index:50;pointer-events:none;}
#mode-badge.link-mode{border-color:var(--accent);color:var(--accent);}

/* ── Partage cartes ── */
#share-bar{position:fixed;top:3rem;right:0;z-index:48;
  background:rgba(26,18,8,0.88);border:1px solid var(--border);
  border-radius:6px 0 0 6px;padding:.5rem;max-width:220px;
  display:none;flex-direction:column;gap:.3rem;}
#share-bar.open{display:flex;}
.share-player-item{font-size:.75rem;color:var(--ink2);display:flex;
  align-items:center;gap:.4rem;cursor:pointer;}
.share-player-item .share-dot{width:8px;height:8px;border-radius:50%;
  background:var(--ink3);flex-shrink:0;}
.share-player-item.active .share-dot{background:var(--accent);}

/* ── Panneau événement ── */
#evt-overlay{position:fixed;inset:0;background:rgba(10,7,3,0.85);display:none;
  align-items:center;justify-content:center;z-index:150;}
#evt-overlay.open{display:flex;}
#evt-box{background:var(--panel-bg);border:1px solid var(--border);border-radius:10px;
  padding:1.2rem;max-width:480px;width:94vw;max-height:90vh;overflow-y:auto;
  box-shadow:0 6px 32px rgba(0,0,0,0.6);position:relative;}
.evt-close{position:absolute;top:10px;right:12px;background:none;border:none;
  font-size:1.1rem;cursor:pointer;color:var(--ink3);}
.evt-close:hover{color:var(--ink);}
.evt-panel-title{font-family:'Cinzel',serif;color:var(--accent);font-size:.95rem;
  letter-spacing:.08em;margin-bottom:.8rem;padding-right:1.5rem;}
.evt-section{margin-bottom:.8rem;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.evt-section-head{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;
  background:var(--border2);font-family:'Cinzel',serif;font-size:.7rem;
  color:var(--accent);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
.evt-section-body{padding:.6rem;}
.mj-badge{font-size:.6rem;padding:1px 5px;border-radius:8px;background:var(--accent);
  color:#1a1208;margin-left:auto;}
.niveau-btns{display:flex;gap:.4rem;margin-bottom:.5rem;}
.niv-btn{flex:1;padding:4px 6px;border:1px solid var(--border);border-radius:3px;
  background:var(--input-bg);color:var(--ink3);font-size:.72rem;
  font-family:'Cinzel',serif;cursor:pointer;text-align:center;}
.niv-btn.active.n1{border-color:#9a7a5a;color:#9a7a5a;}
.niv-btn.active.n2{border-color:var(--accent);color:var(--accent);}
.niv-btn.active.n3{border-color:#c8e0f0;color:#c8e0f0;}
.evt-ta{width:100%;background:var(--input-bg);border:none;border-left:2px solid var(--border);
  font-family:'Crimson Text',serif;font-size:.88rem;color:var(--ink2);
  padding:4px 6px;outline:none;resize:none;min-height:3em;line-height:1.5;overflow:hidden;}
.evt-ta:focus{border-left-color:var(--accent);}
.img-zone{border:1px dashed var(--border);border-radius:4px;padding:.5rem;
  text-align:center;cursor:pointer;margin-top:.4rem;font-size:.78rem;color:var(--ink3);}
.img-zone:hover{border-color:var(--accent);}
.img-preview{max-width:100%;max-height:200px;border-radius:4px;margin-top:.4rem;display:block;}
.reveal-row{display:flex;align-items:center;gap:.5rem;margin-top:.4rem;flex-wrap:wrap;}
.reveal-btn{font-family:'Cinzel',serif;font-size:.68rem;padding:3px 9px;
  border:1px solid var(--border);border-radius:3px;background:var(--input-bg);color:var(--ink2);cursor:pointer;}
.reveal-btn.active{border-color:var(--accent2);color:var(--accent2);}
.reveal-fiches-inp{flex:1;min-width:120px;background:var(--input-bg);
  border:1px solid var(--border);border-radius:2px;font-family:'Crimson Text',serif;
  font-size:.82rem;color:var(--ink);padding:2px 5px;outline:none;}
.rc-niveau{font-size:.68rem;font-family:'Cinzel',serif;letter-spacing:.05em;margin-bottom:.3rem;}
.rc-niveau.n1{color:#9a7a5a;font-style:italic;}
.rc-niveau.n2{color:var(--accent);}
.rc-niveau.n3{color:#c8e0f0;font-weight:600;}
.rc-text.n1{font-style:italic;color:var(--ink3);}
.rc-text.n2{color:var(--ink2);}
.rc-text.n3{font-weight:600;color:var(--ink);}
.poids-row{display:flex;gap:.3rem;margin-top:.3rem;}
.poids-btn{width:28px;height:26px;border-radius:4px;border:1px solid var(--border);
  background:var(--input-bg);color:var(--ink3);font-family:'Cinzel',serif;
  font-size:.78rem;cursor:pointer;}
.poids-btn.on{border-color:var(--accent);color:var(--accent);background:#2a1a04;}
.axe-row{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.3rem;}
.axe-num-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);
  background:var(--input-bg);color:var(--ink3);font-family:'Cinzel',serif;
  font-size:.75rem;cursor:pointer;}
.axe-num-btn.on{border-color:var(--accent);color:var(--accent);background:#2a1a04;}
.hypo-item{margin-bottom:.5rem;padding:.4rem .6rem;background:var(--border2);border-radius:3px;font-size:.85rem;}
.hypo-author{font-family:'Cinzel',serif;font-size:.65rem;color:var(--accent);margin-bottom:.2rem;}
.hypo-share-btn{font-size:.65rem;padding:1px 6px;border:1px solid var(--border);
  border-radius:2px;background:none;color:var(--ink3);cursor:pointer;margin-top:.2rem;}
.hypo-share-btn.shared{color:var(--accent2);border-color:var(--accent2);}
.couleur-row{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.4rem;}
.couleur-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;}
.couleur-dot.selected{border-color:#fff;}
.couleur-none{width:24px;height:24px;border-radius:50%;cursor:pointer;background:none;
  border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;
  font-size:.65rem;color:var(--ink3);}

/* ── Générateur ── */
.evt-axe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:.8rem;}
.evt-axe-btn{padding:.5rem .3rem;border:1px solid var(--border);border-radius:5px;
  background:var(--input-bg);color:var(--ink2);font-family:'Cinzel',serif;
  font-size:.72rem;cursor:pointer;text-align:center;}
.evt-axe-btn:hover{border-color:var(--accent);}
.evt-axe-btn.active{border-color:var(--accent);background:#2a1a04;color:var(--accent);}
.evt-axe-btn.disabled{opacity:.35;cursor:not-allowed;}
.evt-info-row{font-size:.8rem;color:var(--ink3);margin-bottom:.6rem;line-height:1.6;}
.evt-preview{padding:.8rem;background:var(--border2);border-left:3px solid var(--accent);
  border-radius:4px;font-size:.9rem;color:var(--ink2);line-height:1.6;margin-bottom:.8rem;min-height:3em;}
.evt-preview.empty{color:var(--ink3);font-style:italic;}
.evt-btns{display:flex;gap:.5rem;}
.evt-btn{flex:1;font-family:'Cinzel',serif;font-size:.78rem;padding:.5rem;
  border-radius:4px;border:1px solid var(--border);cursor:pointer;}
.evt-btn.gen{background:var(--input-bg);color:var(--ink2);}
.evt-btn.accept{background:#2a5a3a;color:#e8f5e8;border-color:#3a7a4a;}
.evt-btn.reject{background:#5a2a2a;color:#f5e8e8;border-color:#7a3a3a;}
.evt-btn:disabled{opacity:.4;cursor:not-allowed;}

  /* ── Bulle de prévisualisation ── */
  #star-bubble{position:fixed;background:rgba(26,18,8,0.95);border:1px solid var(--accent);
    border-radius:7px;padding:.6rem .8rem;max-width:260px;pointer-events:none;
    z-index:200;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
  #star-bubble.open{display:block;}
  .bubble-title{font-family:'Cinzel',serif;font-size:.82rem;color:var(--accent);
    margin-bottom:.3rem;letter-spacing:.05em;}
  .bubble-niveau{font-size:.68rem;font-family:'Cinzel',serif;letter-spacing:.05em;
    margin-bottom:.25rem;}
  .bubble-niveau.n1{color:#9a7a5a;font-style:italic;}
  .bubble-niveau.n2{color:var(--accent);}
  .bubble-niveau.n3{color:#c8e0f0;}
  .bubble-text{font-size:.8rem;color:var(--ink2);line-height:1.4;}
  .bubble-hint{font-size:.65rem;color:var(--ink3);margin-top:.4rem;font-style:italic;
    border-top:1px solid var(--border2);padding-top:.3rem;}

  /* ── Share panel amélioré ── */
  #share-bar{position:fixed;top:3rem;right:0;z-index:48;
    background:rgba(26,18,8,0.95);border:1px solid var(--border);
    border-radius:6px 0 0 6px;padding:.6rem;min-width:240px;
    display:none;flex-direction:column;gap:.4rem;}
  #share-bar.open{display:flex;}
  .share-section-title{font-family:'Cinzel',serif;font-size:.68rem;color:var(--accent);
    letter-spacing:.06em;text-transform:uppercase;margin-bottom:.2rem;}
  .share-player-row{display:flex;align-items:center;gap:.4rem;padding:.25rem 0;
    border-bottom:1px solid var(--border2);}
  .share-player-name{font-size:.78rem;color:var(--ink2);flex:1;}
  .share-toggle-btn{font-family:'Cinzel',serif;font-size:.62rem;padding:2px 6px;
    border:1px solid var(--border);border-radius:3px;background:var(--input-bg);
    color:var(--ink3);cursor:pointer;white-space:nowrap;}
  .share-toggle-btn.on{border-color:#3a7a4a;color:#5a9a6a;}
  .share-toggle-btn.blocked{border-color:#7a3a2a;color:#c06050;}
  .share-vis-btn{font-family:'Cinzel',serif;font-size:.62rem;padding:2px 6px;
    border:1px solid var(--border);border-radius:3px;background:var(--input-bg);
    color:var(--ink3);cursor:pointer;}
  .share-vis-btn.on{border-color:var(--accent);color:var(--accent);}

  /* ── Panneau latéral liste événements ── */
  #evt-list-tab { position:fixed; left:0; top:50%; transform:translateY(-50%);
    writing-mode:vertical-rl; font-family:'Cinzel',serif; font-size:.68rem;
    letter-spacing:.08em; padding:.6rem .35rem; background:var(--accent);
    color:#f5f0e8; border:none; border-radius:0 6px 6px 0; cursor:pointer;
    z-index:100; box-shadow:2px 2px 8px rgba(0,0,0,.35); display:none; }
  #evt-list-panel { position:fixed; left:0; top:0; bottom:0; width:300px;
    background:var(--panel-bg); border-right:1px solid var(--border);
    box-shadow:4px 0 18px rgba(0,0,0,.4); z-index:99;
    display:none; flex-direction:column; overflow:hidden; }
  #evt-list-panel.open { display:flex; }
  #evt-list-header { display:flex; align-items:center; gap:.4rem;
    padding:.5rem .7rem; background:rgba(26,18,8,.9);
    border-bottom:1px solid var(--border); flex-shrink:0; }
  #evt-list-header h3 { font-family:'Cinzel',serif; font-size:.8rem;
    color:var(--accent); flex:1; letter-spacing:.07em; margin:0; }
  #evt-list-search { width:calc(100% - 1.4rem); margin:.4rem .7rem;
    padding:.3rem .5rem; background:var(--input-bg); border:1px solid var(--border);
    border-radius:3px; font-family:'Crimson Text',serif; font-size:.85rem;
    color:var(--ink); outline:none; flex-shrink:0; box-sizing:border-box; }
  #evt-list-search:focus { border-color:var(--accent); }
  #evt-list-actions { display:flex; gap:.4rem; padding:.3rem .7rem;
    border-bottom:1px solid var(--border2); flex-shrink:0; }
  .evtla-btn { font-family:'Cinzel',serif; font-size:.65rem; padding:3px 9px;
    border:1px solid var(--border); border-radius:3px; background:var(--input-bg);
    color:var(--ink2); cursor:pointer; flex:1; text-align:center; }
  .evtla-btn:hover { border-color:var(--accent); color:var(--accent); }
  .evtla-btn.primary { background:var(--accent); color:#1a1208; border-color:var(--accent); }
  #evt-list-scroll { flex:1; overflow-y:auto; padding:.4rem .5rem; }
  .evtl-item { border:1px solid var(--border2); border-radius:5px; margin-bottom:.4rem; }
  .evtl-head { display:flex; align-items:center; gap:.4rem; padding:.4rem .6rem;
    cursor:pointer; background:rgba(26,18,8,.4); border-radius:5px 5px 0 0; }
  .evtl-head:hover { background:rgba(200,134,10,.1); }
  .evtl-toggle { font-size:.7rem; color:var(--ink3); width:12px; flex-shrink:0; }
  .evtl-titre { font-family:'Cinzel',serif; font-size:.72rem; color:var(--ink2);
    flex:1; letter-spacing:.03em; }
  .evtl-niv { font-family:'Cinzel',serif; font-size:.55rem; padding:1px 5px;
    border-radius:8px; flex-shrink:0; }
  .evtl-niv.n1 { background:#3a2a10; color:#9a7a5a; }
  .evtl-niv.n2 { background:#4a2010; color:var(--accent); }
  .evtl-niv.n3 { background:#1a2a4a; color:#c8e0f0; }
  .evtl-rev { font-family:'Cinzel',serif; font-size:.55rem; padding:1px 5px;
    border-radius:8px; flex-shrink:0; }
  .evtl-rev.tous { background:#1a4a2a; color:#a0d0a0; }
  .evtl-rev.aucun { background:#3a2020; color:#c08080; }
  .evtl-rev.partiel { background:#3a3a10; color:#c0c060; }
  .evtl-body { display:none; padding:.5rem .6rem; border-top:1px solid var(--border2); }
  .evtl-body.open { display:block; }
  .evtl-desc { font-family:'Crimson Text',serif; font-size:.85rem;
    color:var(--ink2); line-height:1.5; margin-bottom:.4rem; }
  .evtl-meta { font-size:.7rem; color:var(--ink3); margin-bottom:.4rem; }
  .evtl-acts { display:flex; gap:.3rem; flex-wrap:wrap; }
  .evtl-act { font-family:'Cinzel',serif; font-size:.62rem; padding:2px 8px;
    border:1px solid var(--border); border-radius:3px; background:none;
    color:var(--ink3); cursor:pointer; }
  .evtl-act:hover { border-color:var(--accent); color:var(--accent); }
  .evtl-act.danger { color:#c06050; border-color:#7a3a2a; }
  .evtl-act.danger:hover { background:#3a1a1a; }

  /* ── Niveaux d'info événement ── */
  .niveaux-tabs { display:flex; gap:.3rem; margin-bottom:.5rem; }
  .niveau-tab { font-family:'Cinzel',serif; font-size:.65rem; padding:3px 10px;
    border:1px solid var(--border); border-radius:4px; background:none;
    color:var(--ink3); cursor:pointer; }
  .niveau-tab.active { background:var(--accent); color:#1a1208; border-color:var(--accent); }
  .niveau-tab.rumeur.active { background:#8b6020; color:#fff8e8; border-color:#8b6020; }
  .niveau-tab.indice.active { background:#1a4a6e; color:#e8f0f8; border-color:#1a4a6e; }
  .niveau-tab.fait.active { background:#1a4a2a; color:#e8f8e8; border-color:#1a4a2a; }
  .niveau-badge { font-family:'Cinzel',serif; font-size:.55rem; padding:1px 5px;
    border-radius:8px; margin-right:.3rem; }
  .niveau-badge.rumeur { background:#8b6020; color:#fff8e8; }
  .niveau-badge.indice { background:#1a4a6e; color:#e8f0f8; }
  .niveau-badge.fait { background:#1a4a2a; color:#e8f8e8; }
  .niveau-rev { font-family:'Cinzel',serif; font-size:.6rem; padding:2px 8px;
    border:1px solid var(--border); border-radius:3px; background:var(--input-bg);
    color:var(--ink3); cursor:pointer; margin-left:auto; }
  .lieu-select { width:100%; padding:.3rem .5rem; background:var(--input-bg);
    border:1px solid var(--border); border-radius:3px;
    font-family:'Crimson Text',serif; font-size:.85rem; color:var(--ink); }
  .lieu-select:focus { border-color:var(--accent); outline:none; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- Auth -->
<!-- Onglet panneau événements -->
<button id="evt-list-tab" onclick="toggleEvtListPanel()">📋 Événements</button>

<!-- Panneau latéral liste événements -->
<div id="evt-list-panel">
  <div id="evt-list-header">
    <h3>📋 Événements</h3>
    <button onclick="toggleEvtListPanel()" style="background:none;border:none;cursor:pointer;color:var(--ink3);font-size:1rem;">✕</button>
  </div>
  <input id="evt-list-search" type="text" placeholder="Rechercher un événement…" oninput="renderEvtList()">
  <div id="evt-list-actions">
    <button class="evtla-btn primary" onclick="evtListNew()">＋ Nouvel événement</button>
    <label class="evtla-btn" style="cursor:pointer;" id="evt-import-label">
      ⬆ Importer xlsx
      <input type="file" accept=".xlsx" style="display:none" onchange="importEvtsFromXlsx(this)">
    </label>
  </div>
  <div id="evt-list-scroll"></div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <h2>Carte — Octogone</h2>
    <p>Fiche : <span id="modal-fiche-name" style="font-family:'Cinzel',serif;color:var(--ink);">…</span></p>
    <input id="modal-pw" class="modal-pw" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <br>
    <button class="modal-btn primary" id="modal-btn-player">Entrer (joueur)</button>
    <button class="modal-btn secondary" id="modal-btn-gm">Entrer (meneur)</button>

// ── Fond rosace (très discret) ──
function buildFondRosace(){
  const g=document.getElementById('fond-rosace');
  g.innerHTML='';
  const W=window.innerWidth,H=window.innerHeight;
  const cx=W/2,cy=H/2;
  const rmax=Math.min(W,H)*0.48;
  const ns='http://www.w3.org/2000/svg';
  [0.25,0.5,0.75,1].forEach(f=>{
    const c=document.createElementNS(ns,'circle');
    c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',rmax*f);
    c.setAttribute('fill','none');c.setAttribute('stroke','#c8860a');c.setAttribute('stroke-width','0.8');
    g.appendChild(c);
  });
  for(let i=0;i<8;i++){
    const a=(i*45-90)*Math.PI/180;
    const l=document.createElementNS(ns,'line');
    l.setAttribute('x1',cx);l.setAttribute('y1',cy);
    l.setAttribute('x2',(cx+Math.cos(a)*rmax).toFixed(1));l.setAttribute('y2',(cy+Math.sin(a)*rmax).toFixed(1));
    l.setAttribute('stroke','#c8860a');l.setAttribute('stroke-width','0.5');
    g.appendChild(l);
  }
  // Étoile centrale à 8 branches
  const pts=[];
  for(let i=0;i<16;i++){const a=(i*22.5-90)*Math.PI/180;const r=i%2===0?rmax*0.06:rmax*0.025;pts.push(`${(cx+Math.cos(a)*r).toFixed(1)},${(cy+Math.sin(a)*r).toFixed(1)}`);}
  const poly=document.createElementNS(ns,'polygon');
  poly.setAttribute('points',pts.join(' '));poly.setAttribute('fill','#c8860a');poly.setAttribute('stroke','none');
  g.appendChild(poly);
}

// ── Étoile SVG selon poids ──
function starPath(cx,cy,poids){
  const outerR=8+poids*5; // 1=>13, 5=>33
  const innerR=outerR*0.42;
  const branches=4+poids; // 1=>5, 5=>9
  const pts=[];
  for(let i=0;i<branches*2;i++){
    const a=(i*Math.PI/branches)-Math.PI/2;
    const r=i%2===0?outerR:innerR;
    pts.push(`${(cx+Math.cos(a)*r).toFixed(2)},${(cy+Math.sin(a)*r).toFixed(2)}`);
  }
  return pts.join(' ');
}

// ── Positions ──
function getMyPositions(){
  if(!state.carte.players[playerId]) state.carte.players[playerId]={positions:{},liens:[],shared:false};
  return state.carte.players[playerId].positions;
}
function getMyLiens(){
  if(!state.carte.players[playerId]) state.carte.players[playerId]={positions:{},liens:[],shared:false};
  return state.carte.players[playerId].liens;
}
function initSlotPos(key){
  const pos=getMyPositions();
  if(pos[key]) return pos[key];
  // Position aléatoire dans la zone centrale par défaut
  const W=window.innerWidth,H=window.innerHeight;
  const cx=W/2,cy=H/2,spread=Math.min(W,H)*0.3;
  pos[key]={x:cx+(Math.random()-.5)*spread*2,y:cy+(Math.random()-.5)*spread*2};
  return pos[key];
}

// ── Construction de la carte ──
function buildMap(){
  buildStars();
  buildLinks();
  buildSharePanel();
}

function isVisible(key){
  const slot=state.slots[key];
  if(!slot) return false;
  if(isGM) return !!(slot.titre||slot.texte);
  const ra=slot.revele_a;
  if(!ra||ra==='aucun') return false;
  if(ra==='tous') return true;
  if(Array.isArray(ra)) return ra.includes(playerId);
  return false;
}

function buildStars(){
  const g=document.getElementById('layer-etoiles');
  g.innerHTML='';
  const ns='http://www.w3.org/2000/svg';
  const myPos=getMyPositions();
  const visKeys=Object.keys(state.slots).filter(k=>isVisible(k));

  visKeys.forEach(key=>{
    const slot=state.slots[key];
    const pos=initSlotPos(key);
    const poids=slot.poids||1;
    const myCoul=state.couleurs[playerId]?.[key];

    const gEl=document.createElementNS(ns,'g');
    gEl.setAttribute('class','star-group');
    gEl.setAttribute('data-key',key);
    gEl.style.cursor=currentMode==='link'?'crosshair':'grab';

    // Opacité réduite de mes étoiles quand je compare avec un autre joueur
    const inCompareMode=visiblePlayers.length>0;
    const isRecognized=recognizedKeys.has(key);
    const myOpacity=inCompareMode&&!isRecognized?'0.3':'0.92';

    // Halo (sélection en mode lien ou reconnaissance)
    const halo=document.createElementNS(ns,'circle');
    halo.setAttribute('cx',pos.x);halo.setAttribute('cy',pos.y);
    halo.setAttribute('r',20+poids*4);halo.setAttribute('fill','none');
    halo.setAttribute('stroke',isRecognized?'#f5e8c8':myCoul!==undefined?COULEURS[myCoul].hex:'#c8860a');
    halo.setAttribute('stroke-width',isRecognized?'2':'1');
    halo.setAttribute('opacity',isRecognized?'0.7':'0');
    halo.setAttribute('class','star-halo');
    gEl.appendChild(halo);

    // Étoile
    const poly=document.createElementNS(ns,'polygon');
    poly.setAttribute('points',starPath(pos.x,pos.y,poids));
    poly.setAttribute('fill',isRecognized?'#f5e8c8':myCoul!==undefined?COULEURS[myCoul].hex:'#e8d5a0');
    poly.setAttribute('filter','url(#star-glow)');
    poly.setAttribute('opacity',myOpacity);
    gEl.appendChild(poly);

    // Titre (si pas trop petit)
    if(slot.titre){
      const txt=document.createElementNS(ns,'text');
      txt.setAttribute('x',pos.x);txt.setAttribute('y',pos.y+(12+poids*5)+12);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('font-family','Cinzel,serif');
      txt.setAttribute('font-size','10');txt.setAttribute('fill','#d4b896');
      txt.setAttribute('pointer-events','none');
      txt.textContent=slot.titre.substring(0,20)+(slot.titre.length>20?'…':'');
      gEl.appendChild(txt);
    }

    // Interactions
    setupStarInteraction(gEl, key);
    g.appendChild(gEl);
  });

  // Filtre lueur pour les étoiles
  if(!document.getElementById('star-glow')){
    const defs=document.createElementNS(ns,'defs');
    defs.innerHTML=`<filter id="star-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
    document.getElementById('carte-canvas').insertBefore(defs,document.getElementById('carte-canvas').firstChild);
  }

  // Constellations des autres joueurs (partagées)
  buildOtherConstellations();
}

function buildLinks(){
  const g=document.getElementById('layer-liens');
  g.innerHTML='';
  const ns='http://www.w3.org/2000/svg';
  const myPos=getMyPositions();
  const liens=getMyLiens();

  liens.forEach((lien,idx)=>{
    const posA=myPos[lien.from];const posB=myPos[lien.to];
    if(!posA||!posB) return;
    const col=lien.couleurIdx!==undefined?COULEURS[lien.couleurIdx].hex:'#c8860a';
    const line=document.createElementNS(ns,'line');
    line.setAttribute('x1',posA.x);line.setAttribute('y1',posA.y);
    line.setAttribute('x2',posB.x);line.setAttribute('y2',posB.y);
    line.setAttribute('stroke',col);line.setAttribute('stroke-width','1.5');
    line.setAttribute('opacity','0.6');line.setAttribute('stroke-dasharray','6,3');
    line.setAttribute('cursor','pointer');
    line.addEventListener('click',()=>deleteLien(idx));
    g.appendChild(line);
  });
}

function buildOtherConstellations(){
  const ns='http://www.w3.org/2000/svg';
  const starG=document.getElementById('layer-etoiles');
  const lienG=document.getElementById('layer-liens');

  Object.entries(state.carte.players||{}).forEach(([pid,pdata])=>{
    if(pid===playerId) return;
    if(!pdata.shared) return; // non partagée → invisible pour tous
    if(!visiblePlayers.includes(pid)) return; // non sélectionnée dans le panneau
    const otherPos=pdata.positions||{};

    // ── Étoiles de cet autre joueur (pleine opacité) ──
    Object.keys(state.slots).forEach(key=>{
      if(!isVisible(key)) return;
      const pos=otherPos[key];
      if(!pos) return;
      const slot=state.slots[key];
      const poids=slot.poids||1;
      const myCoul=(pdata.couleurs||{})[key]; // couleur de liaison de cet autre joueur
      const gEl=document.createElementNS(ns,'g');
      gEl.setAttribute('pointer-events','none');

      const poly=document.createElementNS(ns,'polygon');
      poly.setAttribute('points',starPath(pos.x,pos.y,poids));
      poly.setAttribute('fill',myCoul!==undefined?COULEURS[myCoul].hex:'#e8d5a0');
      poly.setAttribute('filter','url(#star-glow)');
      gEl.appendChild(poly);

      // Halo doré si titre commun avec une de mes étoiles reconnues
      const myMatchingKey=[...recognizedKeys].find(k=>
        state.slots[k]&&state.slots[key]&&
        state.slots[k].titre&&state.slots[key].titre&&
        state.slots[k].titre.trim()===state.slots[key].titre.trim()
      );
      if(myMatchingKey){
        const matchHalo=document.createElementNS(ns,'circle');
        matchHalo.setAttribute('cx',pos.x);matchHalo.setAttribute('cy',pos.y);
        matchHalo.setAttribute('r',(20+poids*4+4).toString());
        matchHalo.setAttribute('fill','none');matchHalo.setAttribute('stroke','#f5e0a0');
        matchHalo.setAttribute('stroke-width','2');matchHalo.setAttribute('opacity','0.8');
        matchHalo.setAttribute('stroke-dasharray','4,3');
        gEl.insertBefore(matchHalo,poly);
      }

      // Titre de l'événement (plutôt que le nom du joueur)
      if(slot.titre){
        const lbl=document.createElementNS(ns,'text');
        lbl.setAttribute('x',pos.x);lbl.setAttribute('y',pos.y+(12+poids*5)+12);
        lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-family','Cinzel,serif');
        lbl.setAttribute('font-size','9');lbl.setAttribute('fill','#d4b896');
        lbl.setAttribute('pointer-events','none');
        const titre=slot.titre.substring(0,20)+(slot.titre.length>20?'…':'');
        lbl.textContent=titre;
        gEl.appendChild(lbl);
      }

      starG.appendChild(gEl);
    });

    // ── Liens de cet autre joueur ──
    (pdata.liens||[]).forEach(lien=>{
      const posA=otherPos[lien.from];const posB=otherPos[lien.to];
      if(!posA||!posB) return;
      const col=lien.couleurIdx!==undefined?COULEURS[lien.couleurIdx].hex:'#c8860a';
      const line=document.createElementNS(ns,'line');
      line.setAttribute('x1',posA.x);line.setAttribute('y1',posA.y);
      line.setAttribute('x2',posB.x);line.setAttribute('y2',posB.y);
      line.setAttribute('stroke',col);line.setAttribute('stroke-width','1');
      line.setAttribute('opacity','0.35');line.setAttribute('stroke-dasharray','3,4');
      line.setAttribute('pointer-events','none');
      lienG.appendChild(line);
    });
  });
}

// ── Drag & Drop ──
function setupStarInteraction(gEl,key){
  let dragging=false,startX=0,startY=0,startPos={};
  let moved=false;
  let tapTimer=null,lastTap=0;
  const pos=getMyPositions();
  const MOVE_THRESHOLD=6; // px avant de considérer que c'est un drag

  const onStart=(ex,ey)=>{
    if(currentMode==='link'){ handleLinkClick(key); return; }
    dragging=true; moved=false;
    startX=ex; startY=ey;
    const p=pos[key]||initSlotPos(key);
    startPos={x:p.x,y:p.y};
    gEl.style.cursor='grabbing';
  };
  const onMove=(ex,ey)=>{
    if(!dragging) return;
    const dx=ex-startX,dy=ey-startY;
    if(!moved&&Math.sqrt(dx*dx+dy*dy)<MOVE_THRESHOLD) return;
    moved=true;
    hideBubble();
    pos[key]={x:startPos.x+dx,y:startPos.y+dy};
    updateStarPos(gEl,key,pos[key]);
    updateLinksForKey(key);
  };
  const onEnd=()=>{
    if(!dragging) return;
    dragging=false;
    gEl.style.cursor='grab';
    if(moved) saveState();
  };

  // ── Survol souris → bulle ──
  gEl.addEventListener('mouseenter',e=>{ if(!moved) showBubble(key,e.clientX,e.clientY); });
  gEl.addEventListener('mousemove',e=>{ if(!moved) moveBubble(e.clientX,e.clientY); });
  gEl.addEventListener('mouseleave',()=>hideBubble());

  // ── Mouse : drag + clic simple ignoré en mode move/link, double-clic → panneau ──
  gEl.addEventListener('mousedown',e=>{
    e.preventDefault();
    onStart(e.clientX,e.clientY);
    const up=(ev)=>{
      onEnd();
      window.removeEventListener('mouseup',up);
      window.removeEventListener('mousemove',mv);
    };
    const mv=(ev)=>onMove(ev.clientX,ev.clientY);
    window.addEventListener('mouseup',up);
    window.addEventListener('mousemove',mv);
  });
  gEl.addEventListener('dblclick',e=>{
    e.preventDefault();
    if(currentMode==='link') return;
    hideBubble();
    openEvtPanel(key);
  });

  // ── Touch : tap court → bulle, double-tap → panneau, long press → panneau ──
  let touchTimer=null;
  gEl.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    onStart(t.clientX,t.clientY);
    // Long press → panneau complet
    touchTimer=setTimeout(()=>{
      if(!moved){ hideBubble(); openEvtPanel(key); }
    },600);
  },{passive:false});
  gEl.addEventListener('touchmove',e=>{
    e.preventDefault();
    clearTimeout(touchTimer);
    const t=e.touches[0];
    onMove(t.clientX,t.clientY);
  },{passive:false});
  gEl.addEventListener('touchend',e=>{
    e.preventDefault();
    clearTimeout(touchTimer);
    onEnd();
    if(!moved){
      const now=Date.now();
      if(visiblePlayers.length>0){
        // Mode comparaison : tap simple → reconnaître/déreconnaître l'étoile
        // Double-tap → panneau complet
        if(now-lastTap<350){
          hideBubble(); openEvtPanel(key); lastTap=0;
        } else {
          lastTap=now;
          // Tap simple : basculer la reconnaissance
          if(recognizedKeys.has(key)) recognizedKeys.delete(key);
          else recognizedKeys.add(key);
          buildMap(); // redessiner avec le nouvel état
        }
      } else {
        // Mode normal : tap simple → bulle, double-tap → panneau
        if(now-lastTap<350){ hideBubble(); openEvtPanel(key); lastTap=0; }
        else{ lastTap=now; showBubble(key,startX,startY); }
      }
    }
  },{passive:false});
}

// ── Bulle de prévisualisation ──
function showBubble(key,cx,cy){
  const slot=state.slots[key];
  if(!slot||(currentMode==='link')) return;
  const bubble=document.getElementById('star-bubble');
  document.getElementById('bubble-title').textContent=slot.titre||'(sans titre)';
  const niv=slot.niveau||1;
  const nLabel=['Rumeur','Indice','Fait établi'][niv-1];
  const nEl=document.getElementById('bubble-niveau');
  nEl.textContent=nLabel; nEl.className='bubble-niveau n'+niv;
  const txt=slot.texte||'';
  document.getElementById('bubble-text').textContent=txt.length>120?txt.substring(0,120)+'…':txt;
  const hint=document.getElementById('bubble-hint');
  if(hint) hint.textContent=visiblePlayers.length>0?'Tap : reconnaître cet événement | Double-tap : ouvrir':'Double-clic / tap long pour ouvrir';
  moveBubble(cx,cy);
  bubble.classList.add('open');
}
function moveBubble(cx,cy){
  const bubble=document.getElementById('star-bubble');
  if(!bubble.classList.contains('open')) return;
  const margin=12,bw=270,bh=120;
  let left=cx+margin,top=cy+margin;
  if(left+bw>window.innerWidth) left=cx-bw-margin;
  if(top+bh>window.innerHeight) top=cy-bh-margin;
  bubble.style.left=left+'px'; bubble.style.top=top+'px';
}
function hideBubble(){document.getElementById('star-bubble').classList.remove('open');}

function updateStarPos(gEl,key,pos){
  gEl.querySelectorAll('polygon').forEach(p=>p.setAttribute('points',starPath(pos.x,pos.y,state.slots[key]?.poids||1)));
  gEl.querySelectorAll('text').forEach(t=>{t.setAttribute('x',pos.x);t.setAttribute('y',pos.y+(12+(state.slots[key]?.poids||1)*5)+12);});
  gEl.querySelectorAll('circle').forEach(c=>{c.setAttribute('cx',pos.x);c.setAttribute('cy',pos.y);});
}

function updateLinksForKey(key){buildLinks();}

// ── Mode liaison ──
function setMode(m){
  currentMode=m;linkStart=null;
  document.getElementById('btn-mode-move').classList.toggle('active',m==='move');
  document.getElementById('btn-mode-link').classList.toggle('active',m==='link');
  document.getElementById('mode-badge').textContent=m==='move'?'Mode : Déplacer':'Mode : Relier — cliquez deux étoiles';
  document.getElementById('mode-badge').classList.toggle('link-mode',m==='link');
  document.querySelectorAll('.star-group').forEach(g=>{g.style.cursor=m==='link'?'crosshair':'grab';});
}

function handleLinkClick(key){
  if(!linkStart){
    linkStart=key;
    // Montrer le halo
    document.querySelector(`.star-group[data-key="${key}"] .star-halo`)?.setAttribute('opacity','0.5');
  } else {
    if(linkStart===key){linkStart=null;clearHalos();return;}
    // Créer le lien
    const liens=getMyLiens();
    const exists=liens.find(l=>(l.from===linkStart&&l.to===key)||(l.from===key&&l.to===linkStart));
    if(!exists){
      liens.push({from:linkStart,to:key,couleurIdx:0}); // couleur par défaut
      saveState();
    }
    linkStart=null;clearHalos();buildLinks();
  }
}

function clearHalos(){document.querySelectorAll('.star-halo').forEach(h=>h.setAttribute('opacity','0'));}

function deleteLien(idx){
  const liens=getMyLiens();
  liens.splice(idx,1);
  buildLinks();
  saveState();
}

// ── Partage ──
function toggleSharePanel(){document.getElementById('share-bar').classList.toggle('open');buildSharePanel();}

function buildSharePanel(){
  const list=document.getElementById('share-list');list.innerHTML='';
  const players=state.carte.players||{};

  if(isGM){
    // MJ : voir/bloquer toutes les cartes des joueurs
    const t1=document.createElement('div');t1.className='share-section-title';t1.textContent='Cartes des joueurs';
    list.appendChild(t1);
    const entries=Object.entries(players).filter(([pid])=>pid!==playerId&&pid!=='__mj__');
    if(!entries.length){
      const empty=document.createElement('div');empty.style.cssText='font-size:.75rem;color:var(--ink3);font-style:italic;padding:.2rem 0;';
      empty.textContent='Aucun joueur connecté pour l\'instant.';list.appendChild(empty);
    }
    entries.forEach(([pid,pdata])=>{
      const row=document.createElement('div');row.className='share-player-row';
      const name=document.createElement('span');name.className='share-player-name';
      name.textContent=pid+(pdata.shared?' ✓':'');
      const visBtn=document.createElement('button');visBtn.className='share-vis-btn'+(visiblePlayers.includes(pid)?' on':'');
      visBtn.textContent=visiblePlayers.includes(pid)?'👁 Visible':'Afficher';
      visBtn.addEventListener('click',()=>{
        if(visiblePlayers.includes(pid)){ visiblePlayers=visiblePlayers.filter(p=>p!==pid); if(!visiblePlayers.length) recognizedKeys.clear(); }
        else visiblePlayers.push(pid);
        buildMap();buildSharePanel();
      });
      const blocked=pdata.shareBlocked||false;
      const blockBtn=document.createElement('button');blockBtn.className='share-toggle-btn'+(blocked?' blocked':'');
      blockBtn.textContent=blocked?'🔒':'Bloquer';
      blockBtn.title=blocked?'Débloquer ce joueur':'Empêcher ce joueur de partager';
      blockBtn.addEventListener('click',()=>{
        if(!state.carte.players[pid]) return;
        state.carte.players[pid].shareBlocked=!blocked;
        saveState();buildSharePanel();
      });
      row.appendChild(name);row.appendChild(visBtn);row.appendChild(blockBtn);
      list.appendChild(row);
    });
  } else {
    // Joueur : voir toutes les constellations disponibles (partagées ou non = affiche le statut)
    const t1=document.createElement('div');t1.className='share-section-title';t1.textContent='Constellations disponibles';
    list.appendChild(t1);
    const others=Object.entries(players).filter(([pid])=>pid!==playerId);
    if(!others.length){
      const empty=document.createElement('div');empty.style.cssText='font-size:.75rem;color:var(--ink3);font-style:italic;padding:.2rem 0;';
      empty.textContent='Aucune constellation partagée pour l\'instant.';list.appendChild(empty);
    }
    others.forEach(([pid,pdata])=>{
      if(!pdata.shared) return; // Uniquement les cartes partagées sont visibles aux joueurs
      const row=document.createElement('div');row.className='share-player-row';
      const name=document.createElement('span');name.className='share-player-name';
      name.textContent=pid==='__mj__'?'Meneur':pid;
      const visBtn=document.createElement('button');visBtn.className='share-vis-btn'+(visiblePlayers.includes(pid)?' on':'');
      visBtn.textContent=visiblePlayers.includes(pid)?'👁 Masquer':'Afficher';
      visBtn.addEventListener('click',()=>{
        if(visiblePlayers.includes(pid)){ visiblePlayers=visiblePlayers.filter(p=>p!==pid); if(!visiblePlayers.length) recognizedKeys.clear(); }
        else visiblePlayers.push(pid);
        buildMap();buildSharePanel();
      });
      row.appendChild(name);row.appendChild(visBtn);
      list.appendChild(row);
    });
  }
}

function toggleMyShare(){
  if(!state.carte.players[playerId]) state.carte.players[playerId]={positions:{},liens:[],shared:false};
  const pdata=state.carte.players[playerId];
  // Vérifier que le MJ n'a pas bloqué ce joueur
  if(pdata.shareBlocked&&!isGM){
    alert('Le meneur a désactivé le partage de votre carte.');return;
  }
  pdata.shared=!pdata.shared;
  document.getElementById('btn-share-mine').classList.toggle('active',pdata.shared);
  document.getElementById('btn-share-mine').textContent=pdata.shared?'Ne plus partager':'Partager ma carte';
  saveState();
}

    sb.addEventListener('click',()=>{ensureHypo(key);state.hypotheses[key][playerId].partage=!state.hypotheses[key][playerId].partage;sb.classList.toggle('shared',state.hypotheses[key][playerId].partage);sb.textContent=state.hypotheses[key][playerId].partage?'✓ Partagée':'Partager';saveState();});
    hySec.body.appendChild(sb);content.appendChild(hySec.section);
  }

  // Hypothèses partagées des autres
  const shared=Object.entries(state.hypotheses[key]||{}).filter(([pid,h])=>pid!==playerId&&h.partage&&h.texte);
  if(shared.length){
    const shSec=makeSec('Hypothèses partagées','');
    shared.forEach(([pid,h])=>{const item=document.createElement('div');item.className='hypo-item';const a=document.createElement('div');a.className='hypo-author';a.textContent=pid;const t=document.createElement('div');t.textContent=h.texte;item.appendChild(a);item.appendChild(t);shSec.body.appendChild(item);});
    content.appendChild(shSec.section);
  }

  // Couleur de liaison
  const cSec=makeSec('Couleur de liaison','');
  const cRow=document.createElement('div');cRow.className='couleur-row';
  const myCoul=state.couleurs[playerId]?.[key];
  const none=document.createElement('div');none.className='couleur-none';none.textContent='✕';
  none.addEventListener('click',()=>{if(!state.couleurs[playerId])state.couleurs[playerId]={};delete state.couleurs[playerId][key];saveState();buildMap();openEvtPanel(key);});
  cRow.appendChild(none);
  COULEURS.forEach((c,idx)=>{
    const dot=document.createElement('div');dot.className='couleur-dot'+(myCoul===idx?' selected':'');
    dot.style.background=c.hex;dot.title=c.name;
    dot.addEventListener('click',()=>{if(!state.couleurs[playerId])state.couleurs[playerId]={};state.couleurs[playerId][key]=idx;saveState();buildMap();openEvtPanel(key);});
    cRow.appendChild(dot);
  });
  cSec.body.appendChild(cRow);content.appendChild(cSec.section);

  document.getElementById('evt-overlay').classList.add('open');
}

// ── Helpers UI ──
function makeSec(title,badge){
  const section=document.createElement('div');section.className='evt-section';
  const head=document.createElement('div');head.className='evt-section-head';
  head.innerHTML=`<span>▶</span><span>${title}</span>`;
  if(badge){const b=document.createElement('span');b.className='mj-badge';b.textContent=badge;head.appendChild(b);}
  const body=document.createElement('div');body.className='evt-section-body';
  head.addEventListener('click',()=>{const o=body.style.display!=='none';body.style.display=o?'none':'block';head.querySelector('span').textContent=o?'▶':'▼';});
  section.appendChild(head);section.appendChild(body);
  return {section,body};
}
function makeInput(type,val,ph){const i=document.createElement('input');i.type=type;i.value=val;i.placeholder=ph;i.style.cssText='width:100%;background:var(--input-bg);border:none;border-left:2px solid var(--border);color:var(--ink);font-family:Cinzel,serif;font-size:.82rem;padding:4px 6px;outline:none;';return i;}
function makeTa(val,ph){const ta=document.createElement('textarea');ta.className='evt-ta';ta.value=val;ta.placeholder=ph;return ta;}
function autoR(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function ensureSlot(key){
  if(!state.slots[key]) state.slots[key]={
    titre:'',texte:'',niveau:1,revele_a:'aucun',image:null,axes:[],poids:1,
    // Niveaux d'information
    texte_rumeur:'',texte_indice:'',texte_fait:'',
    revele_rumeur:'aucun',revele_indice:'aucun',revele_fait:'aucun',
    // Lieu associé
    lieu_key:''
  };
  const s=state.slots[key];
  if(!Array.isArray(s.axes)) s.axes=[];
  if(!s.poids) s.poids=1;
  if(s.texte_rumeur===undefined) s.texte_rumeur='';
  if(s.texte_indice===undefined) s.texte_indice='';
  if(s.texte_fait===undefined) s.texte_fait='';
  if(s.revele_rumeur===undefined) s.revele_rumeur='aucun';
  if(s.revele_indice===undefined) s.revele_indice='aucun';
  if(s.revele_fait===undefined) s.revele_fait='aucun';
  if(s.lieu_key===undefined) s.lieu_key='';
}
function ensureHypo(key){if(!state.hypotheses[key])state.hypotheses[key]={};if(!state.hypotheses[key][playerId])state.hypotheses[key][playerId]={texte:'',partage:false};}

// Aide CSS var manquante dans setAttribute
function var_(name,fallback){try{return getComputedStyle(document.documentElement).getPropertyValue(name)||fallback;}catch(e){return fallback;}}

window.addEventListener('resize',()=>{buildFondRosace();buildMap();});

// ── Pan sur le fond (drag SVG hors étoile) ──
function initPan(){
  const svg=document.getElementById('carte-canvas');
  if(!svg) return;

  const onPanStart=(ex,ey)=>{
    panning=true; panStartX=ex; panStartY=ey; panOriginX=panX; panOriginY=panY;
    svg.style.cursor='grabbing';
  };
  const onPanMove=(ex,ey)=>{
    if(!panning) return;
    panX=panOriginX+(ex-panStartX);
    panY=panOriginY+(ey-panStartY);
    applyPan();
  };
  const onPanEnd=()=>{
    panning=false;
    svg.style.cursor='';
  };

  // Mouse — uniquement sur le SVG lui-même (pas sur les étoiles qui stoppent la propagation)
  svg.addEventListener('mousedown',(e)=>{
    if(e.target!==svg && !e.target.closest('#fond-rosace') && !e.target.closest('#layer-liens') && e.target.id!=='viewport') return;
    e.preventDefault(); onPanStart(e.clientX,e.clientY);
    const up=()=>{onPanEnd();window.removeEventListener('mouseup',up);window.removeEventListener('mousemove',mv);};
    const mv=(e)=>onPanMove(e.clientX,e.clientY);
    window.addEventListener('mouseup',up); window.addEventListener('mousemove',mv);
  });

  // Touch
  let panTouch=null;
  svg.addEventListener('touchstart',(e)=>{
    if(e.touches.length!==1) return;
    const t=e.touches[0];
    // Ne pas panner si on touche une étoile
    if(t.target.closest('.star-group')) return;
    panTouch=t.identifier;
    onPanStart(t.clientX,t.clientY);
  },{passive:true});
  svg.addEventListener('touchmove',(e)=>{
    if(!panning) return;
    const t=Array.from(e.touches).find(tt=>tt.identifier===panTouch);
    if(t) onPanMove(t.clientX,t.clientY);
  },{passive:true});
  svg.addEventListener('touchend',()=>onPanEnd(),{passive:true});
}

const EVT_AXES = [
  {id:'feu',       label:'Feu',        num:1},
  {id:'bile_jaune',label:'Bile Jaune', num:2},
  {id:'terre',     label:'Terre',      num:3},
  {id:'bile_noire',label:'Bile Noire', num:4},
  {id:'eau',       label:'Eau',        num:5},
  {id:'flegme',    label:'Flegme',     num:6},
  {id:'air',       label:'Air',        num:7},
  {id:'sang',      label:'Sang',       num:8}
];
const EVT_ECHELLES = {1:'personnage', 2:'groupe', 3:'region'};
const EVT_ECHELLE_LABELS = {1:'Personnage', 2:'Groupe', 3:'Région'};
const EVT_ECHELLE_CERCLE = {1:0, 2:1, 3:2}; // cercle cible par défaut selon échelle (0-indexed, ajusté selon nb cercles réels)

const EvtGen = {
  envEtat: null,       // état (tokens) de la fiche d'environnement courante
  selectedAxe: null,
  currentText: '',
  currentEchelle: null,
  currentPolarite: null,
  targetKey: null,

  async open(){
    document.getElementById('gen-overlay').style.display='flex';
    await this.loadEnvEtat();
    this.buildAxeGrid();
    this.reset();
  },
  close(){
    document.getElementById('gen-overlay').style.display='none';
  },
  reset(){
    this.selectedAxe=null; this.currentText=''; this.targetKey=null;
    document.getElementById('evt-detail').textContent='';
    document.getElementById('evt-preview').textContent="Choisis un axe pour générer un événement…";
    document.getElementById('evt-preview').classList.add('empty');
    document.getElementById('evt-target').textContent='';
    document.getElementById('evt-btn-gen').disabled=true;
    document.getElementById('evt-btn-reject').disabled=true;
    document.getElementById('evt-btn-accept').disabled=true;
    document.querySelectorAll('.evt-axe-btn').forEach(b=>b.classList.remove('active'));
  },

  async loadEnvEtat(){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/fiches?id=eq.${encodeURIComponent(FICHE_ID)}&select=etat`,{headers:SB.hdrs});
      const d=await r.json();
      const etat=d[0]?.etat||null;
      this.envEtat=etat;
      // Résoudre les tokens : nouveau format multi-lieux ou ancien format
      if(etat?.lieux && etat?.lieuActif && etat.lieux[etat.lieuActif]){
        this.envTokens=etat.lieux[etat.lieuActif].tokens||{};
        this.envScores=etat.lieux[etat.lieuActif].scores||{};
      } else {
        // Ancien format : tokens à la racine
        this.envTokens=etat?.tokens||{};
        this.envScores=etat?.scores||{};
      }
    }catch(e){ this.envEtat=null; this.envTokens={}; this.envScores={}; }
  },

  // Compte les jetons blancs/noirs pour un axe donné
  // Lit depuis this.envTokens (résolu au chargement selon le format)
  countTokens(axeId){
    const arr=this.envTokens?.[axeId];
    if(!Array.isArray(arr)) return {white:0, black:0, total:0};
    let white=0, black=0;
    arr.forEach(tk=>{
      if(tk==='white') white++;
      else if(tk==='black') black++;
    });
    return {white, black, total:white+black};
  },

  buildAxeGrid(){
    const grid=document.getElementById('evt-axe-grid');
    grid.innerHTML='';
    EVT_AXES.forEach(axe=>{
      const counts=this.countTokens(axe.id);
      const btn=document.createElement('button');
      btn.className='evt-axe-btn'+(counts.total<2?' disabled':'');
      btn.innerHTML=`${axe.label}<br><span style="opacity:.6;">${counts.total} jeton${counts.total>1?'s':''}</span>`;
      if(counts.total>=2){
        btn.addEventListener('click',()=>this.selectAxe(axe.id));
      }
      grid.appendChild(btn);
    });
  },

  selectAxe(axeId){
    this.selectedAxe=axeId;
    document.querySelectorAll('.evt-axe-btn').forEach(b=>b.classList.remove('active'));
    const idx=EVT_AXES.findIndex(a=>a.id===axeId);
    document.querySelectorAll('.evt-axe-btn')[idx].classList.add('active');

    const counts=this.countTokens(axeId);
    const echelle=Math.min(3, counts.total);
    let polarite;
    if(counts.white>counts.black) polarite='positif';
    else if(counts.black>counts.white) polarite='negatif';
    else polarite='ambivalent';

    this.currentEchelle=echelle;
    this.currentPolarite=polarite;

    const axeLabel=EVT_AXES.find(a=>a.id===axeId).label;
    document.getElementById('evt-detail').innerHTML=
      `<b>${axeLabel}</b> — ${counts.white} blanc(s) / ${counts.black} noir(s) → `+
      `échelle <b>${EVT_ECHELLE_LABELS[echelle]}</b>, polarité <b>${polarite}</b>`+
      (echelle===3?' <i>(répercussions en cascade sur le groupe et l\'individu)</i>':'');

    document.getElementById('evt-btn-gen').disabled=false;
    document.getElementById('evt-preview').textContent="Clique sur Générer pour proposer un événement…";
    document.getElementById('evt-preview').classList.add('empty');
    document.getElementById('evt-btn-reject').disabled=true;
    document.getElementById('evt-btn-accept').disabled=true;
    document.getElementById('evt-target').textContent='';
  },

  fillTemplate(template){
    return template.replace(/\{(\w+)\}/g, (match, varName)=>{
      const vals=EVT_VARIABLES[varName];
      if(!vals||!vals.length) return match;
      return vals[Math.floor(Math.random()*vals.length)];
    });
  },

  generate(){
    if(!this.selectedAxe) return;
    const echKey=EVT_ECHELLES[this.currentEchelle];
    const pool=EVT_TEMPLATES[this.selectedAxe]?.[echKey]?.[this.currentPolarite]||[];
    if(!pool.length){
      document.getElementById('evt-preview').textContent="Aucun template disponible pour cette combinaison.";
      return;
    }
    const template=pool[Math.floor(Math.random()*pool.length)];
    this.currentText=this.fillTemplate(template);

    const preview=document.getElementById('evt-preview');
    preview.textContent=this.currentText;
    preview.classList.remove('empty');

    // Trouver un secteur vide pour le cercle correspondant à l'échelle
    this.targetKey='gen_'+Date.now();
    const targetEl=document.getElementById('evt-target');
    targetEl.textContent='📍 Sera placé sur la carte (position aléatoire)';
    document.getElementById('evt-btn-accept').disabled=false;
    document.getElementById('evt-btn-reject').disabled=false;
  },

  // Génère une position sur la carte selon l'échelle
  // echelle 1=proche du centre, 2=moyen, 3=périphérie
  findEmptySlot(echelle){
    // Retourne simplement une clé unique — la position est calculée dans accept()
    return 'gen_'+Date.now();
  },

  accept(){
    if(!this.currentText) return;
    const axe=EVT_AXES.find(a=>a.id===this.selectedAxe);
    if(!axe) return;
    const newKey='gen_'+Date.now();
    ensureSlot(newKey);
    state.slots[newKey].titre=axe.label+' — événement généré';
    state.slots[newKey].texte=this.currentText;
    state.slots[newKey].niveau=this.currentEchelle||1;
    state.slots[newKey].revele_a='aucun';
    state.slots[newKey].axes=[axe.id];
    state.slots[newKey].poids=(this.currentEchelle||1)*2-1;
    // Positionner sur la carte
    const W=window.innerWidth,H=window.innerHeight;
    const cx=W/2-panX, cy=H/2-panY; // tenir compte du pan
    const maxR=Math.min(W,H)*0.42;
    const echelle=this.currentEchelle||1;
    const rMin=maxR*(echelle-1)/3, rMax=maxR*echelle/3;
    const r=rMin+Math.random()*(rMax-rMin), angle=Math.random()*Math.PI*2;
    if(!state.positions) state.positions={};
    state.positions[newKey]={x:cx+Math.cos(angle)*r, y:cy+Math.sin(angle)*r};
    saveState();
    buildMap();
    renderEvtList();
    this.close();
  },

  reject(){
    // Regénérer un événement sur le même axe
    if(!this.selectedAxe) return;
    this.generate();
  }
};

function openGenerator(){
  document.getElementById('gen-overlay').style.display='flex';
  EvtGen.open();
}

//   PANNEAU LISTE EVENEMENTS

function toggleEvtListPanel(){
  const panel=document.getElementById('evt-list-panel');
  const isOpen=panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  if(!isOpen) renderEvtList();
}

function renderEvtList(){
  console.log('[renderEvtList] state.slots keys:', Object.keys(state.slots||{}).length);
  const scroll=document.getElementById('evt-list-scroll');
  if(!scroll) return;
  const q=(document.getElementById('evt-list-search')?.value||'').toLowerCase();
  const slots=state.slots||{};
  const keys=Object.keys(slots).filter(k=>{
    const s=slots[k];
    if(!isGM){
      const r=s.revele_a||'aucun';
      if(r==='aucun') return false;
      if(r!=='tous'&&!r.split(',').map(x=>x.trim()).includes(playerId)) return false;
    }
    if(q&&!((s.titre||'').toLowerCase().includes(q)||(s.texte||'').toLowerCase().includes(q))) return false;
    return true;
  });
  if(!keys.length){
    scroll.innerHTML='<div style="font-size:.78rem;color:var(--ink3);font-style:italic;padding:.5rem;">Aucun événement visible.</div>';
    return;
  }
  scroll.innerHTML='';
  keys.sort((a,b)=>(slots[a].titre||a).localeCompare(slots[b].titre||b,'fr'));
  keys.forEach(key=>{
    const s=slots[key];
    const niv=s.niveau||1;
    const rev=s.revele_a||'aucun';
    const revClass=rev==='tous'?'tous':rev==='aucun'?'aucun':'partiel';
    const revLabel=rev==='tous'?'Tous':rev==='aucun'?'Caché':'Partiel';
    const item=document.createElement('div'); item.className='evtl-item';
    const head=document.createElement('div'); head.className='evtl-head';
    head.innerHTML='<span class="evtl-toggle">&#9654;</span>'
      +'<span class="evtl-titre">'+(s.titre||'(sans titre)')+'</span>'
      +'<span class="evtl-niv n'+niv+'">N'+niv+'</span>'
      +'<span class="evtl-rev '+revClass+'">'+revLabel+'</span>';
    const body=document.createElement('div'); body.className='evtl-body';
    const axes=(s.axes||[]).filter(Boolean);
    // Lieu et niveaux
    const nBadges=['rumeur','indice','fait'].filter(n=>s['texte_'+n])
      .map(n=>`<span class="niveau-badge ${n}">${n==='fait'?'Fait':n.charAt(0).toUpperCase()+n.slice(1)}</span>`).join(' ');
    body.innerHTML=(s.lieu_key?`<div style="font-family:Cinzel,serif;font-size:.62rem;color:var(--accent);margin-bottom:.2rem;">\u{1f3db} ${(window._cachedLieux&&window._cachedLieux[s.lieu_key]?.nom)||s.lieu_key}</div>`:'')
      +(nBadges?`<div style="margin-bottom:.3rem;">${nBadges}</div>`:'')
      +(s.texte?'<div class="evtl-desc">'+(s.texte.length>180?s.texte.slice(0,180)+'...':s.texte)+'</div>':'')
      +(axes.length?'<div class="evtl-meta">Axes : '+axes.join(', ')+'</div>':'')
      +(s.date?'<div class="evtl-meta">Date : '+s.date+(s.heure?' · '+s.heure:'')+'</div>':'');
    const acts=document.createElement('div'); acts.className='evtl-acts';
    const btnEdit=document.createElement('button'); btnEdit.className='evtl-act';
    btnEdit.textContent='&#9998; Editer';
    btnEdit.onclick=()=>{ toggleEvtListPanel(); openSlot(key); };
    acts.appendChild(btnEdit);
    const btnLoc=document.createElement('button'); btnLoc.className='evtl-act';
    btnLoc.textContent='&#128506; Localiser';
    btnLoc.onclick=()=>evtListLocate(key);
    acts.appendChild(btnLoc);
    if(isGM){
      const btnDel=document.createElement('button'); btnDel.className='evtl-act danger';
      btnDel.textContent='&#128465; Supprimer';
      btnDel.onclick=()=>evtListDelete(key);
      acts.appendChild(btnDel);
    }
    body.appendChild(acts);
    item.appendChild(head); item.appendChild(body);
    head.onclick=()=>{
      const open=body.classList.contains('open');
      document.querySelectorAll('.evtl-body.open').forEach(b=>{
        b.classList.remove('open');
        b.previousElementSibling.querySelector('.evtl-toggle').innerHTML='&#9654;';
      });
      if(!open){ body.classList.add('open'); head.querySelector('.evtl-toggle').innerHTML='&#9660;'; }
    };
    scroll.appendChild(item);
  });
}

// openSlot est un alias vers openEvtPanel
function openSlot(key){ openEvtPanel(key); }

function evtListNew(){
  const key='evt_'+Date.now();
  ensureSlot(key);
  state.slots[key].titre='Nouvel evenement';
  saveState(); renderEvtList();
  toggleEvtListPanel();
  openSlot(key);
}

function evtListLocate(key){
  const pos=state.positions?.[key];
  if(!pos){ alert('Pas de position definie pour cet evenement.'); return; }
  panX=-pos.x+window.innerWidth/2;
  panY=-pos.y+window.innerHeight/2;
  applyPan();
  toggleEvtListPanel();
}

async function evtListDelete(key){
  const titre=state.slots[key]?.titre||key;
  if(!confirm('Supprimer "'+titre+'" ?')) return;
  delete state.slots[key];
  if(state.positions) delete state.positions[key];
  if(state.hypotheses) delete state.hypotheses[key];
  if(state.couleurs) delete state.couleurs[key];
  await saveState();
  renderEvtList();
  buildMap();
}

async function importEvtsFromXlsx(input){
  const file=input.files[0]; if(!file) return;
  if(!window.XLSX){ alert('Librairie XLSX non chargee. Rechargez la page.'); input.value=''; return; }
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(rows.length<3){ alert('Fichier vide.'); return; }
    const hdrs=rows[1].map(h=>String(h).toLowerCase());
    const col=n=>hdrs.findIndex(h=>h.includes(n));
    const iK=col('cl'),iT=col('titre'),iTx=col('texte'),iN=col('niveau');
    const iPo=col('poids'),iR=col('revele'),iSt=col('statut'),iD=col('date'),iH=col('heure');
    const iPx=col('position x'),iPy=col('position y');
    let n=0;
    for(let r=2;r<rows.length;r++){
      const row=rows[r];
      if(!row.some(c=>c!=='')) continue;
      const titre=String(row[iT]||'').trim(); if(!titre) continue;
      let key=iK>=0?String(row[iK]||'').trim():'';
      if(!key) key='evt_'+Date.now()+'_'+r;
      key=key.replace(/[^\w\-]/g,'_');
      ensureSlot(key);
      const s=state.slots[key];
      s.titre=titre;
      if(iTx>=0&&row[iTx]) s.texte=String(row[iTx]);
      if(iN>=0&&row[iN]) s.niveau=parseInt(row[iN])||1;
      if(iPo>=0&&row[iPo]) s.poids=parseInt(row[iPo])||1;
      if(iR>=0&&row[iR]) s.revele_a=String(row[iR]).trim();
      if(iD>=0&&row[iD]) s.date=String(row[iD]);
      if(iH>=0&&row[iH]) s.heure=String(row[iH]);
      const axes=[];
      for(let a=0;a<8;a++){ const v=String(row[8+a]||'').trim().toLowerCase(); if(v) axes.push(v); }
      if(axes.length) s.axes=axes;
      if(iPx>=0&&iPy>=0&&row[iPx]&&row[iPy]){
        if(!state.positions) state.positions={};
        state.positions[key]={x:parseFloat(row[iPx]),y:parseFloat(row[iPy])};
      }
      if(iSt>=0&&String(row[iSt]).trim()==='brouillon') s.revele_a='aucun';
      n++;
    }
    await saveState(); renderEvtList(); buildMap();
    alert(n+' evenement(s) importe(s).');
  }catch(e){ alert('Erreur : '+e.message); }
  input.value='';
}
